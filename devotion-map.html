<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Bharat Mandir Naksha · Live Darshan</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
<style>
@font-face { font-family:'JioType'; font-weight:400; src:url('https://raw.githubusercontent.com/sunit1986/JioBharatIQ_Server/main/assets/fonts/woff2/JioTypeVarW05-Regular.woff2') format('woff2'); }
@font-face { font-family:'JioType'; font-weight:500; src:url('https://raw.githubusercontent.com/sunit1986/JioBharatIQ_Server/main/assets/fonts/woff2/JioTypeW05-Medium.woff2') format('woff2'); }
@font-face { font-family:'JioType'; font-weight:700; src:url('https://raw.githubusercontent.com/sunit1986/JioBharatIQ_Server/main/assets/fonts/woff2/JioTypeW05-Bold.woff2') format('woff2'); }
@font-face { font-family:'JioType'; font-weight:900; src:url('https://raw.githubusercontent.com/sunit1986/JioBharatIQ_Server/main/assets/fonts/woff2/JioTypeW05-Black.woff2') format('woff2'); }

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html, body { font-family:'JioType', -apple-system, system-ui, sans-serif; -webkit-font-smoothing:antialiased; }
body { background:#050200; display:flex; align-items:flex-start; justify-content:center; padding:24px 0; min-height:100vh; }

.phone {
  width:360px; border-radius:40px; border:8px solid #1a1a1a;
  box-shadow:0 24px 64px rgba(0,0,0,0.6);
  overflow:hidden; position:relative; background:#fdf4e3;
}
.notch { background:#1a1a1a; height:32px; display:flex; align-items:center; justify-content:center; }
.notch > div { width:80px; height:20px; background:#1a1a1a; border-radius:0 0 14px 14px; }

.screen {
  position:relative; height:760px; overflow:hidden;
  background:
    radial-gradient(ellipse at 50% 0%, #ffe9c4 0%, transparent 60%),
    linear-gradient(180deg, #fdf4e3 0%, #f7e8c8 40%, #f1d9a8 100%);
  color:#3a1f00;
}

/* ============ APP BAR ============ */
.appbar {
  position:relative; z-index:10;
  padding:16px 14px 10px; display:flex; align-items:center; gap:10px;
}
.appbar-back {
  width:36px; height:36px; border-radius:50%; border:none; cursor:pointer;
  background:rgba(255,255,255,0.82); color:#6a3a00;
  display:flex; align-items:center; justify-content:center;
  box-shadow:0 2px 8px rgba(106,58,0,0.1);
}
.appbar-back:active { transform:scale(0.92); }
.appbar-title { flex:1 1 auto; }
.appbar-title .t { font-size:15px; font-weight:700; color:#3a1f00; line-height:1.15; }
.appbar-title .s { font-size:11px; font-weight:500; color:#8a6233; margin-top:2px; display:flex; align-items:center; gap:5px; }
.appbar-title .s::before {
  content:""; width:6px; height:6px; border-radius:50%; background:#d94a1a;
  box-shadow:0 0 6px #d94a1a; animation:livePulse 1.6s ease-in-out infinite;
}
@keyframes livePulse { 0%,100%{opacity:1;transform:scale(1);} 50%{opacity:0.5;transform:scale(0.8);} }

/* ============ FILTER CHIPS ============ */
.filter-row {
  position:relative; z-index:10;
  padding:4px 12px 10px;
  display:flex; gap:8px; overflow-x:auto;
  -webkit-overflow-scrolling:touch; scrollbar-width:none;
}
.filter-row::-webkit-scrollbar { display:none; }
.chip {
  padding:7px 14px; border-radius:999px;
  background:rgba(255,255,255,0.72);
  border:1px solid rgba(160,90,20,0.22);
  color:#6a3a00; font-size:12px; font-weight:600;
  cursor:pointer; font-family:inherit; white-space:nowrap; flex:0 0 auto;
  transition: all 200ms ease;
}
.chip.active {
  background:#ff8a2e; color:#fff; border-color:#ff8a2e;
  box-shadow:0 3px 10px rgba(255,138,46,0.35);
}
.chip:active { transform:scale(0.96); }

/* ============ MAP ============ */
.map-wrap {
  position:relative;
  width:100%; height:520px;
  display:flex; align-items:center; justify-content:center;
  padding:4px 0 0;
}
.map-svg {
  width:100%; height:100%;
  filter: drop-shadow(0 6px 16px rgba(180,100,30,0.15));
}
.india-path {
  fill: url(#indiaGrad);
  stroke: #a55a0c;
  stroke-width: 1.2;
  stroke-linejoin: round;
}
.state-line {
  fill:none; stroke: rgba(140,70,10,0.18); stroke-width: 0.6; stroke-dasharray: 2 2;
}

/* Temple markers */
.temple-dot {
  cursor:pointer;
  transition: opacity 250ms ease, transform 250ms ease;
  animation: fadeInDot 520ms cubic-bezier(.2,.9,.2,1) both;
}
.temple-dot.hidden { display:none; }
@keyframes fadeInDot { from { opacity:0; } to { opacity:1; } }

.ring-pulse-live {
  fill:none; stroke:#d94a1a; stroke-width:3;
  transform-origin: center;
  animation: ringPulseLive 1.8s ease-out infinite;
}
@keyframes ringPulseLive {
  0%   { opacity:0.75; r:58; stroke-width:4; }
  100% { opacity:0;    r:95; stroke-width:1; }
}
.ring-border      { fill:#fff9e8; stroke:#a55a0c; stroke-width:2.5; }
.ring-border-live { fill:#fff9e8; stroke:#d94a1a; stroke-width:3.5; }

.temple-img { pointer-events:none; }

.live-pill {
  fill:#d94a1a;
}
.live-pill-text {
  font-family:'JioType', sans-serif;
  font-size: 22px; font-weight:900;
  fill:#fff; letter-spacing:1px;
  pointer-events:none;
}

.emoji-fallback {
  font-size: 56px;
  text-anchor: middle;
  dominant-baseline: central;
  pointer-events:none;
}

/* Temple labels */
.temple-label {
  font-family:'JioType', sans-serif;
  font-size: 28px; font-weight: 800;
  fill: #3a1f00;
  pointer-events: none;
  paint-order: stroke;
  stroke: rgba(253,244,227,0.95);
  stroke-width: 7px;
  stroke-linejoin: round;
}

/* ============ LIVE COUNTER STRIP ============ */
.live-strip {
  position:absolute; bottom:0; left:0; right:0; z-index:10;
  padding:12px 16px 16px;
  background: linear-gradient(180deg, transparent 0%, rgba(253,244,227,0.95) 35%, #fdf4e3 100%);
  display:flex; align-items:center; justify-content:space-between;
}
.ls-left { display:flex; align-items:center; gap:8px; font-size:13px; font-weight:700; color:#3a1f00; }
.ls-live-badge {
  display:inline-flex; align-items:center; gap:4px;
  padding:3px 8px; border-radius:10px;
  background:#d94a1a; color:#fff; font-size:10px; font-weight:700;
  letter-spacing:0.4px;
}
.ls-live-badge::before {
  content:""; width:5px; height:5px; border-radius:50%; background:#fff;
  animation:livePulse 1.6s ease-in-out infinite;
}
.ls-right { font-size:11px; color:#8a6233; font-weight:600; }

/* ============ DETAIL CARD (slide-up) ============ */
.detail-back {
  position:absolute; inset:0; background:rgba(0,0,0,0.5); z-index:70;
  opacity:0; pointer-events:none; transition:opacity 300ms ease;
}
.detail-back.open { opacity:1; pointer-events:auto; }
.detail-card {
  position:absolute; left:0; right:0; bottom:0; z-index:71;
  background:#fff;
  border-radius:20px 20px 0 0;
  transform:translateY(100%); transition:transform 340ms cubic-bezier(.2,.9,.2,1);
  overflow:hidden;
  max-height:88%;
  display:flex; flex-direction:column;
}
.detail-card.open { transform:translateY(0); }
.dc-handle { width:40px; height:4px; background:rgba(0,0,0,0.15); border-radius:2px; margin:8px auto 0; }

.dc-video {
  width:100%; height:170px; background:#1a0a00;
  position:relative; overflow:hidden;
}
.dc-video::before {
  content:""; position:absolute; inset:0;
  background:
    radial-gradient(ellipse at 50% 40%, rgba(255,180,80,0.55) 0%, transparent 55%),
    linear-gradient(180deg, #3a1500 0%, #1a0a00 70%);
  animation: flicker 2.2s ease-in-out infinite;
}
@keyframes flicker {
  0%,100%{ opacity:1; }
  45%{ opacity:0.82; }
  55%{ opacity:1; }
  72%{ opacity:0.88; }
}
.dc-video-icon {
  position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); z-index:2;
  font-size:46px; filter: drop-shadow(0 4px 12px rgba(255,150,50,0.6));
}
.dc-live-tag {
  position:absolute; top:10px; left:12px; z-index:3;
  display:inline-flex; align-items:center; gap:5px;
  padding:4px 9px; border-radius:4px;
  background:#d94a1a; color:#fff;
  font-size:10px; font-weight:700; letter-spacing:0.4px;
}
.dc-live-tag::before {
  content:""; width:6px; height:6px; border-radius:50%; background:#fff;
  animation:livePulse 1.6s ease-in-out infinite;
}
.dc-viewers {
  position:absolute; top:10px; right:12px; z-index:3;
  padding:4px 9px; border-radius:10px;
  background:rgba(0,0,0,0.55); color:#fff;
  font-size:11px; font-weight:600; backdrop-filter: blur(4px);
}

.dc-body {
  padding:14px 18px 8px;
  overflow-y:auto;
}
.dc-name { font-size:18px; font-weight:800; color:#1a0a00; }
.dc-name-hi { font-size:13px; font-weight:600; color:#8a5620; margin-top:2px; }
.dc-meta-row { display:flex; gap:6px; flex-wrap:wrap; margin-top:10px; }
.dc-pill {
  padding:4px 10px; border-radius:10px;
  background:#fdf0db; color:#a55a0c;
  font-size:11px; font-weight:600;
}
.dc-pill.deity { background:#fff1d9; color:#c56400; }
.dc-info {
  margin-top:14px; padding:12px 14px;
  background:#fdf4e3; border-radius:12px;
}
.dc-info .row { display:flex; justify-content:space-between; padding:5px 0; font-size:13px; gap:12px; }
.dc-info .row + .row { border-top:1px dashed rgba(180,100,30,0.18); }
.dc-info .k { color:#8a6233; font-weight:500; flex:0 0 auto; }
.dc-info .v { color:#1a0a00; font-weight:700; text-align:right; }

.dc-cta-row {
  display:flex; gap:10px; padding:12px 16px 18px;
  background:#fff; border-top:1px solid rgba(0,0,0,0.05);
}
.dc-btn {
  flex:1 1 0; height:48px; border:none; border-radius:999px;
  font-family:inherit; font-size:14px; font-weight:700;
  cursor:pointer; display:flex; align-items:center; justify-content:center; gap:6px;
  transition: transform 120ms ease, box-shadow 200ms ease;
}
.dc-btn.primary {
  background:linear-gradient(180deg, #ff8a2e, #d94a1a); color:#fff;
  box-shadow:0 4px 14px rgba(217,74,26,0.35);
}
.dc-btn.secondary {
  background:#fdf0db; color:#a55a0c;
}
.dc-btn:active { transform:scale(0.97); }
.dc-btn:disabled { opacity:0.5; cursor:not-allowed; }

</style>
</head>

// ══════════════════════════════════════
//  RENDER temple points on SVG
// ══════════════════════════════════════
function renderTemples() {
  const svgNS = 'http://www.w3.org/2000/svg';
  const layer = document.getElementById('templeLayer');
  layer.innerHTML = '';

  TEMPLES.forEach((t, i) => {
    const g = document.createElementNS(svgNS, 'g');
    g.setAttribute('class', 'temple-dot');
    g.setAttribute('data-id', t.id);
    g.setAttribute('data-fam', t.family);
    g.setAttribute('data-live', t.live ? '1' : '0');
    g.setAttribute('transform', `translate(${t.x} ${t.y})`);
    g.style.animationDelay = (i * 70) + 'ms';

    // (1) Outer pulsing ring — only for live temples
    if (t.live) {
      const pulse = document.createElementNS(svgNS, 'circle');
      pulse.setAttribute('class', 'ring-pulse-live');
      pulse.setAttribute('cx', 0); pulse.setAttribute('cy', 0);
      g.appendChild(pulse);
    }

    // (2) Cream-filled border circle (acts as ring around image)
    const border = document.createElementNS(svgNS, 'circle');
    border.setAttribute('class', t.live ? 'ring-border-live' : 'ring-border');
    border.setAttribute('cx', 0); border.setAttribute('cy', 0);
    border.setAttribute('r', 55);
    g.appendChild(border);

    // (3) Temple image (clipped to circle) OR emoji fallback
    if (t.thumb) {
      const img = document.createElementNS(svgNS, 'image');
      img.setAttribute('class', 'temple-img');
      img.setAttribute('href', 'assets/temples/' + t.thumb);
      img.setAttributeNS('http://www.w3.org/1999/xlink', 'xlink:href', 'assets/temples/' + t.thumb);
      img.setAttribute('x', -52); img.setAttribute('y', -52);
      img.setAttribute('width', 104); img.setAttribute('height', 104);
      img.setAttribute('preserveAspectRatio', 'xMidYMid slice');
      img.setAttribute('clip-path', 'url(#templeClip)');
      g.appendChild(img);
    } else {
      const em = document.createElementNS(svgNS, 'text');
      em.setAttribute('class', 'emoji-fallback');
      em.setAttribute('x', 0); em.setAttribute('y', 0);
      em.textContent = t.emoji || '🕉';
      g.appendChild(em);
    }

    // (4) LIVE text badge — pill in top-right for live temples
    if (t.live) {
      const pill = document.createElementNS(svgNS, 'rect');
      pill.setAttribute('class', 'live-pill');
      pill.setAttribute('x', 12);  pill.setAttribute('y', -68);
      pill.setAttribute('width', 56); pill.setAttribute('height', 26);
      pill.setAttribute('rx', 5);
      g.appendChild(pill);

      const liveTxt = document.createElementNS(svgNS, 'text');
      liveTxt.setAttribute('class', 'live-pill-text');
      liveTxt.setAttribute('x', 40); liveTxt.setAttribute('y', -48);
      liveTxt.setAttribute('text-anchor', 'middle');
      liveTxt.textContent = 'LIVE';
      g.appendChild(liveTxt);
    }

    // (5) Label below
    const lbl = document.createElementNS(svgNS, 'text');
    lbl.setAttribute('class', 'temple-label');
    const labelY = (t.y > 800) ? -76 : 84;
    lbl.setAttribute('x', 0);
    lbl.setAttribute('y', labelY);
    lbl.setAttribute('text-anchor', 'middle');
    lbl.textContent = shortName(t.name);
    g.appendChild(lbl);

    g.addEventListener('click', () => openDetail(t));

    layer.appendChild(g);
  });

  updateLiveCounts();
}

function shortName(n) {
  const map = {
    'Vaishno Devi':'Vaishno Devi',
    'Kedarnath':'Kedarnath',
    'Badrinath':'Badrinath',
    'Kashi Vishwanath':'Kashi',
    'Banke Bihari (Vrindavan)':'Vrindavan',
    'Ram Mandir':'Ayodhya',
    'Mahakaleshwar':'Mahakal',
    'Somnath':'Somnath',
    'Siddhivinayak':'Siddhivinayak',
    'Shirdi Sai Baba':'Shirdi',
    'Jagannath Puri':'Puri',
    'Tirupati Balaji':'Tirupati',
    'Rameshwaram':'Rameshwaram',
    'Meenakshi Amman':'Madurai'
  };
  return map[n] || n;
}

// ══════════════════════════════════════
//  FILTER logic
// ══════════════════════════════════════
document.getElementById('filters').addEventListener('click', (e) => {
  const btn = e.target.closest('.chip'); if (!btn) return;
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  btn.classList.add('active');
  activeFam = btn.dataset.fam;
  applyFilter();
});

function applyFilter() {
  document.querySelectorAll('.temple-dot').forEach(g => {
    const fam = g.dataset.fam;
    const match = (activeFam === 'all' || fam === activeFam);
    if (match) g.classList.remove('hidden');
    else       g.classList.add('hidden');
  });
  updateLiveCounts();
}

function updateLiveCounts() {
  const visible = TEMPLES.filter(t => activeFam === 'all' || t.family === activeFam);
  const liveTotal = visible.filter(t => t.live).length;
  const famLabel = ({
    all:'pavitra sthal', shiva:'Shiva mandir', vishnu:'Vishnu mandir',
    devi:'Shakti peeth', ganesh:'Ganesh mandir', other:'anya sthal'
  })[activeFam] || 'pavitra sthal';
  document.getElementById('liveCount').textContent =
    `${visible.length} ${famLabel} · ${liveTotal} LIVE aarti`;
  document.getElementById('liveCountStrip').textContent =
    `${liveTotal} mandiron mein aarti abhi`;
}

  const tag = document.getElementById('dcLiveTag');
  const vws = document.getElementById('dcViewers');
  if (t.live) {
    tag.style.display = 'inline-flex';
    vws.textContent = `👁 ${t.viewers.toLocaleString('en-IN')} log`;
    vws.style.background = 'rgba(0,0,0,0.55)';
  } else {
    tag.style.display = 'none';
    vws.textContent = 'Abhi band';
    vws.style.background = 'rgba(80,40,0,0.65)';
  }

  const pills = document.getElementById('dcPills');
  pills.innerHTML = '';
  const fampill = document.createElement('span');
  fampill.className = 'dc-pill deity';
  fampill.textContent = familyLabel(t.family);
  pills.appendChild(fampill);
  (t.pill || []).forEach(p => {
    const span = document.createElement('span');
    span.className = 'dc-pill';
    span.textContent = p;
    pills.appendChild(span);
  });

  const btn = document.getElementById('dcDarshanBtn');
  btn.disabled = !t.live;

  document.getElementById('detailBack').classList.add('open');
  document.getElementById('detailCard').classList.add('open');
}

function closeDetail() {
  document.getElementById('detailBack').classList.remove('open');
  document.getElementById('detailCard').classList.remove('open');
  selectedTemple = null;
}

function familyLabel(f) {
  return ({
    shiva:'Shiva parivar',
    vishnu:'Vishnu parivar',
    devi:'Shakti · Devi',
    ganesh:'Ganesh',
    other:'Anya sant'
  })[f] || 'Mandir';
}

// ══════════════════════════════════════
//  NAVIGATION
// ══════════════════════════════════════
function goBack() {
  // Always go back to home, preserving the deity query param so the user lands
  // on the same personalized home they left instead of deity selection.
  const d = new URLSearchParams(location.search).get('deity') || '';
  location.href = 'devotion-home-focused.html' + (d ? '?deity=' + encodeURIComponent(d) : '');
}

function goDarshan() {
  if (!selectedTemple || !selectedTemple.live) return;
  const t = selectedTemple;
  const deityMap = {
    shiva:'shiva', vishnu:'krishna', devi:'durga', ganesh:'ganesh', other:'shiva'
  };
  const deityId = deityMap[t.family] || 'shiva';
  const qs = '?id='    + encodeURIComponent(t.id)
          + '&deity=' + encodeURIComponent(deityId)
          + '&temple='+ encodeURIComponent(t.name)
          + '&place=' + encodeURIComponent(t.state)
          + (t.thumb ? '&img=' + encodeURIComponent('assets/temples/' + t.thumb) : '')
          + '&viewers=' + encodeURIComponent(t.viewers ? (t.viewers>1000 ? (t.viewers/1000).toFixed(1)+'K' : String(t.viewers)) : '');
  window.location.href = 'devotion-live-darshan.html' + qs;
}

// ══════════════════════════════════════
//  INIT
// ══════════════════════════════════════

// Map incoming deity id (from home page) → filter family
const DEITY_TO_FAMILY = {
  ganesh:'ganesh',
  shiva:'shiva',
  krishna:'vishnu', ram:'vishnu', vishnu:'vishnu', jagannath:'vishnu', venkateshwara:'vishnu',
  durga:'devi', devi:'devi', vaishno:'devi', meenakshi:'devi',
  hanuman:'other', sai:'other', other:'other'
};

function applyInitialDeityFilter() {
  const qs = new URLSearchParams(location.search);
  const d  = (qs.get('deity') || '').toLowerCase();
  if (!d) return;
  const fam = DEITY_TO_FAMILY[d];
  if (!fam) return;
  const chip = document.querySelector('.chip[data-fam="' + fam + '"]');
  if (!chip) return;
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  chip.classList.add('active');
  activeFam = fam;
  applyFilter();
}

renderTemples();
applyInitialDeityFilter();

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') closeDetail();
});
</script>
