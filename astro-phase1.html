<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=375, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Jio Astro — Phase 1: Grand Kundli Reveal</title>

<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>
  @font-face { font-family: 'JioType'; font-weight: 400; src: url('https://raw.githubusercontent.com/sunit1986/JioBharatIQ_Server/main/assets/fonts/woff2/JioTypeVarW05-Regular.woff2') format('woff2'); }
  @font-face { font-family: 'JioType'; font-weight: 500; src: url('https://raw.githubusercontent.com/sunit1986/JioBharatIQ_Server/main/assets/fonts/woff2/JioTypeW05-Medium.woff2') format('woff2'); }
  @font-face { font-family: 'JioType'; font-weight: 700; src: url('https://raw.githubusercontent.com/sunit1986/JioBharatIQ_Server/main/assets/fonts/woff2/JioTypeW05-Bold.woff2') format('woff2'); }
  @font-face { font-family: 'JioType'; font-weight: 900; src: url('https://raw.githubusercontent.com/sunit1986/JioBharatIQ_Server/main/assets/fonts/woff2/JioTypeW05-Black.woff2') format('woff2'); }

  :root {
    --primary-20: #e8e8fc; --primary-30: #9999ff; --primary-40: #6464ff;
    --primary-50: #3535f3; --primary-60: #000093; --primary-70: #00004c; --primary-80: #010029;
    --secondary-20: #fef7e9; --secondary-30: #ffe3ae; --secondary-40: #ffd947;
    --secondary-50: #f7ab20; --secondary-60: #ac660c; --secondary-70: #7f4b10;
    --sparkle-20: #e8faf7; --sparkle-40: #7aebd9; --sparkle-50: #1eccb0; --sparkle-60: #1e7b74;
    --error: #fa2f40; --warning: #f06d0f; --success: #25ab21;
    --grey-100: #141414; --grey-80: rgba(0,0,0,0.66); --grey-60: #b5b5b5;
    --grey-40: #e0e0e0; --grey-20: #f5f5f5; --white: #ffffff;
    --surface-default: #ffffff; --surface-ghost: #eeeeef; --surface-ghost-icon: #e7e9ff;
    --surface-bold: #3900ad; --surface-minimal: #f5f5f5;
    --text-high: #141414; --text-low: rgba(25,27,30,0.65);
    --text-disabled: rgba(25,27,30,0.38); --text-on-bold: #ffffff;
    --stroke-subtle: rgba(36,38,43,0.12); --stroke-minimal: rgba(36,38,43,0.13);
    --coral-base: #ff6644; --indigo-base: #3800ac;
    --planet-sun: #f7ab20; --planet-moon: #b5b5b5; --planet-mars: #ff6644;
    --planet-mercury: #1eccb0; --planet-jupiter: #3535f3; --planet-venus: #9999ff;
    --planet-saturn: #141414; --planet-rahu: #000093; --planet-ketu: #3800ac;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--grey-20); display: flex; align-items: flex-start;
    justify-content: center; padding: 32px 24px;
    font-family: 'JioType', 'Outfit', sans-serif;
    min-height: 100vh; -webkit-font-smoothing: antialiased;
  }
  .phone-frame { width: 360px; background: var(--white); border-radius: 40px; border: 8px solid #1a1a1a; box-shadow: 0 24px 64px rgba(0,0,0,0.18); overflow: hidden; position: relative; }
  .notch { background: #1a1a1a; height: 32px; display: flex; align-items: center; justify-content: center; }
  .notch-inner { width: 80px; height: 20px; background: #1a1a1a; border-radius: 0 0 14px 14px; }
  .status-bar { background: #0a0a14; padding: 6px 20px; display: flex; justify-content: space-between; font-size: 11px; font-weight: 700; color: rgba(255,255,255,0.8); }
  .screen { height: 700px; overflow-y: auto; overflow-x: hidden; position: relative; background: #0a0a14; scroll-behavior: smooth; }

  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes fadeInUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes fadeInScale { from { opacity: 0; transform: scale(0.85); } to { opacity: 1; transform: scale(1); } }
  @keyframes scaleIn { from { opacity: 0; transform: scale(0); } to { opacity: 1; transform: scale(1); } }
  @keyframes planetDrop { 0% { transform: scale(0); opacity: 0; } 50% { transform: scale(1.3); opacity: 1; } 100% { transform: scale(1); opacity: 1; } }
  @keyframes planetGlow { 0%, 100% { filter: drop-shadow(0 0 0px transparent); } 50% { filter: drop-shadow(0 0 6px currentColor); } }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.38; } }
  @keyframes breathe { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.03); } }
  @keyframes drawLine { from { stroke-dashoffset: 500; } to { stroke-dashoffset: 0; } }
  @keyframes brightenLines { 0% { stroke: var(--secondary-50); } 50% { stroke: var(--secondary-40); } 100% { stroke: var(--secondary-50); } }
  @keyframes slideUpCard { from { opacity: 0; transform: translateY(60px) scale(0.9); } to { opacity: 1; transform: translateY(0) scale(1); } }
  @keyframes borderCycle { 0%, 100% { border-color: var(--primary-30); } 50% { border-color: var(--sparkle-40); } }
  @keyframes chevronBounce { 0%, 100% { transform: translateY(0); opacity: 1; } 50% { transform: translateY(6px); opacity: 0.38; } }
  @keyframes typeReveal { from { max-height: 0; opacity: 0; } to { max-height: 200px; opacity: 1; } }
  @keyframes countUp { from { opacity: 0; transform: scale(0.5); } to { opacity: 1; transform: scale(1); } }
  @keyframes shimmerBg { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
  @keyframes floatUp { 0% { transform: translateY(0); } 50% { transform: translateY(-4px); } 100% { transform: translateY(0); } }
  @keyframes textGlow { 0%, 100% { text-shadow: none; } 50% { text-shadow: 0 0 20px rgba(53,53,243,0.3); } }
  @keyframes waveform { 0%, 100% { height: 4px; } 50% { height: 16px; } }
  @keyframes rippleOut { 0% { transform: scale(0.8); opacity: 0.6; } 100% { transform: scale(2.5); opacity: 0; } }
  @keyframes sparkle { 0% { opacity: 0; transform: scale(0); } 50% { opacity: 1; transform: scale(1); } 100% { opacity: 0; transform: scale(0) translateY(-8px); } }
  @keyframes houseGlowPulse { 0%, 100% { opacity: 0.15; } 50% { opacity: 0.4; } }
  @keyframes slideInCaption { from { opacity: 0; transform: translateY(20px) scale(0.95); } to { opacity: 1; transform: translateY(0) scale(1); } }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

/* ═══════════════════════════════════════
   SARVAM TTS — Hinglish Voice Narration
   Pre-generated via Sarvam bulbul:v3, speaker: ashutosh
   ═══════════════════════════════════════ */
const NARRATION_AUDIO_SRC = 'narration.wav'; // Pre-generated file (same directory)

/* ═══════════════════════════════════════
   NORTH INDIAN KUNDLI CHART (Diamond)
   ═══════════════════════════════════════ */

/*  North Indian chart: outer square + inner diamond (midpoints)
    Houses numbered from Lagna at top, counterclockwise:

    ┌─────────E─────────┐
    │ ╲      1st     ╱  │
    │  12 ╲       ╱  2  │
    │      ╲   ╱        │
    H────────O────────F
    │      ╱   ╲        │
    │  11 ╱       ╲  3  │
    │  ╱     10      ╲  │
    ├─────────G─────────┤
    │  ╲      7      ╱  │
    │  8  ╲       ╱  6  │
    │      ╲   ╱        │
    │────────X──────────│
    │      ╱   ╲        │
    │  9  ╱       ╲  5  │
    │  ╱             ╲  │
    └───────────────────┘
*/

const PLANETS_IN_HOUSES = {
  // Vrishchik (Scorpio) Lagna — realistic placement
  1: [{ abbr: 'Ma', name: 'Mars', color: 'var(--planet-mars)' }],      // Lagna lord in Lagna
  2: [{ abbr: 'Su', name: 'Sun', color: 'var(--planet-sun)' },
      { abbr: 'Me', name: 'Mercury', color: 'var(--planet-mercury)' }], // Budhaditya Yog!
  3: [],
  4: [{ abbr: 'Ve', name: 'Venus', color: 'var(--planet-venus)' }],
  5: [{ abbr: 'Ju', name: 'Jupiter', color: 'var(--planet-jupiter)' }],
  6: [],
  7: [{ abbr: 'Mo', name: 'Moon', color: 'var(--planet-moon)' }],
  8: [{ abbr: 'Ke', name: 'Ketu', color: 'var(--planet-ketu)' }],
  9: [],
  10: [{ abbr: 'Sa', name: 'Saturn', color: 'var(--planet-saturn)' }],
  11: [],
  12: [{ abbr: 'Ra', name: 'Rahu', color: 'var(--planet-rahu)' }],
};

const NorthIndianChart = ({ size = 260, animatePhase = 'none', highlightHouses = [], glowPlanets = [], dimOthers = false }) => {
  const S = size;
  const pad = 2;
  // Corners
  const A = [pad, pad], B = [S-pad, pad], C = [S-pad, S-pad], D = [pad, S-pad];
  // Midpoints (diamond)
  const E = [S/2, pad], F = [S-pad, S/2], G = [S/2, S-pad], H = [pad, S/2];
  const O = [S/2, S/2];
  // Interior intersection points (diagonals ∩ diamond lines)
  const P1 = [S/4, S/4];     // AC ∩ HE
  const P2 = [3*S/4, S/4];   // BD ∩ EF
  const P3 = [3*S/4, 3*S/4]; // AC ∩ FG
  const P4 = [S/4, 3*S/4];   // BD ∩ GH

  const pts = (arr) => arr.map(p => p.join(',')).join(' ');

  // 12 house polygon definitions
  const housePolygons = {
    1:  [E, P1, O, P2],       // top center diamond
    2:  [E, B, P2],           // top-right triangle
    3:  [B, F, P2],           // right-upper triangle
    4:  [F, P2, O, P3],       // right center diamond
    5:  [F, C, P3],           // right-lower triangle
    6:  [C, G, P3],           // bottom-right triangle
    7:  [G, P3, O, P4],       // bottom center diamond
    8:  [D, G, P4],           // bottom-left triangle
    9:  [D, P4, H],           // left-lower triangle
    10: [H, P1, O, P4],       // left center diamond
    11: [A, P1, H],           // left-upper triangle
    12: [A, E, P1],           // top-left triangle
  };

  const chartLines = [
    [A, B], [B, C], [C, D], [D, A],
    [E, F], [F, G], [G, H], [H, E],
    [A, C], [B, D],
  ];

  const housePositions = {
    1:  [S/2,    S*0.19],  2:  [S*0.73, S*0.08],
    3:  [S*0.91, S*0.27],  4:  [S*0.81, S/2],
    5:  [S*0.91, S*0.73],  6:  [S*0.73, S*0.92],
    7:  [S/2,    S*0.81],  8:  [S*0.27, S*0.92],
    9:  [S*0.09, S*0.73],  10: [S*0.19, S/2],
    11: [S*0.09, S*0.27],  12: [S*0.27, S*0.08],
  };

  const getPlanetPos = (houseNum, index, total) => {
    const base = housePositions[houseNum];
    if (!base) return [0,0];
    const spacing = S < 180 ? 14 : 18;
    const offset = total > 1 ? (index - (total-1)/2) * spacing : 0;
    return [base[0] + offset, base[1] + (S < 180 ? 10 : 14)];
  };

  const showLines = animatePhase !== 'none';
  const showPlanets = animatePhase === 'planets' || animatePhase === 'complete' || animatePhase === 'glow';
  const pFontSize = S < 180 ? 7 : 9;
  const hasHighlights = highlightHouses.length > 0;

  return (
    <svg width={S} height={S} viewBox={`0 0 ${S} ${S}`} style={{ overflow: 'visible' }}>
      <defs>
        {/* Radial glow for highlighted houses */}
        <radialGradient id="houseGlow">
          <stop offset="0%" stopColor="var(--secondary-40)" stopOpacity="0.5" />
          <stop offset="100%" stopColor="var(--secondary-40)" stopOpacity="0.08" />
        </radialGradient>
        {/* Planet focus pulse ring */}
        <filter id="planetFocusGlow">
          <feGaussianBlur stdDeviation="3" result="blur" />
          <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
      </defs>

      {/* Cream background */}
      <rect x={pad} y={pad} width={S-pad*2} height={S-pad*2}
        fill="#fdf8ef" rx={2}
        style={{ opacity: showLines ? 1 : 0, transition: 'opacity 400ms ease-out' }} />

      {/* House polygon fills — highlighted houses get a BOLD warm glow */}
      {showLines && Object.entries(housePolygons).map(([num, poly]) => {
        const isHighlighted = highlightHouses.includes(parseInt(num));
        return (
          <React.Fragment key={`hp${num}`}>
            {/* Main fill */}
            <polygon points={pts(poly)}
              fill={isHighlighted ? 'rgba(247,171,32,0.25)' : 'transparent'}
              stroke={isHighlighted ? 'rgba(247,171,32,0.6)' : 'none'}
              strokeWidth={isHighlighted ? 2 : 0}
              style={{
                transition: 'fill 500ms ease-out, stroke 500ms ease-out',
                animation: isHighlighted ? 'houseGlowPulse 2s ease-in-out infinite' : 'none',
              }} />
            {/* Second brighter inner fill for extra pop */}
            {isHighlighted && (
              <polygon points={pts(poly)}
                fill="rgba(255,215,0,0.12)"
                stroke="none"
                style={{ animation: 'breathe 1.5s ease-in-out infinite' }} />
            )}
          </React.Fragment>
        );
      })}

      {/* Chart lines */}
      {chartLines.map(([p1, p2], i) => {
        const len = Math.sqrt((p2[0]-p1[0])**2 + (p2[1]-p1[1])**2);
        return (
          <line key={`l${i}`}
            x1={p1[0]} y1={p1[1]} x2={p2[0]} y2={p2[1]}
            stroke="#a0783c" strokeWidth={S < 180 ? 1 : 1.5}
            strokeDasharray={len}
            strokeDashoffset={showLines ? 0 : len}
            style={{
              transition: `stroke-dashoffset 600ms ease-out ${i*70}ms`,
              opacity: dimOthers && hasHighlights ? 0.4 : 1,
            }}
          />
        );
      })}

      {/* House numbers */}
      {showLines && Object.entries(housePositions).map(([num, pos]) => {
        const isHighlighted = highlightHouses.includes(parseInt(num));
        return (
          <text key={`h${num}`} x={pos[0]} y={pos[1]}
            textAnchor="middle" dominantBaseline="central"
            fill={isHighlighted ? '#a0783c' : '#a0783c'}
            fontSize={S < 180 ? 7 : 9} fontWeight="500"
            fontFamily="'JioType','Outfit',sans-serif"
            opacity={dimOthers && hasHighlights && !isHighlighted ? 0.1 : 0.5}
            style={{
              animation: `fadeIn 300ms ease-out ${600 + parseInt(num)*50}ms both`,
              transition: 'opacity 400ms ease-out',
            }}>
            {num}
          </text>
        );
      })}

      {/* Planet abbreviations */}
      {showPlanets && Object.entries(PLANETS_IN_HOUSES).map(([house, planets]) =>
        planets.map((p, pi) => {
          const pos = getPlanetPos(parseInt(house), pi, planets.length);
          const isGlowing = glowPlanets.includes(p.name);
          const isDimmed = dimOthers && hasHighlights && !isGlowing;
          return (
            <g key={`${house}-${p.abbr}`}
              style={{ animation: `planetDrop 400ms ease-out ${1200 + parseInt(house)*100 + pi*60}ms both` }}>
              {/* BOLD focus effect — impossible to miss */}
              {isGlowing && (
                <>
                  {/* Large colored backdrop circle */}
                  <circle cx={pos[0]} cy={pos[1]} r={S < 180 ? 18 : 26}
                    fill={p.color} opacity={0.2}
                    style={{ animation: 'breathe 1.5s ease-in-out infinite' }} />
                  {/* Expanding ripple 1 */}
                  <circle cx={pos[0]} cy={pos[1]} r={S < 180 ? 16 : 22}
                    fill="none" stroke={p.color} strokeWidth={2.5}
                    style={{ animation: 'rippleOut 1.8s ease-out infinite', transformOrigin: `${pos[0]}px ${pos[1]}px` }} />
                  {/* Expanding ripple 2 */}
                  <circle cx={pos[0]} cy={pos[1]} r={S < 180 ? 16 : 22}
                    fill="none" stroke={p.color} strokeWidth={2}
                    style={{ animation: 'rippleOut 1.8s ease-out 600ms infinite', transformOrigin: `${pos[0]}px ${pos[1]}px` }} />
                  {/* Expanding ripple 3 */}
                  <circle cx={pos[0]} cy={pos[1]} r={S < 180 ? 16 : 22}
                    fill="none" stroke={p.color} strokeWidth={1.5}
                    style={{ animation: 'rippleOut 1.8s ease-out 1200ms infinite', transformOrigin: `${pos[0]}px ${pos[1]}px` }} />
                  {/* Bright solid inner circle */}
                  <circle cx={pos[0]} cy={pos[1]} r={S < 180 ? 13 : 18}
                    fill={p.color} opacity={0.35}
                    style={{ animation: 'breathe 1s ease-in-out infinite' }} />
                  {/* Sparkle particles */}
                  {[0, 45, 90, 135, 180, 225, 270, 315].map((angle, si) => {
                    const dist = S < 180 ? 24 : 34;
                    const sx = pos[0] + Math.cos(angle * Math.PI/180) * dist;
                    const sy = pos[1] + Math.sin(angle * Math.PI/180) * dist;
                    return (
                      <circle key={`sp${si}`} cx={sx} cy={sy} r={2}
                        fill={p.color}
                        style={{ animation: `sparkle 1.2s ease-in-out ${si * 150}ms infinite`, transformOrigin: `${sx}px ${sy}px` }} />
                    );
                  })}
                </>
              )}
              {/* Planet text label — BIG when glowing */}
              <text x={pos[0]} y={pos[1] + 1} textAnchor="middle" dominantBaseline="central"
                fill={isGlowing ? '#fff' : p.color}
                fontSize={isGlowing ? pFontSize + 6 : pFontSize}
                fontWeight="900"
                fontFamily="'JioType','Outfit',sans-serif"
                opacity={isDimmed ? 0.15 : 1}
                filter={isGlowing ? 'url(#planetFocusGlow)' : 'none'}
                style={{
                  transition: 'font-size 400ms ease-out, opacity 400ms ease-out',
                }}>
                {p.abbr}{p.retro ? 'ᴿ' : ''}
              </text>
            </g>
          );
        })
      )}
    </svg>
  );
};


/* ═══════════════════════════════════════
   COSMIC BACKGROUND AUDIO (ambient pad)
   ═══════════════════════════════════════ */
const COSMIC_BG_SRC = 'cosmic_bg.wav';


/* ═══════════════════════════════════════
   MOMENT 1 — Chart Assembly (5s)
   ═══════════════════════════════════════ */
const ChartAssembly = ({ onComplete }) => {
  const [phase, setPhase] = useState('idle');
  const [statusText, setStatusText] = useState('');
  const bgAudioRef = useRef(null);

  useEffect(() => {
    // Start cosmic background music
    if (bgAudioRef.current) {
      bgAudioRef.current.volume = 0.35;
      bgAudioRef.current.play().catch(() => {});
    }
    return () => { if (bgAudioRef.current) bgAudioRef.current.pause(); };
  }, []);

  useEffect(() => {
    const timers = [
      setTimeout(() => { setPhase('lines'); setStatusText('Kundli ki rekhaayein khich rahi hain...'); }, 400),
      setTimeout(() => setStatusText('Bhaav sthaapit ho rahe hain...'), 2200),
      setTimeout(() => { setPhase('houses'); setStatusText('Baara bhaav sthaapit ho gaye'); }, 3500),
      setTimeout(() => { setPhase('planets'); setStatusText('Grah apni jagah baith rahe hain...'); }, 5000),
      setTimeout(() => setStatusText('Mangal... Surya... Budh... Shani...'), 6500),
      setTimeout(() => { setPhase('glow'); setStatusText('Aapki kundli taiyaar hai ✦'); }, 8500),
      setTimeout(() => onComplete(), 10500),
    ];
    return () => timers.forEach(clearTimeout);
  }, []);

  return (
    <div style={{
      height: '100%', display: 'flex', flexDirection: 'column',
      alignItems: 'center', justifyContent: 'center',
      background: '#0a0a14', padding: 20,
    }}>
      {/* Cosmic ambient background */}
      <audio ref={bgAudioRef} src={COSMIC_BG_SRC} loop preload="auto" />

      {/* Title */}
      <div style={{
        marginBottom: 28, textAlign: 'center',
        animation: 'fadeIn 500ms ease-out both',
      }}>
        <div style={{
          fontSize: 10, fontWeight: 700, textTransform: 'uppercase',
          letterSpacing: '0.1em', color: 'var(--secondary-40)', marginBottom: 6,
        }}>
          Vedic Kundli
        </div>
        <div style={{
          fontSize: 18, fontWeight: 800, color: 'var(--white)',
          letterSpacing: '-0.02em',
        }}>
          Aapki Kundli Ban Rahi Hai
        </div>
      </div>

      {/* Chart */}
      <NorthIndianChart
        size={250}
        animatePhase={phase === 'idle' ? 'none' : phase === 'lines' ? 'lines' : phase === 'houses' ? 'lines' : phase === 'planets' ? 'planets' : 'glow'}
        highlightHouses={[]}
        glowPlanets={[]}
      />

      {/* Status text */}
      <div key={statusText} style={{
        marginTop: 28, textAlign: 'center',
        animation: 'fadeInUp 400ms ease-out both',
      }}>
        <span style={{
          fontSize: 14, fontWeight: 500, color: 'rgba(255,255,255,0.6)',
        }}>
          {statusText}
        </span>
      </div>

      {/* Subtle loading bar */}
      <div style={{
        marginTop: 16, width: 120, height: 3, borderRadius: 999,
        background: 'rgba(255,255,255,0.1)', overflow: 'hidden',
      }}>
        <div style={{
          height: '100%', borderRadius: 999,
          background: 'var(--secondary-40)',
          width: phase === 'idle' ? '0%' : phase === 'lines' ? '25%' : phase === 'houses' ? '45%' : phase === 'planets' ? '70%' : '100%',
          transition: 'width 1.5s ease-out',
        }} />
      </div>
    </div>
  );
};


/* ═══════════════════════════════════════
   MOMENT 2 — Grand Narrated Reveal (30s)
   ═══════════════════════════════════════ */

/* ═══ Audio chunk timings (Hindi-script TTS v4 — "ye dekhiye" style) ═══
   Chunk 1: 0ms      — 17741ms  (Lagna + Mars)
   Chunk 2: 17741ms  — 35188ms  (Budhaditya Yog)
   Chunk 3: 35188ms  — 51927ms  (Raj Yog + Saturn + golden period)
   Chunk 4: 51927ms  — 70473ms  (Moon + personality)
   Chunk 5: 70473ms  — 86809ms  (Score + closing + golden period ending)
*/
const REVEAL_BEATS = [
  // ── Chunk 1: शिवाली जी नमस्कार! ये देखिए मंगल लग्न में ──

const NarrationReveal = ({ onComplete, onSkip }) => {
  const [beatIndex, setBeatIndex] = useState(-1);
  const [showSkip, setShowSkip] = useState(false);
  const [audioPlaying, setAudioPlaying] = useState(false);
  const [started, setStarted] = useState(false);
  const audioRef = useRef(null);
  const bgRef = useRef(null);
  const timersRef = useRef([]);

  const startNarration = () => {
    if (started) return;
    setStarted(true);
    if (audioRef.current) {
      audioRef.current.play().then(() => setAudioPlaying(true)).catch(e => console.log('Audio err:', e));
    }
    // Soft cosmic ambient behind voice
    if (bgRef.current) {
      bgRef.current.volume = 0.15;
      bgRef.current.play().catch(() => {});
    }
    REVEAL_BEATS.forEach((beat, i) => {
      const t = setTimeout(() => setBeatIndex(i), beat.time + 300);
      timersRef.current.push(t);
    });
    setBeatIndex(0);
    const skipT = setTimeout(() => setShowSkip(true), 5000);
    const endT = setTimeout(() => onComplete(), 89000);
    timersRef.current.push(skipT, endT);
  };

  useEffect(() => {
    return () => timersRef.current.forEach(clearTimeout);
  }, []);

  const handleSkip = () => {
    timersRef.current.forEach(clearTimeout);
    if (audioRef.current) { audioRef.current.pause(); }
    if (bgRef.current) { bgRef.current.pause(); }
    onSkip();
  };

  const currentBeat = beatIndex >= 0 ? REVEAL_BEATS[beatIndex] : null;
  const glowPlanets = currentBeat ? currentBeat.planets : [];
  const highlightHouses = currentBeat ? currentBeat.houses : [];
  const hasFocus = glowPlanets.length > 0 || highlightHouses.length > 0;

      background: '#0a0a14', position: 'relative', overflow: 'hidden',

const CountUpNumber = ({ target, duration = 1000 }) => {
  const [value, setValue] = useState(0);
  useEffect(() => {
    let start = 0;
    const step = target / (duration / 16);
    const interval = setInterval(() => {
      start += step;
      if (start >= target) { setValue(target); clearInterval(interval); }
      else setValue(Math.floor(start));
    }, 16);
    return () => clearInterval(interval);
  }, [target]);
  return <span>{value}</span>;
};

const ArcGauge = ({ score, animate }) => {
  const r = 44, sw = 5, cx = 50, cy = 48;
  const circ = Math.PI * r;
  const target = circ - (circ * score / 100);
  return (
    <div style={{ position: 'relative', width: 100, height: 60, margin: '0 auto' }}>
      <svg width={100} height={60} viewBox="0 0 100 60">
        <path d={`M ${cx-r} ${cy} A ${r} ${r} 0 0 1 ${cx+r} ${cy}`}
          fill="none" stroke="var(--primary-70)" strokeWidth={sw}
          opacity={0.38} strokeLinecap="round" />
        <path d={`M ${cx-r} ${cy} A ${r} ${r} 0 0 1 ${cx+r} ${cy}`}
          fill="none" stroke="var(--sparkle-50)" strokeWidth={sw}
          strokeLinecap="round" strokeDasharray={circ}
          strokeDashoffset={animate ? target : circ}
          style={{ transition: animate ? 'stroke-dashoffset 1.2s ease-out' : 'none' }} />
      </svg>
      <div style={{
        position: 'absolute', bottom: 0, left: '50%',
        transform: 'translateX(-50%)', textAlign: 'center',
      }}>
        <div style={{
          fontSize: 28, fontWeight: 900, letterSpacing: '-0.03em',
          color: 'var(--text-on-bold)', lineHeight: 1,
        }}>
          {animate ? <CountUpNumber target={score} duration={1200} /> : 0}
        </div>
      </div>
    </div>
  );
};

      </div>
    </div>
  );
};

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
