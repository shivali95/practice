<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Sarkar Saathi — Awaaz</title>
<style>
@font-face{font-family:'JioType';font-weight:400;src:url('https://raw.githubusercontent.com/sunit1986/JioBharatIQ_Server/main/assets/fonts/woff2/JioTypeVarW05-Regular.woff2') format('woff2');}
@font-face{font-family:'JioType';font-weight:500;src:url('https://raw.githubusercontent.com/sunit1986/JioBharatIQ_Server/main/assets/fonts/woff2/JioTypeW05-Medium.woff2') format('woff2');}
@font-face{font-family:'JioType';font-weight:700;src:url('https://raw.githubusercontent.com/sunit1986/JioBharatIQ_Server/main/assets/fonts/woff2/JioTypeW05-Bold.woff2') format('woff2');}
@font-face{font-family:'JioType';font-weight:900;src:url('https://raw.githubusercontent.com/sunit1986/JioBharatIQ_Server/main/assets/fonts/woff2/JioTypeW05-Black.woff2') format('woff2');}

:root{
  --blue:#003580; --blue-mid:#1a4fa8; --blue-light:#e8eefb; --blue-dark:#001f50;
  --green:#1a6b3c; --green-bg:#e6f4ec; --green-20:#c3e6d2;
  --red:#e53935; --orange:#b85e00;
  --text:#0c0d10; --text2:rgba(25,27,30,0.6);
  --stroke:rgba(36,38,43,0.12);
  --pill:999px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{overscroll-behavior:none;touch-action:manipulation;}
body{font-family:'JioType',-apple-system,sans-serif;background:#d4d4d4;display:flex;justify-content:center;align-items:flex-start;min-height:100vh;padding:24px 0;}
@media(max-width:768px){body{background:#fff!important;padding:0!important;}.phone-frame{width:100%!important;height:100vh!important;height:100dvh!important;border-radius:0!important;box-shadow:none!important;}}
.phone-frame{width:360px;height:800px;background:#fff;position:relative;overflow:hidden;display:flex;flex-direction:column;border-radius:32px;box-shadow:0 28px 80px rgba(0,0,0,0.22);}

/* ════════ LANDING ════════ */
.landing{position:absolute;inset:0;z-index:500;
  background:linear-gradient(168deg,#000c1e 0%,#001a40 35%,#003580 70%,#1a4fa8 100%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px;}
.landing.exit{animation:lExit 360ms ease-in forwards;pointer-events:none;}
@keyframes lExit{to{opacity:0;transform:translateY(-28px) scale(.97)}}

.ld-logo{font-size:54px;margin-bottom:14px;filter:drop-shadow(0 6px 24px rgba(0,0,0,.5));}
.ld-name{font-size:36px;font-weight:900;color:#fff;letter-spacing:-.035em;margin-bottom:5px;}
.ld-tag{font-size:13px;color:rgba(255,255,255,.55);font-weight:500;text-align:center;line-height:1.7;margin-bottom:64px;}

.orb-wrap{position:relative;width:130px;height:130px;display:flex;align-items:center;justify-content:center;margin-bottom:28px;}
.orb-ring{position:absolute;border-radius:50%;border:2px solid rgba(255,255,255,.2);pointer-events:none;}
.orb-ring-1{width:130px;height:130px;animation:orbRing 2.6s ease-out infinite;}
.orb-ring-2{width:168px;height:168px;animation:orbRing 2.6s ease-out infinite .55s;}
.orb-ring-3{width:206px;height:206px;animation:orbRing 2.6s ease-out infinite 1.1s;}
@keyframes orbRing{0%{opacity:.6;transform:scale(.82)}100%{opacity:0;transform:scale(1)}}
.orb-btn{width:96px;height:96px;border-radius:50%;background:#fff;border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 12px 44px rgba(0,0,0,.38);transition:transform 130ms;z-index:2;position:relative;}
.orb-btn:active{transform:scale(.9);}
.orb-btn svg{width:42px;height:42px;fill:var(--blue);}

.ld-hint{font-size:15px;font-weight:700;color:rgba(255,255,255,.82);letter-spacing:.02em;margin-bottom:20px;}
.ld-pill{display:flex;align-items:center;gap:7px;background:rgba(255,255,255,.09);
  border:1px solid rgba(255,255,255,.18);border-radius:var(--pill);padding:7px 16px;}
.ld-dot{width:8px;height:8px;border-radius:50%;background:#4cef90;animation:dotPulse 2s ease infinite;}
@keyframes dotPulse{0%,100%{opacity:1}50%{opacity:.35}}
.ld-pill-txt{font-size:12px;color:rgba(255,255,255,.72);font-weight:600;}

/* ════════ HEADER ════════ */
.v-hdr{height:56px;padding:0 12px;display:flex;align-items:center;gap:8px;
  flex-shrink:0;border-bottom:1px solid var(--stroke);background:#fff;}
.v-back{width:40px;height:40px;border:none;background:transparent;cursor:pointer;
  border-radius:50%;display:flex;align-items:center;justify-content:center;}
.v-back svg{width:24px;height:24px;fill:#170054;}
.v-hdr-info{flex:1;}
.v-hdr-name{font-size:16px;font-weight:700;color:var(--text);}
.v-hdr-sub{font-size:11px;color:var(--text2);}
.v-badge{background:var(--blue-light);color:var(--blue);border-radius:var(--pill);padding:4px 10px;font-size:11px;font-weight:700;}

/* ════════ CONVERSATION ════════ */
.conv{flex:1;overflow-y:auto;overflow-x:clip;padding:16px;display:flex;flex-direction:column;gap:12px;scrollbar-width:none;}
.conv::-webkit-scrollbar{display:none;}

.ai-row{display:flex;gap:8px;align-items:flex-end;animation:bUp 280ms ease-out;}
.ai-av{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--blue),var(--blue-mid));
  display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;}
.ai-bub{background:var(--blue-light);border-radius:18px 18px 18px 4px;
  padding:12px 15px;max-width:248px;font-size:14px;line-height:1.65;color:var(--text);font-weight:500;}

.usr-row{display:flex;justify-content:flex-end;animation:bUp 200ms ease-out;}
.usr-bub{background:var(--blue);color:#fff;border-radius:18px 18px 4px 18px;
  padding:12px 15px;max-width:220px;font-size:14px;line-height:1.55;font-weight:500;}

@keyframes bUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

.typing-row{display:flex;gap:8px;align-items:flex-end;animation:bUp 200ms ease-out;}
.tdots{background:var(--blue-light);border-radius:18px 18px 18px 4px;padding:13px 16px;display:flex;gap:4px;align-items:center;}
.td{width:7px;height:7px;border-radius:50%;background:var(--blue);animation:tdA 1.1s ease-in-out infinite;}
.td:nth-child(2){animation-delay:.18s;}.td:nth-child(3){animation-delay:.36s;}
@keyframes tdA{0%,80%,100%{transform:scale(.45);opacity:.35}40%{transform:scale(1);opacity:1}}

.listen-row{display:flex;gap:8px;align-items:flex-end;animation:bUp 200ms ease-out;}
.listen-bub{background:#fff;border:2px solid var(--red);border-radius:18px 18px 18px 4px;
  padding:10px 15px;display:flex;align-items:center;gap:8px;}
.ld{width:7px;height:7px;border-radius:50%;background:var(--red);animation:tdA .95s ease-in-out infinite;}
.ld:nth-child(2){animation-delay:.15s;}.ld:nth-child(3){animation-delay:.3s;}
.listen-txt{font-size:13px;color:var(--red);font-weight:700;}

/* ════════ SCHEME CARD ════════ */
.scheme-card{border-radius:16px;border:1px solid var(--stroke);overflow:hidden;animation:bUp 380ms ease-out;width:100%;}
.sc-hd{display:flex;align-items:center;gap:10px;padding:13px 14px;color:#fff;}
.sc-ico{font-size:24px;flex-shrink:0;}
.sc-nm{font-size:14px;font-weight:800;line-height:1.2;}
.sc-min{font-size:10px;opacity:.72;margin-top:2px;}
.sc-bd{padding:13px 14px 15px;background:#fff;}
.sc-amt{font-size:26px;font-weight:900;color:var(--text);letter-spacing:-.02em;}
.sc-det{font-size:12px;color:var(--text2);margin-top:3px;margin-bottom:11px;}
.sc-match{display:inline-block;background:var(--green-bg);color:var(--green);
  border-radius:var(--pill);padding:4px 11px;font-size:11px;font-weight:700;margin-bottom:12px;}
.sc-cta{width:100%;background:var(--blue);color:#fff;border:none;border-radius:var(--pill);
  padding:11px;font-size:13px;font-weight:700;cursor:pointer;font-family:'JioType',sans-serif;}

/* ════════ DOC CARD ════════ */
.doc-card{border-radius:14px;border:1px solid var(--stroke);background:#fff;overflow:hidden;animation:bUp 380ms ease-out;width:100%;}
.doc-hd{background:var(--blue);color:#fff;padding:10px 14px;font-size:13px;font-weight:700;}
.doc-row{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid var(--stroke);}
.doc-row:last-of-type{border-bottom:none;}
.doc-ico{font-size:18px;flex-shrink:0;}
.doc-info{flex:1;}
.doc-name{font-size:13px;font-weight:700;color:var(--text);}
.doc-st{font-size:11px;color:var(--text2);margin-top:1px;}
.doc-st.ok{color:var(--green);font-weight:600;}
.doc-btn{background:var(--blue-light);color:var(--blue);border:1.5px solid var(--blue);
  border-radius:var(--pill);padding:5px 12px;font-size:11px;font-weight:700;
  font-family:'JioType',sans-serif;cursor:pointer;flex-shrink:0;white-space:nowrap;}
.doc-btn.done{background:var(--green-bg);color:var(--green);border-color:var(--green-20);cursor:default;}
.doc-verify-row{padding:11px 14px;border-top:1px solid var(--stroke);}
.doc-verify{width:100%;background:var(--blue);color:#fff;border:none;border-radius:var(--pill);
  padding:11px;font-size:13px;font-weight:700;font-family:'JioType',sans-serif;cursor:pointer;}
.doc-verify:disabled{opacity:.38;cursor:default;}

/* ════════ MIC BAR ════════ */
.mic-bar{flex-shrink:0;padding:8px 24px 20px;background:#fff;
  display:flex;flex-direction:column;align-items:center;gap:5px;
  border-top:1px solid var(--stroke);}
.mic-status{font-size:12px;font-weight:600;color:var(--text2);min-height:17px;text-align:center;}
.mic-wrap{position:relative;width:80px;height:80px;display:flex;align-items:center;justify-content:center;}
.mic-ring{position:absolute;border-radius:50%;border:2.5px solid rgba(229,57,53,.35);opacity:0;pointer-events:none;}
.mic-ring.on{animation:mRing 1.4s ease-out infinite;}
.mic-ring.r1{width:80px;height:80px;}
.mic-ring.r2{width:102px;height:102px;animation-delay:.35s;}
@keyframes mRing{0%{opacity:.65;transform:scale(.8)}100%{opacity:0;transform:scale(1)}}
.mic-btn{width:68px;height:68px;border-radius:50%;border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  position:relative;z-index:2;box-shadow:0 6px 22px rgba(0,0,0,.2);transition:background 200ms,transform 110ms;}
.mic-btn:active{transform:scale(.9);}
.mic-btn svg{width:30px;height:30px;fill:#fff;}
.mic-hint{font-size:11px;color:rgba(0,53,128,.45);font-weight:500;}
</style>
</head>
<body>
<div class="phone-frame">

<!-- LANDING -->
<div class="landing" id="landing">
  <div class="ld-logo">🏛️</div>
  <div class="ld-name">Sarkar Saathi</div>
  <div class="ld-tag">Sarkari yojana ki jaankari<br>Hindi mein, awaaz se</div>
  <div class="orb-wrap">
    <div class="orb-ring orb-ring-1"></div>
    <div class="orb-ring orb-ring-2"></div>
    <div class="orb-ring orb-ring-3"></div>
    <button class="orb-btn" onclick="startConv()">
      <svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 2.99-1.34 2.99-3L15 5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5.3-3c0 3-2.54 5.1-5.3 5.1S6.7 14 6.7 11H5c0 3.41 2.72 6.23 6 6.72V21h2v-3.28c3.28-.48 6-3.3 6-6.72h-1.7z"/></svg>
    </button>

<!-- HEADER -->
<div class="v-hdr" id="vHdr" style="display:none">
  <button class="v-back" onclick="resetToLanding()">
    <svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
  </button>
  <div class="v-hdr-info">
    <div class="v-hdr-name">Sarkar Saathi</div>
    <div class="v-hdr-sub">AI Government Guide · Hindi</div>
  </div>

</div>

<!-- CONVERSATION -->
<div class="conv" id="conv" style="display:none"></div>

<!-- MIC BAR -->
<div class="mic-bar" id="micBar" style="display:none">
  <div class="mic-status" id="micStatus">Taiyaar ho raha hoon...</div>
  <div class="mic-wrap">
    <div class="mic-ring r1" id="mRing1"></div>
    <div class="mic-ring r2" id="mRing2"></div>
    <button class="mic-btn" id="micBtn" style="background:var(--blue)" onclick="onMicTap()">
      <svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 2.99-1.34 2.99-3L15 5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5.3-3c0 3-2.54 5.1-5.3 5.1S6.7 14 6.7 11H5c0 3.41 2.72 6.23 6 6.72V21h2v-3.28c3.28-.48 6-3.3 6-6.72h-1.7z"/></svg>
    </button>
  </div>
  <div class="mic-hint" id="micHint">Pehle main bolunga, phir aap</div>
</div>

</div>

<script>
'use strict';

// ── Config ──
const SARVAM_KEY = 'sk_a7i71nh2_SpaJY8tL2k4LagAgdBwJe85S';
const SARVAM_URL = 'https://api.sarvam.ai/text-to-speech';

// ── DOM ──
const $conv    = document.getElementById('conv');
const $micBtn  = document.getElementById('micBtn');
const $mRing1  = document.getElementById('mRing1');
const $mRing2  = document.getElementById('mRing2');
const $mStatus = document.getElementById('micStatus');
const $mHint   = document.getElementById('micHint');

// ── State ──
let turn         = 0;
let listening    = false;
let speaking     = false;
let currentAudio = null;
let recognition  = null;
let docUploaded  = {};

// ── Conversation script ──
const SC = {
  greet:   "Namaste! Main Sarkar Saathi hoon — aapka sarkari yojana mein madad karne wala AI saathi. Bataiye, kya madad chahiye?",
  ack0:    "Zaroor! Pehle mujhe thodi si jaankari chahiye.",
  q1:      "Pehla sawaal — aap kya kaam karte hain? Kheti karte hain, ya koi naukri, ya kuch aur?",
  ack1:    "Achha, aap kisan hain. Bahut achha.",
  q2:      "Ab bataiye — ghar ki saal bhar ki kamaai karib kitni hai? Ek lakh se kam hai, ya zyada?",
  result:  "Mujhe ek bahut achhi scheme mili! PM Kisan Samman Nidhi. Isme aapko har saal chha hazaar rupaye milenge — do do hazaar ki teen kisht mein, seedha bank account mein. Yeh scheme bilkul aap jaise chote kisanon ke liye bani hai.",
  askDocs: "Kya aap jaanna chahenge ki is scheme ke liye kaun se documents chahiye?",
  docs:    "Is scheme ke liye teen cheezein chahiye. Ek — Aadhaar card. Do — Zameen ka record yaani Khatauni. Teen — Bank passbook. Inhe upload karke verify karo, main check karunga.",
};

// ══════════════════════════════════════
// SARVAM TTS
// ══════════════════════════════════════
async function speak(text, onDone) {
  if (currentAudio) { currentAudio.pause(); currentAudio = null; }
  speaking = true;
  setMic('speaking');

  try {
    const res = await fetch(SARVAM_URL, {
      method: 'POST',
      headers: {
        'api-subscription-key': SARVAM_KEY,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        inputs: [text],
        target_language_code: 'hi-IN',
        speaker: 'arvind',
        model: 'bulbul:v1',
        pace: 0.95,
        pitch: 0,
        loudness: 1.5,
        enable_preprocessing: true,
        speech_sample_rate: 22050
      })
    });

    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    const b64  = data.audios?.[0];
    if (!b64) throw new Error('No audio');

    const audio = new Audio('data:audio/wav;base64,' + b64);
    currentAudio = audio;
    audio.onended = () => { speaking = false; currentAudio = null; setMic('idle'); onDone?.(); };
    audio.onerror = () => { speaking = false; currentAudio = null; setMic('idle'); onDone?.(); };
    await audio.play();

  } catch (err) {
    console.warn('Sarvam TTS error — using browser fallback:', err.message);
    speaking = false;
    fallbackSpeak(text, onDone);
  }
}

function fallbackSpeak(text, onDone) {
  const synth = window.speechSynthesis;
  synth.cancel();
  speaking = true;
  setMic('speaking');
  const utt = new SpeechSynthesisUtterance(text);
  const voices = synth.getVoices();
  utt.voice = voices.find(v => v.lang === 'hi-IN') || voices.find(v => v.lang.startsWith('hi')) || null;
  utt.lang  = 'hi-IN';
  utt.rate  = 0.88;
  utt.pitch = 1.0;
  utt.onend = utt.onerror = () => { speaking = false; setMic('idle'); onDone?.(); };
  synth.speak(utt);
  // Chrome stuck-speech fix
  const t = setInterval(() => { if (!synth.speaking) clearInterval(t); else synth.resume(); }, 5000);
}

// ══════════════════════════════════════
// MIC UI
// ══════════════════════════════════════
function setMic(state) {
  const S = {
    idle:     { bg:'var(--blue)', rings:false, status:'Tap karke baat karo',    hint:'🎙️ Aap baat kar sakte hain' },
    listening:{ bg:'#e53935',    rings:true,  status:'🔴  Sun raha hoon...',    hint:'Boliye, main sun raha hoon' },
    speaking: { bg:'var(--blue)', rings:false, status:'🔊  Bol raha hoon...',   hint:'Sarkar Saathi bol raha hai' },
    loading:  { bg:'#6b7280',    rings:false, status:'⏳  Dhundh raha hoon...', hint:'Ek second...' },
  };
  const s = S[state] || S.idle;
  $micBtn.style.background = s.bg;
  $mRing1.classList.toggle('on', s.rings);
  $mRing2.classList.toggle('on', s.rings);
  $mStatus.textContent = s.status;
  $mHint.textContent   = s.hint;
}

// ══════════════════════════════════════
// BUBBLES
// ══════════════════════════════════════
function addAI(html) {
  const d = document.createElement('div');
  d.className = 'ai-row';
  d.innerHTML = `<div class="ai-av">🏛️</div><div class="ai-bub">${html}</div>`;
  $conv.appendChild(d);
  scrollDown();
  return d;
}
function addUser(text) {
  const d = document.createElement('div');
  d.className = 'usr-row';
  d.innerHTML = `<div class="usr-bub">${text}</div>`;
  $conv.appendChild(d);
  scrollDown();
}
function showTyping() {
  const d = document.createElement('div');
  d.className = 'typing-row'; d.id = 'typing';
  d.innerHTML = `<div class="ai-av">🏛️</div><div class="tdots"><div class="td"></div><div class="td"></div><div class="td"></div></div>`;
  $conv.appendChild(d); scrollDown();
}
function hideTyping() { document.getElementById('typing')?.remove(); }
function showListening() {
  const d = document.createElement('div');
  d.className = 'listen-row'; d.id = 'listenRow';
  d.innerHTML = `<div class="ai-av" style="background:linear-gradient(135deg,#e53935,#ff5722)">🎙️</div>
    <div class="listen-bub"><div class="ld"></div><div class="ld"></div><div class="ld"></div>
    <span class="listen-txt">Sun raha hoon...</span></div>`;
  $conv.appendChild(d); scrollDown();
}
function hideListening() { document.getElementById('listenRow')?.remove(); }
function scrollDown() { setTimeout(() => $conv.scrollTo({ top:$conv.scrollHeight, behavior:'smooth' }), 60); }

// ══════════════════════════════════════
// CARDS
// ══════════════════════════════════════
function showSchemeCard() {
  const c = document.createElement('div');
  c.className = 'scheme-card';
  c.innerHTML = `
    <div class="sc-hd" style="background:#1a6b3c">
      <span class="sc-ico">🌾</span>
      <div><div class="sc-nm">PM Kisan Samman Nidhi</div><div class="sc-min">Ministry of Agriculture, GoI</div></div>
    </div>
    <div class="sc-bd">
      <div class="sc-amt">₹6,000 / saal</div>
      <div class="sc-det">Do-do hazaar ki teen kisht · Seedha bank mein</div>
      <div class="sc-match">✦ High Confidence Match</div>
      <button class="sc-cta" onclick="triggerDocFlow()">📋 Documents check karo →</button>
    </div>`;
  $conv.appendChild(c); scrollDown();
}

function showDocCard() {
  const c = document.createElement('div');
  c.className = 'doc-card';
  c.innerHTML = `
    <div class="doc-hd">📤 Documents chahiye — PM Kisan</div>
    ${[['🪪','Aadhaar Card','d0'],['📜','Zameen ka Record (Khatauni)','d1'],['🏦','Bank Passbook','d2']].map(([ico,name,id])=>`
    <div class="doc-row">
      <span class="doc-ico">${ico}</span>
      <div class="doc-info"><div class="doc-name">${name}</div><div class="doc-st" id="st-${id}">Upload karein</div></div>
      <button class="doc-btn" id="btn-${id}" onclick="tapDoc('${id}')">📤 Upload</button>
    </div>`).join('')}
    <div class="doc-verify-row">
      <button class="doc-verify" id="verifyBtn" disabled onclick="verifyDocs()">Verify Karo</button>
    </div>`;
  $conv.appendChild(c); scrollDown();
}

function tapDoc(id) {
  docUploaded[id] = true;
  document.getElementById('btn-'+id).className = 'doc-btn done';
  document.getElementById('btn-'+id).textContent = '✓ Ho gaya';
  document.getElementById('st-'+id).textContent  = 'Upload ho gaya';
  document.getElementById('st-'+id).className    = 'doc-st ok';
  if (docUploaded.d0 && docUploaded.d1 && docUploaded.d2) {
    const v = document.getElementById('verifyBtn');
    v.disabled = false; v.textContent = '✓ Verify Karo';
  }
}

function verifyDocs() {
  addUser("Verify karo");
  showTyping();
  setMic('loading');
  setTimeout(() => {
    hideTyping();
    addAI('✅ Aadhaar — Bilkul theek<br>⚠️ Khatauni — Naam mein antar: <strong>"Ramesh Kuma"</strong> vs <strong>"Ramesh Kumar"</strong><br>✅ Bank passbook — Theek hai');
    speak("Aapke do documents theek hain. Lekin zameen ke record mein naam mein thoda antar hai. Ramesh Kuma likha hua hai, jabki Aadhaar mein Ramesh Kumar hai. Yeh ek chhoti si baat hai — tehsil office mein free mein theek ho jaata hai, sirf saat se dus din mein. Baaki sab bilkul taiyaar hai!", () => setMic('idle'));
  }, 2200);
}

// ══════════════════════════════════════
// CONVERSATION TURNS
// ══════════════════════════════════════
const DEMO_DEFAULTS = [
  "Mujhe government scheme ke baare mein jaanna hai",
  "Kheti karta hoon",
  "Ek lakh se kam hai",
  "Haan, zaroor batao"
];

function processUserTurn(said) {
  hideListening();
  listening = false;
  const text = (said && said.trim()) ? said.trim() : DEMO_DEFAULTS[turn];
  addUser(text);
  const t = turn;
  turn++;

  if (t === 0) {
    setTimeout(() => {
      showTyping();
      setTimeout(() => {
        hideTyping();
        addAI(SC.ack0 + '<br><br>' + SC.q1);
        speak(SC.ack0 + ' ' + SC.q1, () => setMic('idle'));
      }, 700);
    }, 350);

  } else if (t === 1) {
    setTimeout(() => {
      showTyping();
      setTimeout(() => {
        hideTyping();
        addAI(SC.ack1 + '<br><br>' + SC.q2);
        speak(SC.ack1 + ' ' + SC.q2, () => setMic('idle'));
      }, 700);
    }, 350);

  } else if (t === 2) {
    setTimeout(() => {
      showTyping();
      setMic('loading');
      setTimeout(() => {
        hideTyping();
        addAI(SC.result);
        showSchemeCard();           // card appears as speech begins
        speak(SC.result, () => {
          setTimeout(() => {
            addAI(SC.askDocs);
            speak(SC.askDocs, () => setMic('idle'));
          }, 500);
        });
      }, 1400);
    }, 400);

  } else if (t === 3) {
    triggerDocFlow();
  }
}

function triggerDocFlow() {
  if (turn < 3) turn = 4;
  showTyping();
  setMic('loading');
  setTimeout(() => {
    hideTyping();
    addAI(SC.docs);
    showDocCard();
    speak(SC.docs, () => setMic('idle'));
  }, 700);
}

// ══════════════════════════════════════
// MIC TAP
// ══════════════════════════════════════
function onMicTap() {
  if (speaking) {
    currentAudio?.pause(); currentAudio = null;
    window.speechSynthesis?.cancel();
    speaking = false; setMic('idle'); return;
  }
  if (listening) {
    try { recognition?.stop(); } catch(e) {} return;
  }
  if (turn > 3) return;
  startListening();
}

function startListening() {
  listening = true;
  setMic('listening');
  showListening();

  if (!recognition) {
    setTimeout(() => { if (listening) processUserTurn(null); }, 2800);
    return;
  }

  let handled = false;
  function done(said) {
    if (handled) return; handled = true;
    processUserTurn(said);
  }
  recognition.onresult = e => done(e.results[0][0].transcript);
  recognition.onerror  = () => done(null);
  recognition.onend    = () => done(null);
  try { recognition.start(); } catch(e) { done(null); }
  setTimeout(() => done(null), 8000);
}

// ══════════════════════════════════════
// INIT / NAV
// ══════════════════════════════════════
function setupRecognition() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) return;
  recognition = new SR();
  recognition.lang = 'hi-IN';
  recognition.continuous = false;
  recognition.interimResults = false;
}

function startConv() {
  document.getElementById('landing').classList.add('exit');
  setTimeout(() => {
    document.getElementById('landing').style.display = 'none';
    document.getElementById('vHdr').style.display    = 'flex';
    $conv.style.display = 'flex';
    document.getElementById('micBar').style.display  = 'flex';
    setupRecognition();
    turn = 0;
    setTimeout(() => {
      addAI(SC.greet);
      speak(SC.greet, () => setMic('idle'));
    }, 380);
  }, 380);
}

function resetToLanding() {
  currentAudio?.pause(); currentAudio = null;
  window.speechSynthesis?.cancel();
  try { recognition?.stop(); } catch(e) {}
  speaking = listening = false;
  turn = 0; docUploaded = {};
  $conv.innerHTML = '';
  $conv.style.display = 'none';
  document.getElementById('vHdr').style.display   = 'none';
  document.getElementById('micBar').style.display = 'none';
  const ld = document.getElementById('landing');
  ld.style.display = 'flex';
  ld.classList.remove('exit');
}
</script>
