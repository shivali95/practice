  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    background: var(--grey-20); display: flex; align-items: flex-start;

    font-family: 'JioType', 'Outfit', sans-serif;
    min-height: 100vh; -webkit-font-smoothing: antialiased;

  .phone-frame { width: 360px; background: var(--white); border-radius: 40px; border: 8px solid #1a1a1a; box-shadow: 0 24px 64px rgba(0,0,0,0.18); overflow: hidden; position: relative; }
  .notch { background: #1a1a1a; height: 32px; display: flex; align-items: center; justify-content: center; }
  .notch-inner { width: 80px; height: 20px; background: #1a1a1a; border-radius: 0 0 14px 14px; }
  .status-bar { background: var(--white); padding: 6px 20px; display: flex; justify-content: space-between; font-size: 11px; font-weight: 700; color: var(--text-high); }
  .screen { height: 700px; overflow: hidden; position: relative; background: var(--white); }

  /* Scrollbar hidden */
  .scroll-feed::-webkit-scrollbar { display: none; }
  .scroll-feed { -ms-overflow-style: none; scrollbar-width: none; }
  .horiz-scroll::-webkit-scrollbar { display: none; }
  .horiz-scroll { -ms-overflow-style: none; scrollbar-width: none; }

  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes fadeInUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes fadeInScale { from { opacity: 0; transform: scale(0.92); } to { opacity: 1; transform: scale(1); } }
  @keyframes breathe { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
  @keyframes orbitSlow { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  @keyframes orbitReverse { from { transform: rotate(360deg); } to { transform: rotate(0deg); } }
  @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
  @keyframes pulseRing { 0% { transform: scale(1); opacity: 0.6; } 100% { transform: scale(1.8); opacity: 0; } }
  @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  @keyframes focusWordIn { 0% { opacity:0; transform:scale(0.6) translateY(30px); filter:blur(10px); } 30% { opacity:1; transform:scale(1.12) translateY(-6px); filter:blur(0); } 50% { transform:scale(0.98) translateY(0); } 70% { opacity:1; transform:scale(1) translateY(-2px); } 100% { opacity:0; transform:scale(0.95) translateY(-30px); filter:blur(4px); } }
  @keyframes focusTextIn { 0% { opacity:0; transform:scale(0.7) translateY(24px); filter:blur(8px); } 100% { opacity:1; transform:scale(1) translateY(0); filter:blur(0); } }
  @keyframes focusEmojiIn { 0% { opacity:0; transform:scale(0.3) rotate(-20deg); } 60% { opacity:1; transform:scale(1.15) rotate(4deg); } 100% { opacity:1; transform:scale(1) rotate(0deg); } }
  @keyframes focusLineIn { 0% { opacity:0; width:0; } 100% { opacity:1; width:60px; } }
  @keyframes slideDown { from { transform: translateY(0); } to { transform: translateY(100%); } }
  @keyframes slideInRight { from { opacity: 0; transform: translateX(40px); } to { opacity: 1; transform: translateX(0); } }
  @keyframes slideInLeft { from { opacity: 0; transform: translateX(-40px); } to { opacity: 1; transform: translateX(0); } }
  @keyframes coronaPulse { 0%, 100% { box-shadow: 0 0 30px 10px rgba(247,171,32,0.3), 0 0 60px 20px rgba(247,171,32,0.15); } 50% { box-shadow: 0 0 40px 15px rgba(247,171,32,0.4), 0 0 80px 30px rgba(247,171,32,0.2); } }
  @keyframes marsPulse { 0%, 100% { box-shadow: 0 0 20px 6px rgba(255,102,68,0.3); } 50% { box-shadow: 0 0 35px 12px rgba(255,102,68,0.5); } }
  @keyframes saturnFloat { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-4px); } }
  @keyframes fillBar { from { width: 0; } to { width: var(--fill); } }
  @keyframes countUp { from { opacity: 0; transform: scale(0.5); } to { opacity: 1; transform: scale(1); } }
  @keyframes staggerIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes borderGlow { 0%, 100% { border-color: var(--primary-30); } 50% { border-color: var(--sparkle-40); } }
  @keyframes soundWave { 0% { height: 4px; } 100% { height: 16px; } }
  @keyframes flameSpark { 0% { opacity: 0.8; transform: scale(1) translateY(0); } 100% { opacity: 0; transform: scale(0.3) translateY(-20px); } }
  @keyframes ringWave { 0% { transform: translate(-50%,-50%) rotateX(75deg) scale(1); opacity: 0.15; } 100% { transform: translate(-50%,-50%) rotateX(75deg) scale(1.1); opacity: 0.05; } }

  @keyframes moonTide { 0% { opacity: 0.3; transform: scale(0.95); } 100% { opacity: 0.6; transform: scale(1.1); } }
  @keyframes venusShimmer { 0% { opacity: 0.2; transform: scale(0.8); } 100% { opacity: 0.8; transform: scale(1.2); } }

// Cache generated audio so we don't re-call the API
const audioCache = {};

// Standalone TTS fetch (used by scene-synced cards + narration hook)
const fetchTTS = async (text, cacheKey, speaker = 'advait') => {

const useNarration = () => {
  const audioRef = useRef(null);
  const cancelledRef = useRef(false);
  const [speaking, setSpeaking] = useState(false);
  const [progress, setProgress] = useState(0);

  // Split text into chunks under 480 chars at sentence boundaries
  const chunkText = (text) => {
    if (text.length <= 480) return [text];
    const chunks = [];
    let remaining = text;
    while (remaining.length > 0) {
      if (remaining.length <= 480) { chunks.push(remaining); break; }
      const cut = remaining.substring(0, 480);
      let splitAt = -1;
      // Try sentence-ending punctuation
      for (const sep of ['।', '.', '!', '?']) {
        const idx = cut.lastIndexOf(sep);
        if (idx > 150 && idx > splitAt) splitAt = idx;
      }
      // Fallback to dash or comma
      if (splitAt < 0) {
        for (const sep of [' — ', ', ', '— ']) {
          const idx = cut.lastIndexOf(sep);
          if (idx > 150) { splitAt = idx + sep.length - 1; break; }
        }
      }
      if (splitAt < 0) splitAt = 479;
      chunks.push(remaining.substring(0, splitAt + 1).trim());
      remaining = remaining.substring(splitAt + 1).trim();
    }
    return chunks;
  };

  // Fetch audio for a single chunk (with cache) — ElevenLabs
  const fetchChunkAudio = async (chunkText, chunkKey, speaker) => {
    if (audioCache[chunkKey]) return audioCache[chunkKey];
    const voiceId = mapSpeaker(speaker);
    const resp = await fetch(ELEVEN_TTS_URL + voiceId, {
      method: 'POST',
      headers: { 'xi-api-key': ELEVEN_KEY, 'Content-Type': 'application/json' },
      body: JSON.stringify({
        text: chunkText,
        model_id: 'eleven_multilingual_v2',
        voice_settings: { stability: 0.5, similarity_boost: 0.75 },
      }),
    });
    if (!resp.ok) { console.warn('ElevenLabs TTS error:', await resp.text()); return null; }
    const blob = await resp.blob();
    const src = URL.createObjectURL(blob);
    audioCache[chunkKey] = src;
    return src;
  };

  const speak = useCallback(async (text, cacheKey, speaker = 'advait') => {
    // Stop any currently playing audio
    if (audioRef.current) { audioRef.current.pause(); audioRef.current = null; }
    cancelledRef.current = false;
    setSpeaking(true);
    setProgress(0);

    try {
      const chunks = chunkText(text);
      const totalChunks = chunks.length;

      for (let i = 0; i < totalChunks; i++) {
        if (cancelledRef.current) break;
        const chunkKey = totalChunks === 1 ? cacheKey : cacheKey + '_c' + i;
        const audioSrc = await fetchChunkAudio(chunks[i], chunkKey, speaker);
        if (!audioSrc || cancelledRef.current) break;

        // Play this chunk and wait for it to finish
        await new Promise((resolve, reject) => {
          const audio = new Audio(audioSrc);
          audioRef.current = audio;
          audio.ontimeupdate = () => {
            if (audio.duration) {
              const chunkProgress = audio.currentTime / audio.duration;
              setProgress((i + chunkProgress) / totalChunks);
            }
          };
          audio.onended = () => { audioRef.current = null; resolve(); };
          audio.onerror = () => { audioRef.current = null; reject(); };
          audio.play().catch(reject);
        });
      }
    } catch (err) {
      console.warn('ElevenLabs TTS error:', err);
    }
    if (!cancelledRef.current) {
      setSpeaking(false);
      setProgress(0);
    }
  }, []);

  const stop = useCallback(() => {
    cancelledRef.current = true;
    if (audioRef.current) { audioRef.current.pause(); audioRef.current = null; }
    setSpeaking(false);
    setProgress(0);
  }, []);

  const toggle = useCallback((text, cacheKey, speaker) => {
    if (speaking) { stop(); } else { speak(text, cacheKey, speaker); }
  }, [speaking, speak, stop]);

  return { speaking, progress, speak, stop, toggle };
};

/* ── Global audio prefetch queue — staggers ALL TTS requests across the page ── */
const _prefetchQueue = [];
let _prefetchRunning = false;
const queuePrefetch = (text, cacheKey, speaker) => {
  const chunks = chunkTextForTTS(text);
  chunks.forEach((chunk, ci) => {
    const key = chunks.length === 1 ? cacheKey : cacheKey + '_c' + ci;
    if (audioCache[key]) return;
    _prefetchQueue.push({ chunk, key, speaker });
  });
  if (!_prefetchRunning) _drainPrefetchQueue();
};
const _drainPrefetchQueue = async () => {
  _prefetchRunning = true;
  while (_prefetchQueue.length > 0) {
    const { chunk, key, speaker } = _prefetchQueue.shift();
    if (audioCache[key]) continue;
    try {
      const voiceId = mapSpeaker(speaker);
      const resp = await fetch(ELEVEN_TTS_URL + voiceId, {
        method: 'POST',
        headers: { 'xi-api-key': ELEVEN_KEY, 'Content-Type': 'application/json' },
        body: JSON.stringify({ text: chunk, model_id: 'eleven_multilingual_v2', voice_settings: { stability: 0.5, similarity_boost: 0.75 } }),
      });
      if (resp.ok) {
        const blob = await resp.blob();
        audioCache[key] = URL.createObjectURL(blob);
        console.log('Pre-cached', key);
      }
    } catch(e) { console.warn('Prefetch failed for', key); }
    // 400ms gap between requests to avoid rate-limiting
    await new Promise(r => setTimeout(r, 400));
  }
  _prefetchRunning = false;
};

/* The Living Solar System — orbit view */
const LivingSolarSystem = ({ onPlanetTap }) => {
  const containerRef = useRef(null);
  const [time, setTime] = useState(0);
  const [hintPlanet, setHintPlanet] = useState(null);
  const [dragOffset, setDragOffset] = useState(0);
  const dragRef = useRef({ dragging: false, startX: 0, startOffset: 0 });
  const SIZE = 320; // container size
  const CX = SIZE / 2, CY = SIZE / 2;

  // Animation loop
  useEffect(() => {
    let raf;
    const tick = () => { setTime(t => t + 0.06); raf = requestAnimationFrame(tick); };
    raf = requestAnimationFrame(tick);
    return () => cancelAnimationFrame(raf);
  }, []);

  // Pre-cache all planet audio on mount so tap → instant playback
  useEffect(() => { prefetchPlanetAudio(); prefetchCardAudio(); }, []);

  // Hint: strongest planet pulses after 4s idle
  useEffect(() => {
    const timer = setTimeout(() => {
      const strongest = ORBIT_PLANETS.reduce((a, b) => a.strength > b.strength ? a : b);
      setHintPlanet(strongest.id);
    }, 4000);
    return () => clearTimeout(timer);
  }, []);

  // Drag to rotate
  const onPointerDown = (e) => {
    dragRef.current = { dragging: true, startX: e.clientX, startOffset: dragOffset };
    setHintPlanet(null);
  };
  const onPointerMove = (e) => {
    if (!dragRef.current.dragging) return;
    const dx = e.clientX - dragRef.current.startX;
    setDragOffset(dragRef.current.startOffset + dx * 0.5);
  };
  const onPointerUp = () => { dragRef.current.dragging = false; };

  return (
    <div style={{ margin: '0 16px', borderRadius: 24, overflow: 'hidden',
      background: 'radial-gradient(ellipse at 50% 40%, #0c0028 0%, #050014 40%, #020008 100%)',
      padding: '20px 0 12px', position: 'relative',
      boxShadow: '0 8px 40px rgba(0,0,0,0.3), inset 0 0 60px rgba(53,53,243,0.05)',
      animation: 'fadeInUp 600ms ease-out 500ms both' }}>

      {/* Starfield */}
      {[...Array(30)].map((_, i) => (
        <div key={i} style={{ position: 'absolute',
          top: `${Math.random() * 100}%`, left: `${Math.random() * 100}%`,
          width: i % 5 === 0 ? 2 : 1, height: i % 5 === 0 ? 2 : 1, borderRadius: '50%',
          background: `rgba(255,255,255,${0.08 + Math.random() * 0.2})`,
          animation: i % 7 === 0 ? `breathe ${3 + Math.random() * 2}s ease-in-out infinite` : 'none' }} />
      ))}

      {/* Orbit container */}
      <div ref={containerRef} style={{ width: SIZE, height: SIZE, margin: '0 auto', position: 'relative', cursor: 'grab' }}
        onPointerDown={onPointerDown} onPointerMove={onPointerMove} onPointerUp={onPointerUp} onPointerLeave={onPointerUp}>

        {/* Orbit rings */}
        {ORBIT_PLANETS.map((p, i) => (
          <div key={p.id + '_ring'} style={{ position: 'absolute', top: '50%', left: '50%',
            width: SIZE * p.orbitRadius * 2, height: SIZE * p.orbitRadius * 2, borderRadius: '50%',
            border: `1px solid rgba(255,255,255,${0.04 + p.strength * 0.03})`,
            transform: 'translate(-50%,-50%)' }} />
        ))}

        {/* Center zodiac core */}
        <div style={{ position: 'absolute', top: '50%', left: '50%', transform: 'translate(-50%,-50%)', zIndex: 5 }}>
          <div style={{ width: 52, height: 52, borderRadius: '50%', display: 'flex', alignItems: 'center', justifyContent: 'center',
            background: 'radial-gradient(circle at 40% 35%, #6040cc, var(--surface-bold) 50%, #1a0066 100%)',
            boxShadow: '0 0 25px 8px rgba(53,53,243,0.3), 0 0 50px 15px rgba(53,53,243,0.1)',
            border: '2px solid rgba(153,153,255,0.3)',
            animation: 'breathe 4s ease-in-out infinite' }}>
            <span style={{ fontSize: 24, color: 'rgba(255,255,255,0.9)' }}>♏</span>
          </div>
          <div style={{ textAlign: 'center', marginTop: 4 }}>
            <span style={{ fontSize: 9, fontWeight: 700, color: 'rgba(153,153,255,0.6)', letterSpacing: 0.5 }}>
              Shivali
            </span>
          </div>
        </div>

        {/* Orbiting planets */}
        {ORBIT_PLANETS.map((planet) => {
          const angle = (time / planet.speed + planet.startAngle / 360 + dragOffset / 360) * Math.PI * 2;
          const rx = SIZE * planet.orbitRadius;
          const ry = SIZE * planet.orbitRadius * 0.6; // elliptical
          const px = CX + Math.cos(angle) * rx - planet.size / 2;
          const py = CY + Math.sin(angle) * ry - planet.size / 2;
          const isHint = hintPlanet === planet.id;
          const scale = 0.7 + planet.strength * 0.3;

          return (
            <div key={planet.id} onClick={(e) => { e.stopPropagation(); setHintPlanet(null); onPlanetTap(planet); }}
              style={{ position: 'absolute', left: px, top: py,
                width: planet.size, height: planet.size, zIndex: 10,
                cursor: 'pointer', transition: 'filter 200ms',
                transform: `scale(${scale})`,
                filter: isHint ? 'brightness(1.5)' : 'none',
              }}>
              {/* Glow */}
              <div style={{ position: 'absolute', inset: -planet.size * 0.4, borderRadius: '50%',
                background: `radial-gradient(circle, ${planet.glowColor} 0%, transparent 65%)`,
                animation: `breathe ${3 + planet.strength}s ease-in-out infinite`,
                opacity: 0.5 + planet.strength * 0.5 }} />
              {/* Tappable ring indicator */}
              <div style={{ position: 'absolute', inset: -4, borderRadius: '50%',
                border: `1.5px dashed rgba(255,255,255,${isHint ? 0.4 : 0.12})`,
                animation: isHint ? 'breathe 1.5s ease-in-out infinite' : 'none' }} />

              <div style={{ position: 'relative',
                filter: `drop-shadow(0 0 ${4 + planet.strength * 8}px ${planet.glowColor})` }}>
                <PlanetImg id={planet.id} size={planet.size} />
              </div>
              {/* Label with house */}
              <div style={{ textAlign: 'center', marginTop: 3, minWidth: 60 }}>
                <div style={{ fontSize: 9, fontWeight: 800, color: `rgba(255,255,255,${0.4 + planet.strength * 0.4})`,

                  textShadow: '0 1px 3px rgba(0,0,0,0.8)' }}>{planet.house}</div>
              </div>
              {/* Hint badge */}
              {isHint && (
                <div style={{ position: 'absolute', top: -16, left: '50%', transform: 'translateX(-50%)',
                  whiteSpace: 'nowrap', animation: 'fadeInUp 400ms ease-out both' }}>
                  <span style={{ fontSize: 8, fontWeight: 700, color: planet.color, background: 'rgba(0,0,0,0.7)',
                    padding: '3px 10px', borderRadius: 10, border: `1px solid ${planet.glowColor}`,

      <div style={{ textAlign: 'center', marginTop: 14, padding: '0 20px' }}>

        </div>
      </div>
    </div>
  );
};

/* Planet Story Capsule — full-screen immersive overlay */
const PlanetStoryCapsule = ({ planet, onClose, onNext, onPrev, currentIndex, total }) => {
  const { speaking, progress, speak, stop, toggle } = useNarration();

  // Auto-narrate after quick 300ms settle — audio is pre-cached so should be instant
  useEffect(() => {
    const timer = setTimeout(() => {
      speak(planet.narration, 'planet_' + planet.id, planet.speaker || 'advait');
    }, 300);
    return () => { clearTimeout(timer); stop(); };
  }, [planet.id]);

  const handleTap = (e) => {
    if (e.target.closest('[data-interactive]')) return;
    const rect = e.currentTarget.getBoundingClientRect();
    const x = e.clientX - rect.left;
    if (x < rect.width * 0.3 && onPrev) onPrev();
    else if (x > rect.width * 0.7 && onNext) onNext();
  };

  const bgMap = {
    Mars: 'radial-gradient(ellipse at 50% 30%, #2a0800 0%, #0d0200 60%, #050100 100%)',
    Saturn: 'radial-gradient(ellipse at 50% 30%, #15150f 0%, #0a0a08 60%, #030303 100%)',
    Jupiter: 'radial-gradient(ellipse at 50% 30%, #0a0a30 0%, #050518 60%, #020208 100%)',
    Moon: 'radial-gradient(ellipse at 50% 30%, #10101a 0%, #080810 60%, #030306 100%)',
    Venus: 'radial-gradient(ellipse at 50% 30%, #14101e 0%, #0a0810 60%, #040306 100%)',
  };

  return (
    <div style={{ position: 'absolute', inset: 0, zIndex: 100, background: bgMap[planet.id] || bgMap.Mars,
      animation: 'fadeIn 400ms ease-out both', display: 'flex', flexDirection: 'column' }}>

      {/* Header */}
      <div style={{ display: 'flex', alignItems: 'center', padding: '10px 16px',
        background: 'rgba(0,0,0,0.3)', borderBottom: '1px solid rgba(255,255,255,0.06)' }}>
        <span style={{ fontSize: 18, color: planet.color }}>{planet.glyph}</span>
        <span style={{ fontSize: 14, fontWeight: 700, color: 'rgba(255,255,255,0.7)', marginLeft: 8 }}>{planet.label}</span>
        <div style={{ flex: 1 }} />
        <div onClick={() => toggle(planet.narration, 'planet_' + planet.id, planet.speaker)} data-interactive
          style={{ width: 32, height: 32, borderRadius: 16, marginRight: 8,
            background: speaking ? `rgba(${planet.id === 'Mars' ? '255,102,68' : '53,53,243'},0.2)` : 'rgba(255,255,255,0.08)',
            display: 'flex', alignItems: 'center', justifyContent: 'center', cursor: 'pointer',
            fontSize: 15, color: speaking ? planet.color : 'rgba(255,255,255,0.5)' }}>
          {speaking ? '🔊' : '🔇'}
        </div>
        <div onClick={() => { stop(); onClose(); }} style={{ width: 32, height: 32, borderRadius: 16,
          background: 'rgba(255,255,255,0.08)', display: 'flex', alignItems: 'center', justifyContent: 'center',
          cursor: 'pointer', fontSize: 14, color: 'rgba(255,255,255,0.5)' }}>✕</div>
      </div>

      {/* Progress */}
      <div style={{ display: 'flex', gap: 3, padding: '8px 16px', background: 'rgba(0,0,0,0.2)' }}>
        {[...Array(total)].map((_, i) => (
          <div key={i} style={{ flex: 1, height: 2.5, borderRadius: 2, position: 'relative', overflow: 'hidden',
            background: i < currentIndex ? planet.color : 'rgba(255,255,255,0.1)' }}>
            {i === currentIndex && speaking && (
              <div style={{ position: 'absolute', inset: 0, background: planet.color,
                width: `${progress * 100}%`, transition: 'width 200ms linear', borderRadius: 2 }} />
            )}
          </div>
        ))}
      </div>

      {/* Narration wave */}
      {speaking && (
        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 6, padding: '6px 16px',
          background: 'rgba(0,0,0,0.15)' }}>
          {[...Array(5)].map((_, i) => (
            <div key={i} style={{ width: 3, borderRadius: 2, background: planet.color,
              animation: `soundWave 0.8s ease-in-out ${i * 0.1}s infinite alternate`, height: 8 + Math.random() * 8 }} />
          ))}
          <span style={{ fontSize: 11, fontWeight: 600, color: planet.color, marginLeft: 6, opacity: 0.7 }}>
            {planet.label} बोल रहा है...

        </div>
      )}

      {/* Content */}
      <div onClick={handleTap} style={{ flex: 1, overflow: 'auto', cursor: 'pointer' }}>
        <div style={{ padding: '30px 20px', animation: 'fadeInUp 400ms ease-out both' }}>

          {/* Large planet SVG with particles */}
          <div style={{ display: 'flex', justifyContent: 'center', marginBottom: 24, position: 'relative',
            height: planet.id === 'Saturn' ? 140 : 170 }}>
            <div style={{ position: 'relative' }}>
              <PlanetParticles planetId={planet.id} size={150} />
              {/* Glow behind */}
              <div style={{ position: 'absolute', inset: -40, borderRadius: '50%',

              </div>
            </div>
          </div>

          {/* Planet title — first person */}
          <div style={{ fontSize: 10, fontWeight: 700, color: planet.color, textTransform: 'uppercase',

            {planet.title}
          </div>
          <div style={{ fontSize: 22, fontWeight: 900, color: 'rgba(255,255,255,0.95)', textAlign: 'center',
            marginTop: 10, letterSpacing: '-0.03em', lineHeight: 1.25 }}>
            {planet.subtitle}
          </div>

          {/* Subtitle / narration text — show immediately */}
          <div style={{ fontSize: 15, fontWeight: 500, color: 'rgba(255,255,255,0.65)', lineHeight: 1.7,
            marginTop: 24, textAlign: 'center', animation: 'fadeInUp 500ms ease-out 200ms both',
            fontStyle: 'italic' }}>
            "{planet.narration.substring(0, 120)}..."
          </div>

          {/* Strength indicator */}
          <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between',
            marginTop: 20, padding: '10px 16px', borderRadius: 14,
            background: 'rgba(255,255,255,0.03)', border: '1px solid rgba(255,255,255,0.06)' }}>
            <span style={{ fontSize: 11, fontWeight: 700, color: 'rgba(255,255,255,0.4)', textTransform: 'uppercase', letterSpacing: 0.5 }}>
              Strength in your chart
            </span>
            <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
              <div style={{ width: 60, height: 4, borderRadius: 2, background: 'rgba(255,255,255,0.08)', overflow: 'hidden' }}>
                <div style={{ width: `${planet.strength * 100}%`, height: '100%', borderRadius: 2,
                  background: planet.color, animation: 'fillBar 1s ease-out 600ms both' }} />
              </div>
              <span style={{ fontSize: 12, fontWeight: 800, color: planet.color }}>
                {planet.strength >= 0.9 ? 'Dominant' : planet.strength >= 0.75 ? 'Strong' : planet.strength >= 0.6 ? 'Moderate' : 'Subtle'}
              </span>
            </div>
          </div>

          {/* Navigation hint */}
          <div style={{ textAlign: 'center', marginTop: 24 }}>
            <span style={{ fontSize: 11, color: 'rgba(255,255,255,0.2)' }}>
              {onPrev && '← '}swipe for next planet{onNext && ' →'}
            </span>
          </div>
        </div>
      </div>
    </div>
  );
};

/* 7-Day Ritual Calendar — highlighted upay days */
const CelestialRitualTimeline = ({ onRitualTap }) => {
  const todayNum = new Date().getDay(); // 0=Sun, 1=Mon, 2=Tue...
  const [selectedRitual, setSelectedRitual] = useState(null);

  // Pre-cache ritual audio on mount
  useEffect(() => {
    DESTINY_RITUALS.forEach((r) => {
      queuePrefetch(r.narration, 'ritual_' + r.id, r.speaker || 'advait');
    });
  }, []);

  // Build week: 0=Sun..6=Sat
  const WEEK = [
    { num: 0, hi: 'रवि', en: 'Sun' },
    { num: 1, hi: 'सोम', en: 'Mon' },
    { num: 2, hi: 'मंगल', en: 'Tue' },
    { num: 3, hi: 'बुध', en: 'Wed' },
    { num: 4, hi: 'गुरु', en: 'Thu' },
    { num: 5, hi: 'शुक्र', en: 'Fri' },
    { num: 6, hi: 'शनि', en: 'Sat' },
  ];

  // Map dayNum → ritual
  const ritualByDay = {};
  DESTINY_RITUALS.forEach((r, i) => { ritualByDay[r.dayNum] = { ritual: r, index: i }; });

  const handleDayTap = (dayNum) => {
    const entry = ritualByDay[dayNum];
    if (entry) {
      if (selectedRitual && selectedRitual.id === entry.ritual.id) {
        // second tap opens full overlay
        onRitualTap(entry.ritual, entry.index);
      } else {
        setSelectedRitual(entry.ritual);
      }
    }
  };

  const sel = selectedRitual;
  const hasPlanetSvg = sel && sel.planetId && typeof PlanetImg !== 'undefined';

  return (
    <div style={{ margin: '0 16px', borderRadius: 20, background: 'var(--white)',
      boxShadow: '0 4px 24px rgba(0,0,0,0.06)', overflow: 'hidden',
      animation: 'fadeInUp 600ms ease-out 800ms both' }}>

      {/* 7-day calendar row */}
      <div style={{ display: 'flex', padding: '14px 10px 10px', gap: 0 }}>
        {WEEK.map((day) => {
          const entry = ritualByDay[day.num];
          const hasRitual = !!entry;
          const isToday = day.num === todayNum;
          const isSelected = sel && entry && sel.id === entry.ritual.id;
          const color = hasRitual ? entry.ritual.color : 'var(--grey-60)';

          return (
            <div key={day.num} onClick={() => handleDayTap(day.num)}
              style={{ flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 4,
                cursor: hasRitual ? 'pointer' : 'default', padding: '4px 0',
                borderRadius: 12, transition: 'background 200ms',
                background: isSelected ? `${entry.ritual.color}10` : 'transparent' }}>

              {/* Day label */}
              <span style={{ fontSize: 9, fontWeight: 600,
                color: hasRitual ? color : 'var(--text-disabled)', letterSpacing: 0.3 }}>
                {day.hi}
              </span>

              {/* Circle — planet orb for ritual days, plain for others */}
              <div style={{
                width: 36, height: 36, borderRadius: '50%',
                display: 'flex', alignItems: 'center', justifyContent: 'center',
                position: 'relative', overflow: 'visible',
                background: hasRitual ? 'none' : 'transparent',
                border: 'none',
                boxShadow: hasRitual ? `0 2px 8px ${color}25` : 'none',
                transition: 'transform 200ms, box-shadow 200ms',
                transform: isSelected ? 'scale(1.15)' : 'scale(1)',
              }}>
                {hasRitual && entry.ritual.planetId && typeof PlanetImg !== 'undefined' ? (
                  <PlanetImg id={entry.ritual.planetId} size={36} />
                ) : hasRitual ? (
                  <div style={{ width: '100%', height: '100%', borderRadius: '50%',
                    background: `radial-gradient(circle at 35% 35%, ${color}, ${color}55)`,
                    display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                    <span style={{ fontSize: 13, color: '#fff' }}>{entry.ritual.glyph}</span>
                  </div>
                ) : (
                  <span style={{ fontSize: 11, fontWeight: 600,
                    color: 'var(--text-disabled)' }}>
                  </span>
                )}

                {/* Today ring on ritual days */}
                {hasRitual && isToday && (
                  <div style={{ position: 'absolute', inset: -3, borderRadius: '50%',
                    border: `2px solid ${color}`, animation: 'breathe 2.5s ease-in-out infinite',

/* Year Capsule Overlay */
const YearCapsuleOverlay = ({ age, onClose }) => {
  const year = BIRTH_YEAR + age;
  const era = getEraForAge(age);
  const gate = getGateForAge(age);
  const reading = getYearReading(age);
  const isCurrent = age === CURRENT_AGE;
  const planetColor = { Mars: '#ff6644', Saturn: '#8b7fd4', Jupiter: '#5555ff', Moon: '#9898a4',
    Mercury: '#4ecdc4', Venus: '#9999ff', Rahu: '#000093', Ketu: '#aa66cc', Sun: '#f7ab20' };
  const color = gate ? gate.color : (planetColor[reading.planet] || '#7777ff');

  // TTS narration — Ashutosh speaks the year summary + key aspect on mount
  const { speak, speaking, stop } = useNarration();
  useEffect(() => {
    const aspects = reading.aspects ? Object.values(reading.aspects) : [];
    const careerAsp = reading.aspects?.career;
    const healthAsp = reading.aspects?.health;
    // Build narration text — summary + career + health highlights
    let narration = `Age ${age}, year ${year}. ${reading.summary}`;
    if (careerAsp) narration += ` Career mein: ${careerAsp.text}`;
    if (healthAsp) narration += ` Health: ${healthAsp.text}`;
    const cacheKey = `year_capsule_${age}`;
    speak(narration, cacheKey, 'arvind');
    return () => stop();
  }, [age]);

  const scoreColor = (s) => {
    if (!s) return 'rgba(255,255,255,0.4)';
    const sl = s.toLowerCase();
    if (sl.includes('peak') || sl.includes('high') || sl.includes('strong') || sl.includes('moksha') || sl.includes('guru')) return '#4ecdc4';
    if (sl.includes('medium') || sl.includes('growing') || sl.includes('building') || sl.includes('stable') || sl.includes('rising') || sl.includes('deepening')) return '#f7ab20';
    if (sl.includes('careful') || sl.includes('priority')) return '#ff6644';
    return 'rgba(255,255,255,0.5)';
  };

  const aspects = reading.aspects ? Object.values(reading.aspects) : [];

  return (
    <div style={{ position: 'absolute', inset: 0, zIndex: 100,
      background: era.bg,
      boxShadow: `inset 0 0 0 2000px rgba(4,0,13,0.92)`,
      animation: 'fadeIn 400ms ease-out both', display: 'flex', flexDirection: 'column' }}>

      {/* Header */}
      <div style={{ display: 'flex', alignItems: 'center', padding: '10px 16px',
        background: 'rgba(0,0,0,0.3)', borderBottom: `1px solid ${color}15` }}>
        <span style={{ fontSize: 15, fontWeight: 900, color }}>{year}</span>
        <span style={{ fontSize: 11, color: 'rgba(255,255,255,0.4)', marginLeft: 8 }}>Age {age}</span>
        <span style={{ fontSize: 11, color: 'rgba(255,255,255,0.25)', marginLeft: 8 }}>· {era.labelHi}</span>
        <div style={{ flex: 1 }} />
        <div onClick={onClose} style={{ width: 30, height: 30, borderRadius: 15,
          background: 'rgba(255,255,255,0.06)', display: 'flex', alignItems: 'center', justifyContent: 'center',
          cursor: 'pointer', fontSize: 13, color: 'rgba(255,255,255,0.4)' }}>✕</div>
      </div>

      {/* Content */}
      <div style={{ flex: 1, overflow: 'auto', padding: '16px 16px 24px' }}>

        {/* Top — Avatar + Theme + Planet */}
        <div style={{ animation: 'fadeInUp 400ms ease-out both',
          display: 'flex', alignItems: 'center', gap: 12, marginBottom: 14 }}>
          <div style={{ position: 'relative', flexShrink: 0 }}>
            <div style={{ position: 'absolute', inset: -12, borderRadius: '50%',
              background: `radial-gradient(circle, ${color}20 0%, transparent 70%)`,
              animation: 'breathe 3s ease-in-out infinite' }} />
            <AvatarFigure stage={era.avatar} size={44} glowing={isCurrent} />
          </div>
          <div style={{ flex: 1 }}>
            {isCurrent && (
              <div style={{ fontSize: 8, fontWeight: 800, letterSpacing: 1.5, color: '#fff',
                background: color, padding: '2px 8px', borderRadius: 6,
                display: 'inline-block', marginBottom: 4 }}>✦ YOU ARE HERE</div>
            )}
            {gate && !isCurrent && (
              <div style={{ fontSize: 8, fontWeight: 800, letterSpacing: 1.5, color: gate.color,
                display: 'inline-block', marginBottom: 4 }}>✦ {gate.label.toUpperCase()}</div>
            )}
            <div style={{ fontSize: 13, fontWeight: 800, color: 'rgba(255,255,255,0.9)',
              lineHeight: 1.3 }}>{reading.theme}</div>
            <div style={{ display: 'flex', alignItems: 'center', gap: 6, marginTop: 4 }}>
              <div style={{ width: 18, height: 18, overflow: 'visible',
                display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                {typeof PlanetImg !== 'undefined' && ['Mars','Saturn','Jupiter','Moon','Venus','Sun','Mercury'].includes(reading.planet) ? (
                  <PlanetImg id={reading.planet} size={18} />
                ) : (
                  <div style={{ width: 18, height: 18, borderRadius: '50%', background: color }} />
                )}
              </div>
              <span style={{ fontSize: 10, fontWeight: 600, color: 'rgba(255,255,255,0.4)' }}>
                {reading.planet} dominant
              </span>
            </div>
          </div>
        </div>

        {/* Summary */}
        <div style={{ animation: 'fadeInUp 400ms ease-out 100ms both',
          padding: '10px 12px', borderRadius: 12,
          background: `${color}08`, border: `1px solid ${color}12`, marginBottom: 14 }}>
          <div style={{ fontSize: 12, fontWeight: 500, color: 'rgba(255,255,255,0.7)',
            lineHeight: 1.7 }}>
            {reading.summary}
          </div>
        </div>

        {/* Gate callout */}
        {gate && (
          <div style={{ animation: 'fadeInUp 400ms ease-out 150ms both',
            padding: '10px 12px', borderRadius: 12, marginBottom: 14, textAlign: 'center',
            background: `${gate.color}0a`, border: `1px solid ${gate.color}18` }}>
            <div style={{ fontSize: 11, fontWeight: 700, color: gate.color }}>{gate.label}</div>
            <div style={{ fontSize: 11, fontWeight: 500, color: 'rgba(255,255,255,0.45)',
              marginTop: 4, lineHeight: 1.5 }}>{gate.desc}</div>
          </div>
        )}

        {/* Aspect Cards */}
        {aspects.map((asp, i) => (
          <div key={i} style={{ animation: `fadeInUp 400ms ease-out ${200 + i * 80}ms both`,
            padding: '12px', borderRadius: 14, marginBottom: 8,
            background: 'rgba(255,255,255,0.04)', border: '1px solid rgba(255,255,255,0.06)' }}>

            {/* Aspect header */}
            <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 6 }}>
              <span style={{ fontSize: 16 }}>{asp.icon}</span>
              <span style={{ fontSize: 12, fontWeight: 800, color: 'rgba(255,255,255,0.85)' }}>
                {asp.label}
              </span>
              <div style={{ flex: 1 }} />
              <span style={{ fontSize: 9, fontWeight: 700, color: scoreColor(asp.score),
                padding: '2px 8px', borderRadius: 8,
                background: `${scoreColor(asp.score)}12`,
                border: `1px solid ${scoreColor(asp.score)}20` }}>
                {asp.score}
              </span>
            </div>

            {/* Aspect detail */}
            <div style={{ fontSize: 11, fontWeight: 500, color: 'rgba(255,255,255,0.55)',
              lineHeight: 1.7 }}>
              {asp.text}
            </div>
          </div>
        ))}

        {/* Footer */}
        <div style={{ textAlign: 'center', marginTop: 12, fontSize: 9,
          color: 'rgba(255,255,255,0.12)', letterSpacing: 1 }}>
          {era.label} · {era.labelHi} · Age {age}
        </div>
      </div>
    </div>
  );
};

  const hasScrolled = useRef(false);

  // All ages — every year near current, milestones elsewhere, cap at 85 for sanity
  const maxAge = Math.min(LIFE_ERAS[LIFE_ERAS.length - 1].range[1], 85);
  const gateAges = DESTINY_GATES.map(g => g.age);
  const allAges = [];
  for (let a = 0; a <= maxAge; a++) {
    const near = a >= CURRENT_AGE - 15 && a <= CURRENT_AGE + 20;
    const milestone = a === 0 || a % 5 === 0 || a === CURRENT_AGE || gateAges.includes(a) || LIFE_ERAS.some(e => e.range[0] === a);
    if (near || milestone) allAges.push(a);
  }

  const NODE_W = 52;
  const SPACER = 180;

  // Era landscape configs — each dasha has unique terrain, insight, and personality
  const ERA_VISUALS = {
    dawn:   { gradient: 'linear-gradient(180deg, #e8e0f0 0%, #d5c8e8 40%, #c8bce0 100%)', terrain: '☽', terrainColor: '#9898a4', label: 'चंद्र योग', insight: 'Moon shapes your emotional foundation — the roots of who you become', tag: 'FOUNDATION', tagIcon: '🌙' },
    child:  { gradient: 'linear-gradient(180deg, #dff0ed 0%, #c4e8e0 40%, #a8ddd2 100%)', terrain: '☿', terrainColor: '#4ecdc4', label: 'बुध दशा', insight: 'Mercury awakens curiosity — your mind starts absorbing everything', tag: 'LEARNING', tagIcon: '📚' },
    teen:   { gradient: 'linear-gradient(180deg, #f5e0d5 0%, #f0c8b0 40%, #e8b090 100%)', terrain: '♂', terrainColor: '#ff8844', label: 'मंगल युति', insight: 'Mars ignites ambition — bold decisions and first battles define you', tag: 'FIRE PHASE', tagIcon: '🔥' },
    young:  { gradient: 'linear-gradient(180deg, #f5ead0 0%, #f0d8a8 40%, #e8c880 100%)', terrain: '☀', terrainColor: '#ff6644', label: 'राज योग', insight: 'Your golden era — career rise, leadership, and the world notices you', tag: 'PEAK RISE', tagIcon: '👑' },
    prime:  { gradient: 'linear-gradient(180deg, #dce4f0 0%, #b8c8e8 40%, #8ea8d8 100%)', terrain: '♄', terrainColor: '#3d5a99', label: 'शनि दशा', insight: 'Saturn rewards discipline — every shortcut is tested, every effort multiplied', tag: 'DEPTH', tagIcon: '💎' },
    mature: { gradient: 'linear-gradient(180deg, #f8f0d8 0%, #f0dda8 40%, #e8c870 100%)', terrain: '♃', terrainColor: '#b8860b', label: 'गुरु चांडाल', insight: 'Jupiter expands your wisdom — you become the guide others seek', tag: 'WISDOM', tagIcon: '🔮' },
    legacy: { gradient: 'linear-gradient(180deg, #f0e0e5 0%, #e0c0cc 40%, #d0a0b0 100%)', terrain: '☊', terrainColor: '#8b3a5e', label: 'केतु मोक्ष', insight: 'Ketu dissolves the material — inner peace and spiritual clarity emerge', tag: 'LIBERATION', tagIcon: '✨' },
  };

  // Profile photo URL — personalized avatar
  const PROFILE_PHOTO = 'https://i.pravatar.cc/150?img=47'; // placeholder — replace with real photo

  const centeredEra = getEraForAge(centeredAge);
  const vis = ERA_VISUALS[centeredEra.id] || ERA_VISUALS.prime;

  // Center on ABHI — waits until scroll rail is visible (fixes off-screen mount)
  useEffect(() => {
    if (hasScrolled.current || !scrollRef.current) return;
    const doScroll = () => {
      if (hasScrolled.current) return;
      hasScrolled.current = true;
      const idx = allAges.indexOf(CURRENT_AGE);
      if (idx < 0) return;
      const cw = scrollRef.current.clientWidth;
      if (cw > 0) {
        scrollRef.current.scrollLeft = Math.max(0, SPACER + idx * NODE_W - cw / 2 + NODE_W / 2);
      }
    };
    // If already visible, scroll immediately
    if (scrollRef.current.clientWidth > 0 && scrollRef.current.getBoundingClientRect().top < window.innerHeight) {
      doScroll();
      return;
    }
    // Otherwise wait until it enters the viewport
    const obs = new IntersectionObserver(([entry]) => {
      if (entry.isIntersecting) {
        obs.disconnect();
        requestAnimationFrame(doScroll);
      }
    }, { threshold: 0.1 });
    obs.observe(scrollRef.current);
    return () => obs.disconnect();
  }, []);

  // Track scroll → update centered age for landscape change
  useEffect(() => {
    const el = scrollRef.current;
    if (!el) return;
    let ticking = false;
    const onScroll = () => {
      if (ticking) return;
      ticking = true;
      requestAnimationFrame(() => {
        const centerX = el.scrollLeft + el.clientWidth / 2;
        const idx = Math.round((centerX - SPACER) / NODE_W);
        const clamped = Math.max(0, Math.min(idx, allAges.length - 1));
        if (allAges[clamped] !== undefined) setCenteredAge(allAges[clamped]);
        ticking = false;
      });
    };
    el.addEventListener('scroll', onScroll, { passive: true });
    return () => el.removeEventListener('scroll', onScroll);
  }, []);

  // Terrain hills SVG — different per era
  const TerrainSVG = ({ eraId }) => {
    const paths = {
      dawn:   'M0,60 Q30,35 60,50 T120,40 T180,55 T240,38 T300,50 T360,45 L360,80 L0,80Z',
      child:  'M0,55 Q40,30 80,45 T160,35 T240,50 T320,30 T360,48 L360,80 L0,80Z',
      teen:   'M0,50 L40,25 L70,45 L110,15 L150,40 L190,20 L230,42 L270,18 L310,38 L360,28 L360,80 L0,80Z',
      young:  'M0,45 Q50,15 100,35 T200,20 T300,30 T360,22 L360,80 L0,80Z',
      prime:  'M0,52 Q60,38 120,48 T240,42 T360,46 L360,80 L0,80Z',
      mature: 'M0,48 Q45,28 90,42 T180,32 T270,45 T360,35 L360,80 L0,80Z',
      legacy: 'M0,55 Q90,40 180,50 T360,45 L360,80 L0,80Z',
    };
    const v = ERA_VISUALS[eraId] || ERA_VISUALS.prime;
    return (
      <svg viewBox="0 0 360 80" style={{ width: '100%', height: 60, display: 'block' }} preserveAspectRatio="none">
        <defs>
          <linearGradient id={`hill_${eraId}`} x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stopColor={v.terrainColor} stopOpacity="0.2" />
            <stop offset="100%" stopColor={v.terrainColor} stopOpacity="0.08" />
          </linearGradient>
        </defs>
        <path d={paths[eraId] || paths.prime} fill={`url(#hill_${eraId})`} />
        <path d={paths[eraId] || paths.prime} fill="none" stroke={v.terrainColor} strokeWidth="1.5" strokeOpacity="0.25" />
      </svg>
    );
  };

  return (
    <div style={{ margin: '0 16px', borderRadius: 20,
      boxShadow: '0 4px 24px rgba(0,0,0,0.06)',
      animation: 'fadeInUp 500ms ease-out 900ms both', overflow: 'hidden',
      border: '1px solid rgba(0,0,0,0.04)' }}>

      {/* ── Top: Landscape panel — changes with era ── */}
      <div style={{ position: 'relative', background: vis.gradient,
        transition: 'background 600ms ease', padding: '12px 14px 0', minHeight: 130 }}>

        {/* Era tag pill — top left */}
        <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
          <span style={{ fontSize: 8, fontWeight: 800, letterSpacing: 1.2, color: vis.terrainColor,
            background: `${vis.terrainColor}15`, padding: '3px 10px', borderRadius: 10,
            border: `1px solid ${vis.terrainColor}25` }}>
            {vis.tagIcon} {vis.tag}
          </span>
          <span style={{ fontSize: 9, fontWeight: 600, color: vis.terrainColor, opacity: 0.5 }}>
            Ages {centeredEra.range[0]}–{centeredEra.range[1]}
          </span>
        </div>

        {/* Main content row — Photo walking + Era info */}
        <div style={{ display: 'flex', alignItems: 'center', gap: 14, marginTop: 10 }}>

          {/* Profile photo as walking avatar */}
          <div style={{ position: 'relative', flexShrink: 0 }}>
            {/* Glow ring */}
            <div style={{ position: 'absolute', inset: -4, borderRadius: '50%',
              background: `conic-gradient(${vis.terrainColor}40, ${vis.terrainColor}10, ${vis.terrainColor}40)`,
              animation: centeredAge === CURRENT_AGE ? 'pulseRing 2s ease-out infinite' : 'none' }} />
            {/* Photo circle */}
            <div style={{ width: 52, height: 52, borderRadius: '50%', overflow: 'hidden',
              border: `2.5px solid ${vis.terrainColor}50`, position: 'relative',
              boxShadow: `0 4px 16px ${vis.terrainColor}25` }}>
              <img src={PROFILE_PHOTO} alt="" style={{ width: '100%', height: '100%',
                objectFit: 'cover', display: 'block' }} />
              {/* Color overlay per era — tints the photo to match the dasha mood */}
              <div style={{ position: 'absolute', inset: 0,
                background: `${vis.terrainColor}18`, mixBlendMode: 'overlay' }} />
            </div>
            {/* ABHI badge */}
            {centeredAge === CURRENT_AGE && (
              <div style={{ position: 'absolute', bottom: -6, left: '50%', transform: 'translateX(-50%)',
                fontSize: 6, fontWeight: 800, color: '#fff', letterSpacing: 0.8,
                background: vis.terrainColor, padding: '2px 7px', borderRadius: 6,
                whiteSpace: 'nowrap', boxShadow: `0 2px 6px ${vis.terrainColor}40` }}>ABHI</div>
            )}
            {/* Walking animation dots under photo */}
            <div style={{ position: 'absolute', bottom: -10, left: '50%', transform: 'translateX(-50%)',
              display: 'flex', gap: 3 }}>
              {[0,1,2].map(i => (
                <div key={i} style={{ width: 3, height: 3, borderRadius: '50%',
                  background: vis.terrainColor, opacity: 0.2 + (i === 1 ? 0.3 : 0),
                  animation: `breathe 1.5s ease-in-out ${i * 0.2}s infinite` }} />
              ))}
            </div>
          </div>

          {/* Era details — dasha name + insight */}
          <div style={{ flex: 1, minWidth: 0 }}>
            <div style={{ display: 'flex', alignItems: 'baseline', gap: 6 }}>
              <span style={{ fontSize: 16, fontWeight: 900, color: vis.terrainColor }}>{vis.terrain}</span>
              <span style={{ fontSize: 14, fontWeight: 800, color: vis.terrainColor }}>{vis.label}</span>
            </div>
            <div style={{ fontSize: 10, fontWeight: 500, color: vis.terrainColor, opacity: 0.7,
              marginTop: 4, lineHeight: 1.5 }}>
              {vis.insight}
            </div>
          </div>
        </div>

        {/* Terrain hills — unique per era */}
        <div style={{ position: 'relative', zIndex: 1, marginTop: 4 }}>
          <TerrainSVG eraId={centeredEra.id} />
        </div>
      </div>

      {/* ── Bottom: Year rail ── */}
      <div style={{ background: '#fff', position: 'relative' }}>

        {/* Center indicator line */}
        <div style={{ position: 'absolute', top: 0, left: '50%', transform: 'translateX(-50%)',
          width: 2, height: '100%', background: `${vis.terrainColor}25`, zIndex: 3,
          pointerEvents: 'none' }} />

        <div ref={scrollRef} className="horiz-scroll"
          style={{ overflowX: 'auto', overflowY: 'hidden', padding: '10px 0 8px',
            WebkitOverflowScrolling: 'touch' }}>
          <div style={{ display: 'flex', alignItems: 'center', width: 'max-content',
            position: 'relative' }}>

            {/* Left spacer */}
            <div style={{ width: SPACER, flexShrink: 0 }} />

            {/* Connecting path — solid past, dashed future */}
            <div style={{ position: 'absolute', top: 14, left: SPACER,
              width: allAges.indexOf(CURRENT_AGE) * NODE_W, height: 2,
              background: vis.terrainColor, opacity: 0.3, zIndex: 0 }} />
            <div style={{ position: 'absolute', top: 14,
              left: SPACER + allAges.indexOf(CURRENT_AGE) * NODE_W,
              right: SPACER, height: 2, zIndex: 0,
              backgroundImage: `repeating-linear-gradient(90deg, ${vis.terrainColor}30 0, ${vis.terrainColor}30 6px, transparent 6px, transparent 12px)` }} />

            {/* Year nodes */}
            {allAges.map((age) => {
              const isCurrent = age === CURRENT_AGE;
              const isPast = age < CURRENT_AGE;
              const isCentered = age === centeredAge;
              const era = getEraForAge(age);
              const gate = getGateForAge(age);
              const isGate = !!gate;
              const eraVis = ERA_VISUALS[era.id] || ERA_VISUALS.prime;
              const nodeColor = isGate ? gate.color : eraVis.terrainColor;

              return (
                <div key={age} onClick={() => onYearTap(age)}
                  style={{ width: NODE_W, display: 'flex', flexDirection: 'column', alignItems: 'center',
                    cursor: 'pointer', position: 'relative', zIndex: 1, flexShrink: 0 }}>

                  {/* Gate star above */}
                  {isGate && (
                    <div style={{ fontSize: 7, color: gate.color, fontWeight: 800, marginBottom: 2 }}>✦</div>
                  )}

                  {/* Circle node */}
                  <div style={{ position: 'relative' }}>
                    {isCurrent && (
                      <div style={{ position: 'absolute', inset: -5, borderRadius: '50%',
                        border: `1.5px solid ${nodeColor}40`,
                        animation: 'pulseRing 2s ease-out infinite' }} />
                    )}
                    <div style={{
                      width: isCurrent ? 28 : isCentered ? 26 : isGate ? 24 : 20,
                      height: isCurrent ? 28 : isCentered ? 26 : isGate ? 24 : 20,
                      borderRadius: isGate && !isCurrent ? 5 : '50%',
                      transform: isGate && !isCurrent ? 'rotate(45deg)' : 'none',
                      background: isCurrent ? nodeColor :
                        isPast ? `${nodeColor}30` : `${nodeColor}10`,
                      border: isCurrent ? `2px solid ${nodeColor}` :
                        `1.5px solid ${nodeColor}${isPast ? '40' : '20'}`,
                      display: 'flex', alignItems: 'center', justifyContent: 'center',
                      boxShadow: isCurrent ? `0 0 12px ${nodeColor}30` :
                        isCentered ? `0 0 8px ${nodeColor}15` : 'none',
                      transition: 'all 200ms',
                    }}>
                      <span style={{
                        fontSize: isCurrent ? 10 : 8, fontWeight: isCurrent ? 800 : 600,
                        transform: isGate && !isCurrent ? 'rotate(-45deg)' : 'none',
                        color: isCurrent ? '#fff' : isPast ? nodeColor : `${nodeColor}80`,
                      }}>{age}</span>
                    </div>
                  </div>

                  {/* Year label */}
                  <div style={{ fontSize: 7, fontWeight: 600, marginTop: 3,
                    color: isCurrent ? nodeColor : 'var(--text-disabled)',
                    opacity: isCurrent || isGate || age % 10 === 0 ? 1 : 0.5 }}>
                    {BIRTH_YEAR + age}
                  </div>

                  {/* Era start label */}
                  {LIFE_ERAS.some(e => e.range[0] === age && age > 0) && (
                    <div style={{ fontSize: 6, fontWeight: 700, color: nodeColor, opacity: 0.5,
                      marginTop: 1 }}>
                      {eraVis.label}
                    </div>
                  )}
                </div>
              );
            })}

            {/* Right spacer */}
            <div style={{ width: SPACER, flexShrink: 0 }} />
          </div>
        </div>

        {/* Hint */}
        <div style={{ textAlign: 'center', padding: '0 0 8px', fontSize: 9,
          color: 'var(--text-disabled)' }}>
          ← swipe through your life · tap any year →
        </div>
      </div>
    </div>
  );
};

  };

  const userPoints = dims.map(d => getPoint(d.angle, d.score));
  const userPath = userPoints.map((p, i) => `${i === 0 ? 'M' : 'L'}${p.x},${p.y}`).join(' ') + 'Z';

  return (
    <div style={{ margin: '0 16px', borderRadius: 20, background: 'var(--white)', padding: '18px 16px',
      boxShadow: '0 4px 24px rgba(0,0,0,0.06)', textAlign: 'center', animation: 'fadeInUp 500ms ease-out 1000ms both' }}>
      <div style={{ fontSize: 10, fontWeight: 700, color: 'var(--primary-50)', textTransform: 'uppercase', letterSpacing: 1 }}>YOUR COSMIC BALANCE</div>

      <svg width={240} height={240} viewBox="0 0 240 240" style={{ marginTop: 8 }}>
        {/* Grid pentagons */}
        {[0.33, 0.66, 1].map((s, gi) => {
          const pts = dims.map(d => getPoint(d.angle, s * 100));
          return <polygon key={gi} points={pts.map(p => `${p.x},${p.y}`).join(' ')} fill="none"
            stroke="var(--grey-40)" strokeWidth={gi === 2 ? 1.5 : 0.8} opacity={gi === 2 ? 0.5 : 0.3} />;
        })}
        {/* User shape */}
        <path d={userPath} fill="rgba(53,53,243,0.08)" stroke="var(--primary-50)" strokeWidth={2} />
        {/* Points */}
        {dims.map((d, i) => {
          const p = getPoint(d.angle, d.score);
          const labelP = getPoint(d.angle, 115);
          return (
            <g key={i} onClick={() => setSelected(i)} style={{ cursor: 'pointer' }}>
              <circle cx={p.x} cy={p.y} r={selected === i ? 8 : 6} fill={pointColor(d.score)}
                stroke={selected === i ? 'var(--primary-50)' : 'white'} strokeWidth={selected === i ? 3 : 2}
                style={{ transition: 'all 200ms' }} />
              <text x={labelP.x} y={labelP.y} textAnchor="middle" dominantBaseline="middle"
                fontSize={11} fontWeight={700} fill={selected === i ? 'var(--text-high)' : 'var(--text-low)'}
                style={{ fontFamily: 'JioType, Outfit, sans-serif' }}>{d.name}</text>
            </g>
          );
        })}
      </svg>

      <div style={{ fontSize: 22, fontWeight: 900, color: 'var(--sparkle-50)', letterSpacing: '-0.03em' }}>Harmonious</div>
      <div style={{ fontSize: 11, fontWeight: 700, color: 'var(--text-disabled)', marginTop: 2 }}>Overall Balance</div>

      <div style={{ background: 'var(--surface-ghost)', borderRadius: 14, padding: '12px 16px', marginTop: 14, textAlign: 'left',
        transition: 'all 300ms' }}>
        <div style={{ fontSize: 13, fontWeight: 500, color: 'var(--text-high)', lineHeight: 1.5 }}>
          {selected === 0 && 'Career energy is strong right now. Saturn supports steady, disciplined growth in your work.'}
          {selected === 1 && 'Love energy is shifting. Moon in 7th brings emotional depth — patience, not pursuit.'}
          {selected === 2 && 'Mars in lagna gives you natural physical vitality. Channel it through consistent routine.'}
          {selected === 3 && 'Jupiter in 5th favours wealth through wisdom. Investments bear fruit over time.'}
          {selected === 4 && 'Spiritual dimension is awakening. Ketu asks you to look inward — use it, don\'t store it.'}
        </div>
      </div>
    </div>
  );
};

/* ═══════════════════════════════════════

const App = () => {
  const [overlay, setOverlay] = useState(null); // { type, index }

  return (
    <div className="phone-frame">
      <div className="notch"><div className="notch-inner" /></div>
      <div className="status-bar">
        <span>9:41</span>
        <span>· · ·</span>
      </div>
      <div className="screen">
        {/* Main scrollable feed */}
        <div className="scroll-feed" style={{ height: '100%', overflowY: 'auto', position: 'relative' }}>
          <MiniHeader />
          <HeroCard />

          {/* Phase 2 — Story Cards */}
          <SectionHeader title="Kundli ke Rahasya" subtitle="Tap karke jaano apne baare mein" delay={300} />
          <div className="horiz-scroll" style={{ display: 'flex', gap: 12, padding: '4px 16px 16px', overflowX: 'auto' }}>
            {STORY_CARDS.map((card, i) => (
              <StoryCardPreview key={card.id} card={card} index={i} onTap={(idx) => setOverlay({ type: 'story', index: idx })} />
            ))}
          </div>

          {/* Phase 3 — Living Solar System */}
          <SectionHeader title="Apka Graha Mandal" subtitle="Tap karke suniye — aapke grah kya keh rahe hain" delay={500} />
          <LivingSolarSystem onPlanetTap={(planet) => setOverlay({ type: 'planet', planet, index: ORBIT_PLANETS.indexOf(planet) })} />

          {/* Celebrity Kundli Match */}
          <CelebrityKundliMatch />

          {/* Phase 4 — Destiny Rhythm Wheel */}
          <SectionHeader title="Graha Upay" subtitle="Aapki kundli ke powerful upay — life 10x better" delay={700} />
          <CelestialRitualTimeline onRitualTap={(ritual, idx) => setOverlay({ type: 'ritual', ritual, index: idx })} />

          {/* Phase 5 — My Destiny Walk */}
          <SectionHeader title="Meri Life Graph" subtitle="Past se future tak — apni life ka cosmic map" delay={800} />
          <DestinyWalk onYearTap={(age) => setOverlay({ type: 'yearCapsule', age })} />

          {/* Phase 6 — removed Cosmic Balance */}

          {/* Phase 8 — Ask the Stars */}
          <div style={{ height: 24 }} />
          <div style={{ borderTop: '1px solid var(--stroke-minimal)', margin: '0 16px' }} />
          <div style={{ height: 20 }} />
          <AskTheStars />

          {IS_UNIFIED && <DailyCompanionCTA />}

          <div style={{ height: 20 }} />
        </div>

        {/* Overlays */}
        {overlay?.type === 'story' && (
          <StoryOverlay startIndex={overlay.index} onClose={() => setOverlay(null)} />
        )}
        {overlay?.type === 'planet' && (
          <PlanetStoryCapsule
            planet={overlay.planet}
            currentIndex={overlay.index}
            total={ORBIT_PLANETS.length}
            onClose={() => setOverlay(null)}
            onPrev={overlay.index > 0 ? () => setOverlay({ type: 'planet', planet: ORBIT_PLANETS[overlay.index - 1], index: overlay.index - 1 }) : null}
            onNext={overlay.index < ORBIT_PLANETS.length - 1 ? () => setOverlay({ type: 'planet', planet: ORBIT_PLANETS[overlay.index + 1], index: overlay.index + 1 }) : null}
          />
        )}
        {overlay?.type === 'yearCapsule' && (
          <YearCapsuleOverlay age={overlay.age} onClose={() => setOverlay(null)} />
        )}
        {overlay?.type === 'ritual' && (
          <RitualRevealOverlay
            ritual={overlay.ritual}
            currentIndex={overlay.index}
            total={DESTINY_RITUALS.length}
            onClose={() => setOverlay(null)}
            onPrev={overlay.index > 0 ? () => setOverlay({ type: 'ritual', ritual: DESTINY_RITUALS[overlay.index - 1], index: overlay.index - 1 }) : null}
            onNext={overlay.index < DESTINY_RITUALS.length - 1 ? () => setOverlay({ type: 'ritual', ritual: DESTINY_RITUALS[overlay.index + 1], index: overlay.index + 1 }) : null}
          />
        )}
      </div>
    </div>
  );
};

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
