const VOICE_IDS = {
  'abhilash': 'CwhRBWXzGAHq8TQ4Fs17',
  'karun': 'onwK4e9ZLuTAKqWW03F9',

};
const DEFAULT_VOICE_ID = 'CwhRBWXzGAHq8TQ4Fs17';

const audioCache = {};
const fetchTTSAudio = async (text, speaker = 'abhilash', cacheKey) => {
  const key = cacheKey || text.slice(0, 40);
  if (audioCache[key]) return audioCache[key];
  const voiceId = VOICE_IDS[speaker] || DEFAULT_VOICE_ID;
  try {
    const resp = await fetch(ELEVEN_TTS_URL + voiceId, {
      method: 'POST',
      headers: { 'xi-api-key': ELEVEN_KEY, 'Content-Type': 'application/json' },
      body: JSON.stringify({ text, model_id: 'eleven_multilingual_v2', voice_settings: { stability: 0.7, similarity_boost: 0.8, style: 0.35 } }),
    });
    if (!resp.ok) throw new Error('TTS error: ' + resp.status);
    const blob = await resp.blob();
    const src = URL.createObjectURL(blob);
    audioCache[key] = src;
    return src;
  } catch (e) { console.warn('TTS fetch failed:', e); return null; }
};

const playAudioSrc = (src) => new Promise((resolve) => {
  if (!src) { resolve(); return; }
  const audio = new Audio(src);
  audio.onended = resolve;
  audio.onerror = resolve;
  audio.play().catch(resolve);
});

const playTTS = async (text, speaker = 'abhilash') => {
  const voiceId = VOICE_IDS[speaker] || DEFAULT_VOICE_ID;
  const chunks = [];
  if (text.length <= 480) { chunks.push(text); }
  else {
    let remaining = text;
    while (remaining.length > 0) {
      if (remaining.length <= 480) { chunks.push(remaining); break; }
      let cut = remaining.lastIndexOf('\u0964', 479);
      if (cut < 100) cut = remaining.lastIndexOf('.', 479);
      if (cut < 100) cut = remaining.lastIndexOf(',', 479);
      if (cut < 100) cut = 479;
      chunks.push(remaining.substring(0, cut + 1));
      remaining = remaining.substring(cut + 1).trim();
    }
  }
  for (const chunk of chunks) {
    try {
      const resp = await fetch(ELEVEN_TTS_URL + voiceId, {
        method: 'POST',
        headers: { 'xi-api-key': ELEVEN_KEY, 'Content-Type': 'application/json' },
        body: JSON.stringify({ text: chunk, model_id: 'eleven_multilingual_v2', voice_settings: { stability: 0.7, similarity_boost: 0.8, style: 0.35 } }),
      });
      if (!resp.ok) throw new Error(await resp.text());
      const blob = await resp.blob();
      const audio = new Audio(URL.createObjectURL(blob));
      await new Promise((resolve) => { audio.onended = resolve; audio.onerror = resolve; audio.play(); });
    } catch (err) { console.error('TTS chunk error:', err); throw err; }
  }
};

/* ═══════════════════════════════════════
   1B. LIVING DAY ORBIT CLOCK
   ═══════════════════════════════════════ */
const OrbitClock = ({ onPlanetDeepLink }) => {
  const currentHour = new Date().getHours();
  const currentSlot = getSlotForHour(currentHour);
  const [autoIdx, setAutoIdx] = useState(0);
  const [userSelected, setUserSelected] = useState(null);
  const [speaking, setSpeaking] = useState(false);
  const [muted, setMuted] = useState(false);
  const autoTimer = useRef(null);
  const pauseTimer = useRef(null);
  const currentAudio = useRef(null);
  const cancelledRef = useRef(false);

  const CLOCK_SIZE = 280;
  const CENTER = CLOCK_SIZE / 2;
  const RADIUS = 110;

  const stopCurrentAudio = () => {
    if (currentAudio.current) {
      try { currentAudio.current.pause(); currentAudio.current.currentTime = 0; } catch(e) {}
      currentAudio.current = null;
    }
  };

  const playClockAudio = (src) => new Promise((resolve) => {
    if (!src) { resolve(); return; }
    stopCurrentAudio();
    const audio = new Audio(src);
    currentAudio.current = audio;
    audio.onended = () => { currentAudio.current = null; resolve(); };
    audio.onerror = () => { currentAudio.current = null; resolve(); };
    audio.play().catch(() => { currentAudio.current = null; resolve(); });
  });

  // Preload all clock slot audios on mount so taps are instant
  useEffect(() => {
    DAILY_TIMELINE.forEach((slot, i) => {
      fetchTTSAudio(slot.narration, 'abhilash', 'clock_' + i);
    });
  }, []);

  // Auto-rotate: silently advance every 5 seconds (NO audio — audio only on user tap)
  useEffect(() => {
    if (userSelected !== null) return;
    const timer = setTimeout(() => {
      setAutoIdx(prev => (prev + 1) % DAILY_TIMELINE.length);
    }, 5000);
    return () => clearTimeout(timer);
  }, [autoIdx, userSelected]);

  // When user taps a segment, pause auto-rotate, speak that slot, then resume after
  const handleSegmentTap = async (slot, idx) => {
    cancelledRef.current = true;
    stopCurrentAudio();
    setUserSelected(idx);
    clearTimeout(pauseTimer.current);

    if (!muted) {
      setSpeaking(true);
      try {
        cancelledRef.current = false;
        const src = await fetchTTSAudio(slot.narration, 'abhilash', 'clock_' + idx);
        if (src && !cancelledRef.current) await playClockAudio(src);
      } catch (e) { console.warn(e); }
      setSpeaking(false);
    }

    // Resume auto-rotation after 15s of idle
    clearTimeout(pauseTimer.current);
    pauseTimer.current = setTimeout(() => {
      setUserSelected(null);
      setAutoIdx((idx + 1) % DAILY_TIMELINE.length);
    }, 15000);
  };

  const activeIdx = userSelected !== null ? userSelected : autoIdx;
  const activeSlot = DAILY_TIMELINE[activeIdx];

  // Progress indicator
  const [progress, setProgress] = useState(0);
  useEffect(() => {
    setProgress(0);
    const start = Date.now();
    const estimatedDur = 5000;
    let rafId;
    const raf = () => {
      const pct = Math.min((Date.now() - start) / estimatedDur, 1);
      setProgress(pct);
      if (pct < 1) rafId = requestAnimationFrame(raf);
    };
    rafId = requestAnimationFrame(raf);
    return () => cancelAnimationFrame(rafId);
  }, [autoIdx, userSelected, muted]);

  return (
    <div style={{
      margin:'8px 16px', borderRadius:24, overflow:'hidden',
      background:'linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.01))',
      border:'1px solid rgba(255,255,255,0.06)',
      padding:'20px 0',
      animation:'fadeInUp 500ms ease-out 500ms both',
    }}>
      {/* Section label */}
      <div style={{ padding:'0 20px 16px', display:'flex', alignItems:'center', justifyContent:'space-between' }}>
        <div>
          <div style={{ fontSize:15, fontWeight:800, color:'rgba(255,255,255,0.9)' }}>आज का दिन</div>
          <div style={{ fontSize:10, fontWeight:400, color:'rgba(255,255,255,0.35)' }}>Poore din ka cosmic map</div>
        </div>
        <div style={{ display:'flex', alignItems:'center', gap:6 }}>
          <div style={{
            fontSize:9, fontWeight:700, color:'#4ecdc4', letterSpacing:1,
            background:'rgba(78,205,196,0.1)', padding:'4px 10px', borderRadius:8,
          }}>{(activeIdx + 1) + '/' + DAILY_TIMELINE.length}</div>
          <div onClick={() => setMuted(!muted)} style={{
            width:28, height:28, borderRadius:'50%', cursor:'pointer',
            background: muted ? 'rgba(255,255,255,0.06)' : 'rgba(78,205,196,0.1)',
            display:'flex', alignItems:'center', justifyContent:'center',
            fontSize:12, color: muted ? 'rgba(255,255,255,0.3)' : '#4ecdc4',
            border: muted ? '1px solid rgba(255,255,255,0.08)' : '1px solid rgba(78,205,196,0.2)',
          }}>{muted ? '🔇' : '🔊'}</div>
        </div>
      </div>

      {/* Auto-rotate progress bar */}
      {userSelected === null && (
        <div style={{ margin:'0 20px 12px', height:2, borderRadius:1, background:'rgba(255,255,255,0.06)' }}>
          <div style={{
            height:'100%', borderRadius:1, background:activeSlot.color,
            width:(progress * 100) + '%', transition:'width 100ms linear',
          }} />
        </div>
      )}

      {/* Circular clock */}
      <div style={{ display:'flex', justifyContent:'center', position:'relative' }}>
        <div style={{ position:'relative', width:CLOCK_SIZE, height:CLOCK_SIZE }}>
          <svg width={CLOCK_SIZE} height={CLOCK_SIZE} style={{ position:'absolute', inset:0 }}>
            <circle cx={CENTER} cy={CENTER} r={RADIUS} fill="none" stroke="rgba(255,255,255,0.04)" strokeWidth="32" />
          </svg>

          {DAILY_TIMELINE.map((slot, i) => {
            const totalHours = 18;
            const startAngle = ((slot.hour - 5) / totalHours) * 360 - 90;
            const endAngle = ((slot.endHour - 5) / totalHours) * 360 - 90;
            const midAngle = (startAngle + endAngle) / 2;
            const midRad = (midAngle * Math.PI) / 180;
            const isActive = i === activeIdx;
            const isCurrentSlot = slot.planet === currentSlot.planet;

            const r = RADIUS;
            const startRad = (startAngle * Math.PI) / 180;
            const endRad = (endAngle * Math.PI) / 180;
            const x1 = CENTER + r * Math.cos(startRad);
            const y1 = CENTER + r * Math.sin(startRad);
            const x2 = CENTER + r * Math.cos(endRad);
            const y2 = CENTER + r * Math.sin(endRad);
            const largeArc = (endAngle - startAngle) > 180 ? 1 : 0;
            const iconX = CENTER + RADIUS * Math.cos(midRad);
            const iconY = CENTER + RADIUS * Math.sin(midRad);

            return (
              <g key={i}>
                <svg width={CLOCK_SIZE} height={CLOCK_SIZE} style={{ position:'absolute', inset:0, cursor:'pointer' }}
                  onClick={() => handleSegmentTap(slot, i)}>
                  <path
                    d={'M ' + x1 + ' ' + y1 + ' A ' + r + ' ' + r + ' 0 ' + largeArc + ' 1 ' + x2 + ' ' + y2}
                    fill="none" stroke={isActive ? slot.color : 'rgba(255,255,255,0.08)'}
                    strokeWidth={isActive ? 34 : 30}
                    strokeLinecap="butt"
                    style={{ transition:'all 400ms ease', opacity: isActive ? 0.8 : 0.4 }}
                  />
                </svg>
                <div style={{
                  position:'absolute',
                  left:iconX - 14, top:iconY - 14,
                  width:28, height:28, borderRadius:'50%',
                  background: isActive ? slot.color : isCurrentSlot ? slot.color + '60' : 'rgba(0,0,0,0.4)',
                  border: isActive ? '2px solid ' + slot.color : '1px solid rgba(255,255,255,0.1)',
                  display:'flex', alignItems:'center', justifyContent:'center',
                  fontSize:14, color: isActive || isCurrentSlot ? '#fff' : 'rgba(255,255,255,0.5)',
                  cursor:'pointer', transition:'all 400ms ease',
                  boxShadow: isActive ? '0 0 16px ' + slot.color + '60' : 'none',
                  transform: isActive ? 'scale(1.15)' : 'scale(1)',
                  zIndex:5,
                }} onClick={() => handleSegmentTap(slot, i)}>
                  {slot.icon}
                </div>
              </g>
            );
          })}

          {/* Center content */}
          <div style={{
            position:'absolute', left:CENTER - 55, top:CENTER - 45,
            width:110, height:90, display:'flex', flexDirection:'column',
            alignItems:'center', justifyContent:'center', textAlign:'center',
          }}>
            <div style={{ fontSize:11, fontWeight:400, color:'rgba(255,255,255,0.35)' }}>
              {formatTime12(activeSlot.hour)} – {formatTime12(activeSlot.endHour)}
            </div>
            <div style={{
              fontSize:28, marginTop:2,
              animation:'breathe 3s ease-in-out infinite',
            }}>{activeSlot.icon}</div>
            <div style={{ fontSize:13, fontWeight:700, color:activeSlot.color, marginTop:2, transition:'color 300ms ease' }}>
              {activeSlot.nameHi}
            </div>
            <div style={{ fontSize:9, fontWeight:500, color:'rgba(255,255,255,0.4)' }}>
              {activeSlot.planet}
            </div>
          </div>
        </div>
      </div>

      {/* Active segment detail panel */}
      <div style={{
        margin:'16px 20px 0', padding:'14px 16px', borderRadius:14,
        background:'linear-gradient(135deg, ' + activeSlot.color + '12, ' + activeSlot.color + '06)',
        border:'1px solid ' + activeSlot.color + '20',
        transition:'all 400ms ease',
      }}>
        <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between' }}>
          <div style={{ fontSize:13, fontWeight:700, color:activeSlot.color }}>
            {activeSlot.label}
          </div>
          <div style={{ display:'flex', alignItems:'center', gap:6 }}>
            {speaking && (
              <div style={{ display:'flex', gap:2, alignItems:'flex-end' }}>
                {[8, 14, 6, 12, 8].map((h, i) => (
                  <div key={i} style={{
                    width:2, height:h, borderRadius:1, background:activeSlot.color,
                    animation:'breathe 0.6s ease-in-out infinite',
                    animationDelay:(i * 0.08) + 's', opacity:0.7,
                  }} />
                ))}
              </div>
            )}
            {isCurrent(activeSlot) && (
              <span style={{
                fontSize:8, fontWeight:800, letterSpacing:1, color:'#fff',
                background:activeSlot.color, padding:'2px 8px', borderRadius:6,
              }}>ABHI</span>
            )}
          </div>
        </div>
        <div style={{ fontSize:12, fontWeight:400, color:'rgba(255,255,255,0.6)', lineHeight:1.5, marginTop:4 }}>
          {activeSlot.advice}
        </div>
      </div>

      {/* Golden Window callout */}
      <div style={{
        margin:'12px 20px 0', padding:'10px 14px', borderRadius:12,
        background:'linear-gradient(135deg, rgba(245,208,96,0.1), rgba(212,160,23,0.05))',

      {/* Explore in Kundali deep-link chip */}
      {onPlanetDeepLink && (
        <div onClick={onPlanetDeepLink} style={{

          display:'flex', alignItems:'center', justifyContent:'space-between', cursor:'pointer',
        }}>
          <div style={{ display:'flex', alignItems:'center', gap:8 }}>
            <span style={{ fontSize:16 }}>🌌</span>

          fontSize:16, color:'rgba(245,166,35,0.9)',

    </div>
  );
};

const DailyAstrocast = () => {
  const [phase, setPhase] = useState('idle'); // idle → playing → done
  const [sceneIdx, setSceneIdx] = useState(0);
  const [speaking, setSpeaking] = useState(false);
  const cancelledRef = useRef(false);
  const audioRef = useRef(null);

  const stopAudio = () => {
    if (audioRef.current) {
      try { audioRef.current.pause(); audioRef.current.currentTime = 0; } catch(e) {}
      audioRef.current = null;
    }
  };

  const playSceneAudio = (src) => new Promise((resolve) => {
    if (!src) { resolve(); return; }
    stopAudio();
    const audio = new Audio(src);
    audioRef.current = audio;
    audio.onended = () => { audioRef.current = null; resolve(); };
    audio.onerror = () => { audioRef.current = null; resolve(); };
    audio.play().catch(() => { audioRef.current = null; resolve(); });
  });

  // Preload all astrocast scene audios on mount
  useEffect(() => {
    ASTROCAST_SCENES.forEach((s, i) => {
      fetchTTSAudio(s.chunk, 'abhilash', 'astrocast_s' + i);
    });
  }, []);

  const handlePlay = async () => {
    if (phase === 'playing') return;
    setPhase('playing');
    setSceneIdx(0);
    cancelledRef.current = false;

    // Pre-fetch all scenes in parallel first, then play sequentially
    setSpeaking(true);
    const srcs = await Promise.all(
      ASTROCAST_SCENES.map((s, i) => fetchTTSAudio(s.chunk, 'abhilash', 'astrocast_s' + i))
    );
    for (let i = 0; i < ASTROCAST_SCENES.length; i++) {
      if (cancelledRef.current) break;
      setSceneIdx(i);
      try {
        if (srcs[i] && !cancelledRef.current) await playSceneAudio(srcs[i]);
      } catch (e) { console.warn('Astrocast TTS scene ' + i + ':', e); }
    }
    setSpeaking(false);
    if (!cancelledRef.current) setPhase('done');
  };

  const handleStop = () => {
    cancelledRef.current = true;
    stopAudio();
    setPhase('idle');
    setSceneIdx(0);
    setSpeaking(false);
  };

  // Cleanup on unmount
  useEffect(() => () => { cancelledRef.current = true; stopAudio(); }, []);

  const scene = ASTROCAST_SCENES[sceneIdx];
  const isPlaying = phase === 'playing';

  // Area-to-color mapping for the progress bar
  const AREA_COLORS = { intro:'#c9a0ff', career:'#3535f3', love:'#e84393', wealth:'#f5a623', health:'#00c48c', lucky:'#4ecdc4', overall:'#f5a623' };

    <div style={{
      margin:'16px 16px 0', borderRadius:20, overflow:'hidden',

        position:'relative',
        minHeight: isPlaying ? 360 : 340,

              width:68, height:68, borderRadius:'50%', margin:'0 auto 16px',
              background:'linear-gradient(135deg, #f5a623, #e8871e)',
              display:'flex', alignItems:'center', justifyContent:'center',
              fontSize:28, color:'#fff', cursor:'pointer',

/* ═══════════════════════════════════════
   3B. COSMIC SHIFT MAP

const CosmicShiftMap = () => {
  const [phase, setPhase] = useState(0); // 0=before, 1=moving, 2=arrived
  const ref = useRef(null);
  const inView = useRef(false);
  const timers = useRef([]);

  // Looping animation: KAL (1.5s) → moving (1.6s) → AAJ (3s) → reset → repeat
  const runCycle = () => {
    const t = timers.current;
    // Clear any pending timers
    t.forEach(clearTimeout);
    t.length = 0;
    setPhase(0);
    t.push(setTimeout(() => { if (inView.current) setPhase(1); }, 1500));   // start moving
    t.push(setTimeout(() => { if (inView.current) setPhase(2); }, 3100));   // arrive
    t.push(setTimeout(() => { if (inView.current) runCycle(); }, 7000));    // reset & loop
  };

  useEffect(() => {
    if (!ref.current) return;
    const obs = new IntersectionObserver(([entry]) => {
      inView.current = entry.isIntersecting;
      if (entry.isIntersecting) {
        runCycle();
      } else {
        // Pause when off-screen
        timers.current.forEach(clearTimeout);
        timers.current.length = 0;
      }
    }, { threshold: 0.3 });
    obs.observe(ref.current);
    return () => { obs.disconnect(); timers.current.forEach(clearTimeout); };
  }, []);

  // Planet layout: each planet has from/to positions in the sky map
  const PLANET_ANIM = [
    { // Moon: moves from right-center to lower-right (7th → 8th house)
      fromX: 65, fromY: 35, toX: 78, toY: 62,
      ...TRANSIT_CHANGES[0],
    },
    { // Mercury: moves from left-low to left-center (retrograde → direct = "forward")
      fromX: 28, fromY: 65, toX: 35, toY: 40,
      ...TRANSIT_CHANGES[1],
    },
  ];

  return (

      </div>
      <div style={{ fontSize:10, fontWeight:400, color:'rgba(255,255,255,0.35)', marginBottom:14 }}>
        {phase < 2 ? 'Raat bhar planets move hue...' : 'Overnight planetary movements'}
      </div>

      {/* Animated sky map */}
      <div style={{
        borderRadius:16, overflow:'hidden', position:'relative',
        background:'linear-gradient(160deg, #111640 0%, #0c0e28 40%, #0f1235 100%)',

      }}>

          <line x1="0" y1="50" x2="100" y2="50" stroke="#8b9cf7" strokeWidth="0.3" />
          <line x1="0" y1="0" x2="100" y2="100" stroke="#8b9cf7" strokeWidth="0.15" strokeDasharray="2 3" />
          <line x1="100" y1="0" x2="0" y2="100" stroke="#8b9cf7" strokeWidth="0.15" strokeDasharray="2 3" />
        </svg>

        {/* Phase label — KAL / MOVING / AAJ */}
        <div style={{
          position:'absolute', top:10, left:14, display:'flex', alignItems:'center', gap:6, zIndex:5,
        }}>
          <div style={{
            fontSize:10, fontWeight:800, letterSpacing:1.5,
            color: phase === 0 ? 'rgba(255,255,255,0.5)' : phase === 1 ? '#f5a623' : '#4ecdc4',
            transition:'color 500ms ease',
          }}>{phase === 0 ? 'KAL' : phase === 1 ? 'TRANSIT...' : 'AAJ'}</div>
          {phase === 1 && (
            <div style={{ width:5, height:5, borderRadius:'50%', background:'#f5a623', animation:'pulseDot 0.8s ease-in-out infinite' }} />
          )}
        </div>

        {PLANET_ANIM.map((p, i) => {
          const x = phase >= 1 ? p.toX : p.fromX;
          const y = phase >= 1 ? p.toY : p.fromY;

          return (
            <React.Fragment key={i}>
              {/* Ghost "from" position */}
              {phase >= 1 && (
                <div style={{
                  position:'absolute', left:p.fromX + '%', top:p.fromY + '%',
                  transform:'translate(-50%, -50%)',
                  width:42, height:42, borderRadius:'50%',
                  border:'2px dashed ' + p.color + '70',
                  display:'flex', alignItems:'center', justifyContent:'center',
                  fontSize:16, color:p.color + '90',
                  animation:'fadeInUp 300ms ease-out',
                  background: p.color + '15',
                  boxShadow:'0 0 12px ' + p.color + '20',
                }}>{p.planetIcon}</div>
              )}

              {/* Trail path — thicker, glowing */}
              {phase >= 1 && (
                <svg style={{ position:'absolute', inset:0, zIndex:1, pointerEvents:'none' }}
                  width="100%" height="100%" viewBox="0 0 100 100" preserveAspectRatio="none">
                  {/* Glow line */}
                  <line x1={p.fromX} y1={p.fromY} x2={p.toX} y2={p.toY}
                    stroke={p.color} strokeWidth={phase >= 2 ? '1.2' : '0.6'} strokeDasharray="2 2"
                    opacity={phase >= 2 ? 0.6 : 0.3}
                    style={{ transition:'all 500ms ease', filter:'blur(0.5px)' }}
                  />
                  {/* Arrow head at destination */}
                  {phase >= 2 && (
                    <circle cx={p.toX} cy={p.toY} r="1.5" fill={p.color} opacity="0.8" />
                  )}
                </svg>
              )}

              {/* Planet orb — big, bright, unmissable */}
              <div style={{
                position:'absolute',
                left:x + '%', top:y + '%',
                transform:'translate(-50%, -50%)',
                width:48, height:48, borderRadius:'50%',
                background:'radial-gradient(circle at 30% 30%, #fff 0%, ' + p.color + ' 35%, ' + p.color + '99 100%)',
                display:'flex', alignItems:'center', justifyContent:'center',
                fontSize:22, color:'#fff', fontWeight:'bold',
                textShadow:'0 0 6px rgba(0,0,0,0.5)',
                boxShadow: phase >= 2
                  ? '0 0 30px ' + p.color + 'aa, 0 0 60px ' + p.color + '50, 0 0 100px ' + p.color + '20'
                  : '0 0 16px ' + p.color + '70, 0 0 40px ' + p.color + '30',
                transition:'all 1.6s cubic-bezier(0.25, 0.46, 0.45, 0.94)',
                zIndex:3,
                border:'2px solid ' + p.color + '90',
              }}>
                {p.planetIcon}
                {/* Arrival pulse rings */}
                {phase >= 2 && (
                  <>
                    <div style={{
                      position:'absolute', inset:-8, borderRadius:'50%',
                      border:'2px solid ' + p.color + '50',
                      animation:'pulseRing 2s ease-out infinite',
                      animationDelay:(i * 0.4) + 's',
                    }} />
                    <div style={{
                      position:'absolute', inset:-4, borderRadius:'50%',
                      border:'1px solid ' + p.color + '30',
                      animation:'pulseRing 2s ease-out infinite',
                      animationDelay:(i * 0.4 + 0.6) + 's',
                    }} />
                  </>
                )}
              </div>

              {/* "From" label — bigger, more visible */}
              {phase >= 1 && (
                <div style={{
                  position:'absolute', left:p.fromX + '%', top:(p.fromY + 14) + '%',
                  transform:'translateX(-50%)',
                  fontSize:9, fontWeight:700, color:p.color + '80',
                  textDecoration:'line-through', whiteSpace:'nowrap',
                  animation:'fadeInUp 300ms ease-out',
                  background:'rgba(0,0,0,0.4)', padding:'1px 6px', borderRadius:4,
                }}>{p.from}</div>
              )}

              {/* "To" label — bold, highlighted */}
              {phase >= 2 && (
                <div style={{
                  position:'absolute', left:x + '%', top:(y + 15) + '%',
                  transform:'translateX(-50%)',
                  fontSize:10, fontWeight:800, color:p.color,
                  whiteSpace:'nowrap',
                  animation:'fadeInUp 300ms ease-out',
                  background:'rgba(0,0,0,0.5)', padding:'2px 8px', borderRadius:4,
                  border:'1px solid ' + p.color + '30',
                }}>{p.to}</div>
              )}
            </React.Fragment>
          );
        })}
      </div>

      {/* Change cards */}
      {TRANSIT_CHANGES.map((t, i) => (
        <div key={i} style={{
          padding:'14px 16px', borderRadius:14, marginBottom:10,
          background:'linear-gradient(135deg, ' + t.color + '12, ' + t.color + '06)',
          border:'1px solid ' + t.color + '35',
        }}>
          <div style={{ display:'flex', alignItems:'center', gap:10, marginBottom:8 }}>
            <div style={{
              width:32, height:32, borderRadius:'50%',
              background:'radial-gradient(circle at 35% 35%, ' + t.color + '50, ' + t.color + '20)',
              border:'1.5px solid ' + t.color + '60',
              display:'flex', alignItems:'center', justifyContent:'center',
              fontSize:16,
              boxShadow:'0 0 10px ' + t.color + '30',

            <div style={{ display:'flex', alignItems:'center', gap:6, marginLeft:'auto' }}>
              <span style={{ fontSize:11, color:'rgba(255,255,255,0.4)', textDecoration:'line-through' }}>{t.from}</span>
              <span style={{ fontSize:11, color:t.color }}>→</span>
              <span style={{ fontSize:11, fontWeight:800, color:t.color }}>{t.to}</span>

          </div>
          <div style={{ fontSize:12, fontWeight:400, color:'rgba(255,255,255,0.6)', lineHeight:1.5 }}>
            {t.meaning}

    </div>

const matchPlanetChatCategory = (msg) => {
  const m = msg.toLowerCase();
  if (m.includes('सेहत') || m.includes('health') || m.includes('बीमार') || m.includes('तबीयत')) return 'health';
  if (m.includes('करियर') || m.includes('career') || m.includes('job') || m.includes('नौकरी') || m.includes('promotion')) return 'career';
  if (m.includes('love') || m.includes('प्यार') || m.includes('रिश्ते') || m.includes('शादी') || m.includes('partner')) return 'love';
  return 'default';
};

/* ══ KUNDALI TAB — TTS HELPERS (alias to existing fetchTTSAudio) ══ */
const fetchTTS = (text, cacheKey, speaker = 'abhilash') => fetchTTSAudio(text, speaker, cacheKey);

const useNarration = () => {
  const audioRef = useRef(null);
  const cancelledRef = useRef(false);
  const [speaking, setSpeaking] = useState(false);
  const [progress, setProgress] = useState(0);

  const chunkText = (text) => {
    if (text.length <= 480) return [text];
    const chunks = [];
    let remaining = text;
    while (remaining.length > 0) {
      if (remaining.length <= 480) { chunks.push(remaining); break; }
      const cut = remaining.substring(0, 480);
      let splitAt = -1;
      for (const sep of ['।', '.', '!', '?']) {
        const idx = cut.lastIndexOf(sep);
        if (idx > 150 && idx > splitAt) splitAt = idx;
      }
      if (splitAt < 0) {
        for (const sep of [' — ', ', ', '— ']) {
          const idx = cut.lastIndexOf(sep);
          if (idx > 150) { splitAt = idx + sep.length - 1; break; }
        }
      }
      if (splitAt < 0) splitAt = 479;
      chunks.push(remaining.substring(0, splitAt + 1).trim());
      remaining = remaining.substring(splitAt + 1).trim();
    }
    return chunks;
  };

  const fetchChunkAudio = async (chunkText, chunkKey, speaker) => {
    if (audioCache[chunkKey]) return audioCache[chunkKey];
    const voiceId = mapSpeaker(speaker);
    const resp = await fetch(ELEVEN_TTS_URL + voiceId, {
      method: 'POST',
      headers: { 'xi-api-key': ELEVEN_KEY, 'Content-Type': 'application/json' },
      body: JSON.stringify({ text: chunkText, model_id: 'eleven_multilingual_v2', voice_settings: { stability: 0.5, similarity_boost: 0.75 } }),
    });
    if (!resp.ok) { console.warn('ElevenLabs TTS error:', await resp.text()); return null; }
    const blob = await resp.blob();
    const src = URL.createObjectURL(blob);
    audioCache[chunkKey] = src;
    return src;
  };

  const speak = useCallback(async (text, cacheKey, speaker = 'advait') => {
    if (audioRef.current) { audioRef.current.pause(); audioRef.current = null; }
    cancelledRef.current = false;
    setSpeaking(true);
    setProgress(0);
    try {
      const chunks = chunkText(text);
      const totalChunks = chunks.length;
      for (let i = 0; i < totalChunks; i++) {
        if (cancelledRef.current) break;
        const chunkKey = totalChunks === 1 ? cacheKey : cacheKey + '_c' + i;
        const audioSrc = await fetchChunkAudio(chunks[i], chunkKey, speaker);
        if (!audioSrc || cancelledRef.current) break;
        await new Promise((resolve, reject) => {
          const audio = new Audio(audioSrc);
          audioRef.current = audio;
          audio.ontimeupdate = () => {
            if (audio.duration) setProgress((i + audio.currentTime / audio.duration) / totalChunks);
          };
          audio.onended = () => { audioRef.current = null; resolve(); };
          audio.onerror = () => { audioRef.current = null; reject(); };
          audio.play().catch(reject);
        });
      }
    } catch (err) { console.warn('ElevenLabs TTS error:', err); }
    if (!cancelledRef.current) { setSpeaking(false); setProgress(0); }
  }, []);

  const stop = useCallback(() => {
    cancelledRef.current = true;
    if (audioRef.current) { audioRef.current.pause(); audioRef.current = null; }
    setSpeaking(false);
    setProgress(0);
  }, []);

  const toggle = useCallback((text, cacheKey, speaker) => {
    if (speaking) { stop(); } else { speak(text, cacheKey, speaker); }
  }, [speaking, speak, stop]);

  return { speaking, progress, speak, stop, toggle };
};

const chunkTextForTTS = (text) => {
  if (text.length <= 480) return [text];
  const chunks = [];
  let remaining = text;
  while (remaining.length > 0) {
    if (remaining.length <= 480) { chunks.push(remaining); break; }
    const cut = remaining.substring(0, 480);
    let splitAt = -1;
    for (const sep of ['।', '.', '!', '?']) {
      const idx = cut.lastIndexOf(sep);
      if (idx > 150 && idx > splitAt) splitAt = idx;
    }
    if (splitAt < 0) {
      for (const sep of [' — ', ', ', '— ']) {
        const idx = cut.lastIndexOf(sep);
        if (idx > 150) { splitAt = idx + sep.length - 1; break; }
      }
    }
    if (splitAt < 0) splitAt = 479;
    chunks.push(remaining.substring(0, splitAt + 1).trim());
    remaining = remaining.substring(splitAt + 1).trim();
  }
  return chunks;
};

const _prefetchQueue = [];
let _prefetchRunning = false;
const queuePrefetch = (text, cacheKey, speaker) => {
  const chunks = chunkTextForTTS(text);
  chunks.forEach((chunk, ci) => {
    const key = chunks.length === 1 ? cacheKey : cacheKey + '_c' + ci;
    if (audioCache[key]) return;
    _prefetchQueue.push({ chunk, key, speaker });
  });
  if (!_prefetchRunning) _drainPrefetchQueue();
};
const _drainPrefetchQueue = async () => {
  _prefetchRunning = true;
  while (_prefetchQueue.length > 0) {
    const { chunk, key, speaker } = _prefetchQueue.shift();
    if (audioCache[key]) continue;
    try {
      const voiceId = mapSpeaker(speaker);
      const resp = await fetch(ELEVEN_TTS_URL + voiceId, {
        method: 'POST',
        headers: { 'xi-api-key': ELEVEN_KEY, 'Content-Type': 'application/json' },
        body: JSON.stringify({ text: chunk, model_id: 'eleven_multilingual_v2', voice_settings: { stability: 0.5, similarity_boost: 0.75 } }),
      });
      if (resp.ok) { const blob = await resp.blob(); audioCache[key] = URL.createObjectURL(blob); }
    } catch(e) { console.warn('Prefetch failed for', key); }
    await new Promise(r => setTimeout(r, 400));
  }
  _prefetchRunning = false;
};

const MONTH_NAMES_EN = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

const getMonthReading = (age, year, monthIdx) => {
  const seed = (age * 13 + monthIdx * 7 + year) % 100;
  const planets = ['Sun','Moon','Mars','Mercury','Jupiter','Venus','Saturn','Rahu'];
  const planet = planets[(age + monthIdx) % planets.length];
  const planetIcons = {Sun:'☉',Moon:'☽',Mars:'♂',Mercury:'☿',Jupiter:'♃',Venus:'♀',Saturn:'♄',Rahu:'☊'};
  const energy = Math.max(1, Math.min(5, Math.round(((seed*3+monthIdx*11)%50)/10)+1));
  const houses = ['लग्न','धन','विक्रम','सुख','संतान','रोग','विवाह','आयु','भाग्य','कर्म','लाभ','व्यय'];
  const houseIdx = (seed+monthIdx*3)%12;
  const house = houses[houseIdx]; const houseNum = houseIdx+1;
  const themes = {1:['सावधानी का महीना','शनि की नज़र','चुनौतियों का दौर'],2:['धीरे-धीरे सुधार','मेहनत जारी रखें','patience रखें'],3:['स्थिर समय','balance बनाएँ रखें','normal growth'],4:['अच्छा समय आ रहा है','ग्रहों का साथ','opportunities'],5:['शानदार महीना','ग्रह अनुकूल','peak energy']};
  const theme = themes[energy][(seed+monthIdx)%3];
  const areas = [
    {area:'करियर',icon:'💼',lines:{high:['Promotion chances strong','Leadership role में आएंगे','Recognition मिलेगी'],mid:['Steady progress','Focus बनाएँ रखें','New skills सीखें'],low:['Patience रखें','Office politics से बचें','Side project शुरू करें']}},
    {area:'सेहत',icon:'🫀',lines:{high:['Energy peak','Immunity strong रहेगी','Mental health excellent'],mid:['Diet पर ध्यान दें','Regular exercise','Sleep schedule fix करें'],low:['Health checkup करवाएँ','Stress manage करें','आराम ज़रूरी है']}},
    {area:'धन',icon:'💰',lines:{high:['Investment का golden time','Unexpected income possible','Financial growth strong'],mid:['Savings बढ़ाएँ','Budget follow करें','छोटे investments शुरू करें'],low:['Overspending avoid करें','Loans से बचें','Emergency fund बनाएँ']}},
    {area:'रिश्ते',icon:'❤️',lines:{high:['Love life bloom करेगी','Family bonding strong','New connections beneficial'],mid:['Communication improve करें','Patience रखें','Old friends से मिलें'],low:['Misunderstandings possible','Space दें','Self-love पर focus']}},
  ];
  const areaReadings = areas.map(a => {
    const aScore = Math.max(1,Math.min(5,energy+((seed+a.area.charCodeAt(0)+monthIdx)%3)-1));
    const level = aScore>=4?'high':aScore>=3?'mid':'low';
    const line = a.lines[level][(seed+monthIdx+a.area.charCodeAt(0))%3];
    return {...a, score:aScore, line};
  });
  return {planet, planetIcon:planetIcons[planet], energy, house, houseNum, theme, areaReadings};
};

  };

    if(hasScrolled.current||!scrollRef.current) return;
    const doScroll=()=>{ if(hasScrolled.current) return; hasScrolled.current=true; const idx=allAges.indexOf(CURRENT_AGE); if(idx<0) return; const cw=scrollRef.current.clientWidth; if(cw>0) scrollRef.current.scrollLeft=Math.max(0,SPACER+idx*NODE_W-cw/2+NODE_W/2); };
    if(scrollRef.current.clientWidth>0&&scrollRef.current.getBoundingClientRect().top<window.innerHeight){doScroll();return;}
    const obs=new IntersectionObserver(([entry])=>{if(entry.isIntersecting){obs.disconnect();requestAnimationFrame(doScroll);}},{threshold:0.1});
    obs.observe(scrollRef.current);
    return ()=>obs.disconnect();
  },[]);
  useEffect(()=>{
    const el=scrollRef.current; if(!el) return;
    let ticking=false;
    const onScroll=()=>{ if(ticking) return; ticking=true; requestAnimationFrame(()=>{ const centerX=el.scrollLeft+el.clientWidth/2; const idx=Math.round((centerX-SPACER)/NODE_W); const clamped=Math.max(0,Math.min(idx,allAges.length-1)); if(allAges[clamped]!==undefined) setCenteredAge(allAges[clamped]); ticking=false; }); };

          <div style={{fontSize:11,fontWeight:400,color:'var(--text-low)',marginTop:2}}>Tap karke jaano apne baare mein</div>
        </div>
        <div className="horiz-scroll" style={{display:'flex',gap:12,padding:'4px 16px 16px',overflowX:'auto'}}>
          {STORY_CARDS.map((card,i)=>(
            <StoryCardPreview key={card.id} card={card} index={i} onTap={(idx)=>setOverlay({type:'story',index:idx})}/>
          ))}
        </div>
      </div>

      {/* Celebrity Kundli Match */}
      <CelebrityKundliMatch/>

      {/* Destiny Walk */}
      <div style={{padding:'0 0 0',background:'#fff'}}>
        <div style={{padding:'0 16px 8px'}}>
          <div style={{fontSize:13,fontWeight:800,color:'var(--text-high)'}}>Meri Life Graph</div>
          <div style={{fontSize:11,fontWeight:400,color:'var(--text-low)',marginTop:2}}>Past se future tak — apni life ka cosmic map</div>
        </div>
        <DestinyWalk onYearTap={(age)=>setOverlay({type:'yearCapsule',age})}/>
      </div>

      {/* Ask the Stars */}
      <div style={{height:24}}/>
      <div style={{borderTop:'1px solid var(--stroke-minimal)',margin:'0 16px'}}/>
      <div style={{height:20}}/>
      <AskTheStars/>

      {/* Overlays */}
      {overlay?.type==='story'&&<StoryOverlay startIndex={overlay.index} onClose={()=>setOverlay(null)}/>}
      {overlay?.type==='planet'&&(
        <PlanetStoryCapsule
          planet={overlay.planet}
          currentIndex={overlay.index}
          total={ORBIT_PLANETS.length}
          onClose={()=>setOverlay(null)}
          onPrev={overlay.index>0?()=>setOverlay({type:'planet',planet:ORBIT_PLANETS[overlay.index-1],index:overlay.index-1}):null}
          onNext={overlay.index<ORBIT_PLANETS.length-1?()=>setOverlay({type:'planet',planet:ORBIT_PLANETS[overlay.index+1],index:overlay.index+1}):null}
        />
      )}
      {overlay?.type==='yearCapsule'&&<YearCapsuleOverlay age={overlay.age} onClose={()=>setOverlay(null)}/>}
    </div>
  );
};

const BottomNav = ({ activeTab, onTabChange }) => (
  <div style={{position:'absolute',bottom:0,left:0,right:0,height:60,background:'rgba(10,10,26,0.96)',backdropFilter:'blur(12px)',borderTop:'1px solid rgba(255,255,255,0.08)',display:'flex',zIndex:50}}>
    {[{id:'aaj',icon:'🌅',label:'Aaj'},{id:'kundali',icon:'✨',label:'Kundali'}].map(tab=>(
      <div key={tab.id} onClick={()=>onTabChange(tab.id)} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',cursor:'pointer',position:'relative',gap:3}}>
        {activeTab===tab.id&&<div style={{position:'absolute',top:0,left:'20%',right:'20%',height:2,background:'var(--primary-50)',borderRadius:1}}/>}
        <span style={{fontSize:20,lineHeight:1}}>{tab.icon}</span>
        <span style={{fontSize:10,fontWeight:activeTab===tab.id?700:500,color:activeTab===tab.id?'var(--primary-50)':'rgba(255,255,255,0.4)',letterSpacing:0.3}}>{tab.label}</span>
      </div>
    ))}
  </div>
);

/* ═══════════════════════════════════════
   APP SHELL
   ═══════════════════════════════════════ */
const App = () => {
  const [entryDone, setEntryDone] = useState(false);
  const alreadyEntered = useRef(!!sessionStorage.getItem('cosmic_entry_done'));
  const [activeTab, setActiveTab] = useState('aaj');
  const [showKundaliEntry, setShowKundaliEntry] = useState(false);
  const kundaliEntryShown = useRef(!!sessionStorage.getItem('kundali_entry_done'));

  useEffect(() => {
    if (alreadyEntered.current) {
      setEntryDone(true);
    }
  }, []);

  const handleEntryComplete = () => {
    sessionStorage.setItem('cosmic_entry_done', '1');
    setEntryDone(true);
  };

  const handleTabChange = (tab) => {
    if (tab === 'kundali' && !kundaliEntryShown.current) {
      setShowKundaliEntry(true);
      kundaliEntryShown.current = true;
      sessionStorage.setItem('kundali_entry_done', '1');
      setTimeout(() => { setShowKundaliEntry(false); setActiveTab('kundali'); }, 1800);
    } else {
      setActiveTab(tab);
    }
  };

  return (
    <div className="phone-frame">
      <div className="status-bar">
        <span>9:41</span>
        <span style={{ fontSize:11, fontWeight:700 }}>✦ Astro Daily</span>
        <div className="status-bar-right">
          <span style={{ fontSize:10 }}>Jio 5G</span>
          <span>{E.battery}</span>
        </div>
      </div>

      {/* Cosmic Entry Animation */}
      {!alreadyEntered.current && !entryDone && (
        <CosmicEntry onComplete={handleEntryComplete} />
      )}

      {/* Kundali Entry cinematic transition */}
      {showKundaliEntry && <KundaliEntry onDismiss={()=>{ setShowKundaliEntry(false); setActiveTab('kundali'); }} />}

      {/* Tab content container */}
      <div style={{ flex:1, position:'relative', overflow:'hidden', opacity: entryDone ? 1 : 0, transition:'opacity 500ms ease', display:'flex', flexDirection:'column' }}>

        {/* ─── AAJ TAB ─── */}
        <div style={{ position:'absolute', inset:0, opacity: activeTab==='aaj' ? 1 : 0, pointerEvents: activeTab==='aaj' ? 'auto' : 'none', transition:'opacity 300ms ease', display:'flex', flexDirection:'column' }}>
          <div className="scroll-feed" style={{
            flex:1,
            background:'linear-gradient(180deg, #0a0a1a 0%, #0d0d2e 15%, #0d0828 35%, #0a1a2a 55%, #0d1a18 75%, #1a1408 100%)',
            paddingBottom:72,
          }}>
            {/* ═══ ZONE 1: LIVE COSMIC ROOM ═══ */}
            <CompactHeader />
            <DailyAstrocast />
            <div style={{ height:24 }} />
            <OrbitClock onPlanetDeepLink={() => handleTabChange('kundali')} />
            <div style={{ height:20 }} />
            <SpeakingPlanetVisit />

            {/* ═══ ZONE 2: TODAY'S RITUALS ═══ */}
            <ZoneDivider icon="🕉" label="Today's Rituals" />
            <RitualChest />
            <div style={{ height:16 }} />
            <CosmicAlert />
            <div style={{ height:16 }} />
            <TodayEnergyCard />

            {/* ═══ ZONE 3: DEEP INTELLIGENCE ═══ */}
            <ZoneDivider icon="🔮" label="Deep Intelligence" />
            <CosmicShiftMap />
            <div style={{ height:16 }} />
            <PlanetMoodRings />

            {/* ═══ ZONE 4: LIFE PROGRESSION ═══ */}
            <ZoneDivider icon="⚡" label="Life Progression" />
            <PredictionCheckIn />
            <div style={{ height:16 }} />
            {IS_UNIFIED && <KundliExploreCard />}
            {IS_UNIFIED && <div style={{ height:16 }} />}
            {!IS_UNIFIED && <KundliExploreCard />}
            {!IS_UNIFIED && <div style={{ height:16 }} />}

            {/* ═══ CHAT BAR AT BOTTOM ═══ */}
            <div style={{ padding:'8px 16px 24px' }}>
              <div style={{
                display:'flex', gap:8, overflowX:'auto', marginBottom:10,
                paddingBottom:4, WebkitOverflowScrolling:'touch',
              }} className="horiz-scroll">
                {[
                  'Aaj mera din kaisa rahega?',
                  'Career mein kab milega promotion?',
                  'Shubh muhurat kya hai aaj?',
                  'Kya aaj invest karna chahiye?',
                  'Love life kab improve hogi?',
                ].map((q, i) => (
                  <div key={i} style={{
                    flexShrink:0, padding:'8px 14px', borderRadius:20,
                    background:'rgba(255,255,255,0.06)',
                    border:'1px solid rgba(255,255,255,0.1)',
                    fontSize:11, fontWeight:500, color:'rgba(255,255,255,0.6)',
                    cursor:'pointer', whiteSpace:'nowrap',
                  }}>{q}</div>
                ))}
              </div>
              <div style={{
                display:'flex', alignItems:'center', gap:10,
                padding:'10px 14px', borderRadius:24,
                background:'rgba(255,255,255,0.06)',
                border:'1px solid rgba(255,255,255,0.1)',
              }}>
                <div style={{ flex:1, fontSize:13, fontWeight:400, color:'rgba(255,255,255,0.3)' }}>Apna sawaal poochiye...</div>
                <div style={{
                  width:36, height:36, borderRadius:'50%',
                  background:'linear-gradient(135deg, #f5a623, #e8871e)',
                  display:'flex', alignItems:'center', justifyContent:'center',
                  fontSize:16, cursor:'pointer',
                  boxShadow:'0 0 12px rgba(245,166,35,0.3)',
                }}>✦</div>
              </div>
            </div>
          </div>
        </div>

        {/* ─── KUNDALI TAB ─── */}
        <div style={{ position:'absolute', inset:0, opacity: activeTab==='kundali' ? 1 : 0, pointerEvents: activeTab==='kundali' ? 'auto' : 'none', transition:'opacity 300ms ease', display:'flex', flexDirection:'column' }}>
          <KundaliTab onYearTap={(age) => {}} onPlanetTap={(planet) => {}} />
        </div>

        {/* Bottom Nav */}
        <BottomNav activeTab={activeTab} onTabChange={handleTabChange} />
      </div>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
