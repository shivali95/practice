  const removeFromCart = useCallback((mealId) => {
    setCart(c => c.filter(m => m.id !== mealId));
  }, []);

  const inCart = useCallback((mealId) => cart.some(m => m.id === mealId), [cart]);

  const addToHotCart = useCallback((item) => {
    setHotCart(c => c.find(i => i.id === item.id) ? c.map(i => i.id === item.id ? { ...i, qty: (i.qty || 1) + 1 } : i) : [...c, { ...item, qty: 1 }]);
  }, []);
  const removeFromHotCart = useCallback((itemId) => { setHotCart(c => c.filter(i => i.id !== itemId)); }, []);
  const hotSubtotal = hotCart.reduce((s, i) => s + i.price * (i.qty || 1), 0);
  const hotTotal = hotSubtotal + (hotCart.length > 0 ? 3.99 : 0);

  const subtotal = cart.reduce((s, m) => s + m.price, 0);
  const deliveryFee = uberOne ? 0 : 3.99;
  const packaging = cart.length > 0 ? 0.50 : 0;
  const total = subtotal + deliveryFee + packaging;
  const savingsRate = planStatus === 'active' ? 0.15 : 0;

  return (
    <AppCtx.Provider value={{
      screen, navigate, goBack, mode, toggleMode,
      cart, setCart, addToCart, removeFromCart, inCart,
      uberOne, setUberOne, showAnnotations, setShowAnnotations,
      orderCount, setOrderCount, nudgeDismissed, setNudgeDismissed,
      selectedDay, setSelectedDay, selectedWindow, setSelectedWindow,
      activeFilter, setActiveFilter, planStatus, setPlanStatus,
      selectedMeal, selectedCreator,
      subtotal, deliveryFee, packaging, total, savingsRate,
      history, hasPackagedMeals, setHasPackagedMeals,
      completedOrders, setCompletedOrders,
      lastOrder, setLastOrder,
      isReturningUser, setIsReturningUser, lastWeekPlan, setLastWeekPlan,
      hotCart, setHotCart, addToHotCart, removeFromHotCart, hotSubtotal, hotTotal,
      selectedRestaurant, setSelectedRestaurant,
    }}>
      {children}
    </AppCtx.Provider>
  );
}

  const day = DAYS[selectedDay] || 'Wednesday';
  const date = NEXT_DATES[selectedDay || 2];
  const dateStr = date?.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });

  if (planStatus === 'none') {
    return (
      <div className="slide-enter">
        <BackHeader title="Your meal plan" />

          <div className="text-5xl mb-4">📋</div>

        </div>
        <div className="flex-1" />
      </div>
    );
  }

  return (
    <div className="slide-enter">
      <BackHeader title="Your meal plan" />
      <div className="px-4 pt-4 pb-24">
        {/* Status */}
        <div className="bg-plan-light rounded-xl p-4 mb-4">
          <div className="flex items-center gap-2 mb-2">
            <div className={`w-2.5 h-2.5 rounded-full ${planStatus === 'active' ? 'bg-uber-green' : 'bg-amber-400'}`} />
            <span className="text-[14px] font-semibold text-plan-dark">Weekly plan · {planStatus === 'active' ? 'Active' : 'Paused'}</span>
          </div>
          {planStatus === 'active' && (
            <>
              <div className="text-[12px] text-green-700">Next delivery: {dateStr}</div>
              <div className="text-[12px] text-green-700">{WINDOWS[0]}</div>
              <div className="text-[12px] text-green-700">{cart.length || 5} meals selected</div>
            </>
          )}
          {planStatus === 'paused' && (
            <div className="text-[12px] text-amber-700">Paused for this week. We'll resume next week unless you pause again.</div>
          )}
        </div>
        {/* This week's meals */}
        {planStatus === 'active' && (
          <div className="mb-4">
            <div className="text-[14px] font-semibold mb-2">This week's meals</div>
            {(cart.length > 0 ? cart : MEALS.slice(0, 5)).map(m => {
              const creator = getCreator(m.creatorId);
              return (
                <div key={m.id} className="flex items-center gap-3 py-2.5 border-b border-gray-50">
                  <img src={m.img} alt={m.name} className="w-11 h-11 rounded-lg object-cover shrink-0" loading="lazy" />
                  <div className="flex-1 min-w-0">
                    <div className="text-[13px] font-medium truncate">{m.name}</div>
                    <div className="text-[11px] text-gray-500">{creator?.name}</div>
                  </div>
                  <button className="text-[11px] text-uber-green font-semibold border border-uber-green rounded-full px-2.5 py-1">Swap</button>
                </div>
              );
            })}
          </div>
        )}
        {/* Actions */}
        {planStatus === 'active' && !showPauseConfirm && (
          <button onClick={() => { setShowPauseConfirm(true); setPlanStatus('paused'); }} className="w-full bg-amber-50 text-amber-800 rounded-xl py-3.5 font-semibold text-[14px] mb-3 border border-amber-200">Pause this week</button>

        {showPauseConfirm && (
          <div className="bg-amber-50 rounded-xl p-4 mb-3 border border-amber-200 fade-in">
            <div className="text-[13px] font-semibold text-amber-800">✓ Paused for this week</div>
            <div className="text-[12px] text-amber-700 mt-1">We'll resume next week unless you pause again.</div>
            <button onClick={() => { setPlanStatus('active'); setShowPauseConfirm(false); }} className="mt-2 text-[12px] font-semibold text-uber-green">Resume plan →</button>
          </div>

        <Annotation text="#1 retention mechanic. Easy pause = users stay. Hard pause = users cancel." />
        {planStatus === 'active' && (
          <button className="w-full border border-gray-200 text-gray-700 rounded-xl py-3 font-medium text-[13px] mb-4">Skip a meal</button>

  );
}
