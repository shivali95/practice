const SARVAM_API_KEY = 'sk_pirwvalz_65eusIudaoEV7Ne8FpO0yJHc';

const playTTS = async (text, speaker = 'abhilash') => {
  const chunks = [];
  if (text.length <= 480) {
    chunks.push(text);
  } else {
    let remaining = text;
    while (remaining.length > 0) {
      if (remaining.length <= 480) { chunks.push(remaining); break; }
      let cut = remaining.lastIndexOf('\u0964', 479);
      if (cut < 100) cut = remaining.lastIndexOf('.', 479);
      if (cut < 100) cut = remaining.lastIndexOf(',', 479);
      if (cut < 100) cut = 479;
      chunks.push(remaining.substring(0, cut + 1));
      remaining = remaining.substring(cut + 1).trim();
    }
  }

  for (const chunk of chunks) {
    try {
      const resp = await fetch('https://api.sarvam.ai/text-to-speech', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'API-Subscription-Key': SARVAM_API_KEY },
        body: JSON.stringify({
          inputs: [chunk],
          target_language_code: 'hi-IN',
          speaker: speaker,
          model: 'bulbul:v2',
          enable_preprocessing: true,
        }),
      });
      const data = await resp.json();
      if (data.error) {
        console.error('Sarvam TTS API error:', data.error.message);
        throw new Error(data.error.message || 'TTS API error');
      }
      if (data.audios?.[0]) {
        const audio = new Audio('data:audio/wav;base64,' + data.audios[0]);
        await new Promise((resolve) => { audio.onended = resolve; audio.onerror = resolve; audio.play(); });
      }
    } catch (err) {
      console.error('TTS chunk error:', err);
      throw err;
    }
  }
};

/* ==============================================
   2. DAILY DESTINY TIMELINE (Life Graph Style)
   ============================================== */
const DailyTimeline = () => {
  const scrollRef = useRef(null);
  const hasScrolled = useRef(false);
  const currentHour = new Date().getHours();
  const [centeredHour, setCenteredHour] = useState(14); // Start centered on Golden Window

  const NODE_W = 48;
  const SPACER = 150;

  const isInGoldenWindow = centeredHour === 14 || centeredHour === 15;
  const currentSlot = getSlotForHour(centeredHour);

  // Determine landscape panel content
  const panelBg = isInGoldenWindow
    ? 'linear-gradient(135deg, #fdf3d7 0%, #f9e4a0 40%, #f5d060 100%)'
    : 'linear-gradient(135deg, ' + currentSlot.color + '10 0%, ' + currentSlot.color + '18 50%, ' + currentSlot.color + '08 100%)';

  const panelIcon = isInGoldenWindow ? GOLDEN_WINDOW.planetIcon : currentSlot.icon;
  const panelNameHi = isInGoldenWindow ? '\u0917\u0941\u0930\u0941' : currentSlot.nameHi;
  const panelPlanet = isInGoldenWindow ? GOLDEN_WINDOW.planet : currentSlot.planet;
  const panelColor = isInGoldenWindow ? '#b8860b' : currentSlot.color;
  const panelLabel = isInGoldenWindow ? (E.sparkle + ' Golden Window') : currentSlot.label;
  const panelAdvice = isInGoldenWindow ? GOLDEN_WINDOW.advice : currentSlot.advice;
  const panelTime = isInGoldenWindow ? GOLDEN_WINDOW.timeLabel : (formatTime12(currentSlot.hour) + ' \u2013 ' + formatTime12(currentSlot.endHour));

  // Scroll to 9 AM on mount
  useEffect(() => {
    if (hasScrolled.current || !scrollRef.current) return;
    const doScroll = () => {
      if (hasScrolled.current) return;
      hasScrolled.current = true;
      const targetIdx = ALL_HOURS.indexOf(14); // Center on Golden Window
      if (targetIdx < 0) return;
      const cw = scrollRef.current.clientWidth;
      if (cw > 0) {
        scrollRef.current.scrollLeft = Math.max(0, SPACER + targetIdx * NODE_W - cw / 2 + NODE_W / 2);
      }
    };
    if (scrollRef.current.clientWidth > 0 && scrollRef.current.getBoundingClientRect().top < window.innerHeight) {
      doScroll();
      return;
    }
    const obs = new IntersectionObserver(([entry]) => {
      if (entry.isIntersecting) { obs.disconnect(); requestAnimationFrame(doScroll); }
    }, { threshold: 0.1 });
    obs.observe(scrollRef.current);
    return () => obs.disconnect();
  }, []);

  // Track centered hour on scroll
  useEffect(() => {
    const el = scrollRef.current;
    if (!el) return;
    let ticking = false;
    const onScroll = () => {
      if (ticking) return;
      ticking = true;
      requestAnimationFrame(() => {
        const centerX = el.scrollLeft + el.clientWidth / 2;
        const idx = Math.round((centerX - SPACER) / NODE_W);
        const clamped = Math.max(0, Math.min(idx, ALL_HOURS.length - 1));
        if (ALL_HOURS[clamped] !== undefined) setCenteredHour(ALL_HOURS[clamped]);
        ticking = false;
      });
    };
    el.addEventListener('scroll', onScroll, { passive: true });
    return () => el.removeEventListener('scroll', onScroll);
  }, []);

  const curIdx = ALL_HOURS.indexOf(currentHour);

  return (
    <div style={{
      margin:'0 16px', borderRadius:20, overflow:'hidden',
      boxShadow:'0 4px 24px rgba(0,0,0,0.06)',
      border:'1px solid rgba(0,0,0,0.04)',
      animation:'fadeInUp 500ms ease-out 200ms both',
    }}>
      {/* Top Landscape Panel */}
      <div style={{
        position:'relative',
        background: panelBg,
        transition:'background 500ms ease',
        padding:'16px 18px 14px',
        minHeight:130,
        borderBottom: isInGoldenWindow ? '1px solid #d4a01730' : ('1px solid ' + currentSlot.color + '15'),
      }}>
        <div style={{ display:'flex', alignItems:'flex-start', gap:14 }}>
          <div style={{ position:'relative', flexShrink:0 }}>
            <div style={{
              width:48, height:48, borderRadius:'50%',
              background: isInGoldenWindow
                ? 'linear-gradient(135deg, #f5d060, #d4a017)'
                : ('linear-gradient(135deg, ' + currentSlot.color + '30, ' + currentSlot.color + '60)'),
              display:'flex', alignItems:'center', justifyContent:'center',
              fontSize:24,
              boxShadow: isInGoldenWindow ? '0 4px 20px rgba(212,160,23,0.4)' : ('0 4px 20px ' + currentSlot.color + '30'),
              animation:'breathe 3s ease-in-out infinite',
              transition:'background 500ms ease, box-shadow 500ms ease',
            }}>{panelIcon}</div>
            <div style={{
              position:'absolute', inset:-6, borderRadius:'50%',
              border: isInGoldenWindow ? '2px solid #d4a01730' : ('2px solid ' + currentSlot.color + '25'),
              animation:'pulseRing 2.5s ease-out infinite',
            }} />
          </div>
          <div style={{ flex:1 }}>
            <div style={{
              fontSize:9, fontWeight:700, letterSpacing:1.2,
              color: panelColor,
              textTransform:'uppercase', marginBottom:4, opacity:0.7,
            }}>HORA</div>
            <div style={{ fontSize:18, fontWeight:800, color: isInGoldenWindow ? '#5a3e00' : 'var(--text-high)', lineHeight:1.2 }}>
              {panelIcon + ' ' + panelNameHi + ' \u00B7 ' + panelPlanet}
            </div>
            <div style={{ fontSize:12, fontWeight:600, color: panelColor, marginTop:2 }}>
              {panelTime}
            </div>
            <div style={{ fontSize:14, fontWeight:700, color: isInGoldenWindow ? '#5a3e00' : 'var(--text-high)', marginTop:6 }}>
              {panelLabel}
            </div>
            <div style={{ fontSize:12, fontWeight:400, color: isInGoldenWindow ? '#7a5a10' : 'var(--text-mid)', marginTop:3, lineHeight:1.4 }}>
              {panelAdvice}
            </div>
          </div>
        </div>
      </div>

      {/* Bottom Time Rail */}
      <div style={{ background:'#fff', position:'relative' }}>
        {/* Center indicator line */}
        <div style={{
          position:'absolute', top:0, left:'50%', transform:'translateX(-50%)',
          width:2, height:'100%', background: panelColor + '20',
          zIndex:3, pointerEvents:'none',
        }} />
        <div style={{
          position:'absolute', top:-1, left:'50%', transform:'translateX(-50%)',
          width:0, height:0,
          borderLeft:'5px solid transparent', borderRight:'5px solid transparent',
          borderTop:'5px solid ' + panelColor + '40',
          zIndex:4, pointerEvents:'none',
        }} />

        <div ref={scrollRef} className="horiz-scroll" style={{
          overflowX:'auto', overflowY:'hidden', padding:'14px 0 12px',
          WebkitOverflowScrolling:'touch',
        }}>
          <div style={{ display:'flex', alignItems:'center', width:'max-content', position:'relative' }}>
            <div style={{ width:SPACER, flexShrink:0 }} />

            {/* Past solid line */}
            <div style={{
              position:'absolute', top:18, left:SPACER,
              width:Math.max(0, curIdx) * NODE_W, height:2,
              background:currentSlot.color, opacity:0.25, zIndex:0,
            }} />
            {/* Future dashed line */}
            <div style={{
              position:'absolute', top:18,
              left:SPACER + Math.max(0, curIdx) * NODE_W,
              right:SPACER, height:2, zIndex:0,
              backgroundImage:'repeating-linear-gradient(90deg, ' + currentSlot.color + '20 0, ' + currentSlot.color + '20 6px, transparent 6px, transparent 12px)',
            }} />

            {ALL_HOURS.map((h) => {
              const isCurrent = h === currentHour;
              const isPast = h < currentHour;
              const isCentered = h === centeredHour;
              const slot = getSlotForHour(h);
              const isSlotStart = DAILY_TIMELINE.some(s => s.hour === h);
              const isGolden = isGoldenHour(h);

              return (
                <div key={h} style={{
                  width:NODE_W, display:'flex', flexDirection:'column', alignItems:'center',
                  position:'relative', zIndex:1, flexShrink:0,
                }}>
                  {/* Golden hour marker */}
                  {isGolden ? (
                    <div style={{ fontSize:10, color:'#d4a017', fontWeight:800, marginBottom:1 }}>
