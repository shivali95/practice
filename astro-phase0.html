<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=375, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Jio Astro — Phase 0: Compressed Onboarding</title>

<!-- React CDN -->
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>
  /* ── JioType Font Faces ── */
  @font-face {
    font-family: 'JioType';
    font-weight: 400;
    src: url('https://raw.githubusercontent.com/sunit1986/JioBharatIQ_Server/main/assets/fonts/woff2/JioTypeVarW05-Regular.woff2') format('woff2');
  }
  @font-face {
    font-family: 'JioType';
    font-weight: 500;
    src: url('https://raw.githubusercontent.com/sunit1986/JioBharatIQ_Server/main/assets/fonts/woff2/JioTypeW05-Medium.woff2') format('woff2');
  }
  @font-face {
    font-family: 'JioType';
    font-weight: 700;
    src: url('https://raw.githubusercontent.com/sunit1986/JioBharatIQ_Server/main/assets/fonts/woff2/JioTypeW05-Bold.woff2') format('woff2');
  }
  @font-face {
    font-family: 'JioType';
    font-weight: 900;
    src: url('https://raw.githubusercontent.com/sunit1986/JioBharatIQ_Server/main/assets/fonts/woff2/JioTypeW05-Black.woff2') format('woff2');
  }

  /* ── JDS Design Tokens as CSS Variables ── */
  :root {
    /* Colors */
    --primary-20: #e8e8fc;
    --primary-30: #9999ff;
    --primary-40: #6464ff;
    --primary-50: #3535f3;
    --primary-60: #000093;
    --primary-70: #00004c;
    --primary-80: #010029;
    --secondary-20: #fef7e9;
    --secondary-30: #ffe3ae;
    --secondary-40: #ffd947;
    --secondary-50: #f7ab20;
    --secondary-60: #ac660c;
    --secondary-70: #7f4b10;
    --sparkle-20: #e8faf7;
    --sparkle-40: #7aebd9;
    --sparkle-50: #1eccb0;
    --sparkle-60: #1e7b74;
    --error: #fa2f40;
    --warning: #f06d0f;
    --success: #25ab21;
    --grey-100: #141414;
    --grey-80: rgba(0,0,0,0.66);
    --grey-60: #b5b5b5;
    --grey-40: #e0e0e0;
    --grey-20: #f5f5f5;
    --white: #ffffff;
    --surface-default: #ffffff;
    --surface-ghost: #eeeeef;
    --surface-ghost-icon: #e7e9ff;
    --surface-bold: #3900ad;
    --surface-minimal: #f5f5f5;
    --text-high: #141414;
    --text-low: rgba(25,27,30,0.65);
    --text-disabled: rgba(25,27,30,0.38);
    --text-on-bold: #ffffff;
    --stroke-subtle: rgba(36,38,43,0.12);
    --stroke-minimal: rgba(36,38,43,0.13);
    --coral-base: #ff6644;
    --indigo-base: #3800ac;

    /* Planet colors */
    --planet-sun: #f7ab20;
    --planet-moon: #b5b5b5;
    --planet-mars: #ff6644;
    --planet-mercury: #1eccb0;
    --planet-jupiter: #3535f3;
    --planet-venus: #9999ff;
    --planet-saturn: #141414;
    --planet-rahu: #000093;
    --planet-ketu: #3800ac;

    /* Spacing */
    --sp-4xs: 2px;
    --sp-3xs: 4px;
    --sp-2xs: 6px;
    --sp-xs: 8px;
    --sp-s: 12px;
    --sp-base: 14px;
    --sp-m: 16px;
    --sp-l: 20px;
    --sp-xl: 24px;
    --sp-2xl: 32px;
    --sp-3xl: 40px;
    --sp-4xl: 48px;

    /* Border radius */
    --radius-xs: 4px;
    --radius-sm: 8px;
    --radius-md: 12px;
    --radius-lg: 16px;
    --radius-xl: 24px;
    --radius-2xl: 32px;
    --radius-pill: 999px;
  }

  /* ── Reset & Base ── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--grey-20);
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 32px 24px;
    font-family: 'JioType', 'Outfit', sans-serif;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  /* ── Phone Frame ── */
  .phone-frame {
    width: 360px;
    background: var(--white);
    border-radius: 40px;
    border: 8px solid #1a1a1a;
    box-shadow: 0 24px 64px rgba(0,0,0,0.18);
    overflow: hidden;
    position: relative;
  }

  .notch {
    background: #1a1a1a;
    height: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .notch-inner {
    width: 80px;
    height: 20px;
    background: #1a1a1a;
    border-radius: 0 0 14px 14px;
  }

  .status-bar {
    background: var(--white);
    padding: 6px 20px;
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    font-weight: 700;
    color: var(--text-high);
  }

  .screen {
    height: 700px;
    overflow-y: auto;
    overflow-x: hidden;
    position: relative;
    background: var(--surface-minimal);
  }

  /* ── Typography Classes ── */
  .display-s { font-size: 36px; font-weight: 900; letter-spacing: -0.03em; line-height: 1.1; }
  .headline-s { font-size: 24px; font-weight: 900; letter-spacing: -0.03em; line-height: 1.2; }
  .headline-xs { font-size: 22px; font-weight: 900; line-height: 1.2; }
  .headline-2xs { font-size: 20px; font-weight: 900; line-height: 1.2; }
  .title-l { font-size: 20px; font-weight: 700; line-height: 1.3; }
  .title-m { font-size: 18px; font-weight: 700; line-height: 1.3; }
  .title-s { font-size: 16px; font-weight: 700; line-height: 1.3; }
  .body-l { font-size: 16px; font-weight: 500; line-height: 1.5; }
  .body-m { font-size: 15px; font-weight: 500; line-height: 1.5; }
  .body-s { font-size: 14px; font-weight: 500; line-height: 1.5; }
  .body-xs { font-size: 13px; font-weight: 500; line-height: 1.4; }
  .body-2xs { font-size: 12px; font-weight: 500; line-height: 1.4; }
  .label-l { font-size: 14px; font-weight: 700; line-height: 1.3; }
  .label-m { font-size: 13px; font-weight: 700; line-height: 1.3; }
  .label-s { font-size: 12px; font-weight: 700; line-height: 1.3; }
  .label-xs { font-size: 11px; font-weight: 700; line-height: 1.3; }
  .overline { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; }
  .button-text { font-size: 14px; font-weight: 700; }

  /* ── Animations ── */
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }
  @keyframes scaleIn {
    from { opacity: 0; transform: scale(0.92); }
    to { opacity: 1; transform: scale(1); }
  }
  @keyframes slideInRight {
    from { opacity: 0; transform: translateX(24px); }
    to { opacity: 1; transform: translateX(0); }
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.38; }
  }
  @keyframes drawHouseLine {
    from { stroke-dashoffset: 200; }
    to { stroke-dashoffset: 0; }
  }
  @keyframes planetDrop {
    0% { transform: scale(0); opacity: 0; }
    60% { transform: scale(1.2); opacity: 1; }
    100% { transform: scale(1); opacity: 1; }
  }
  @keyframes radialPulse {
    0% { box-shadow: 0 0 0 0px currentColor; opacity: 1; }
    100% { box-shadow: 0 0 0 8px currentColor; opacity: 0; }
  }
  @keyframes brighten {
    0%, 100% { stroke: var(--secondary-50); }
    50% { stroke: var(--secondary-40); }
  }
  @keyframes chartScaleDown {
    from { transform: scale(1); opacity: 1; }
    to { transform: scale(0.4); opacity: 0.85; }
  }
  @keyframes shimmer {
    0% { background-position: -200px 0; }
    100% { background-position: 200px 0; }
  }
</style>
</head>
<body>

<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;

/* ═══════════════════════════════════════════

const IcChevronRight = ({ size = 24, color = 'currentColor' }) => (

  </svg>
);

const IcStar = ({ size = 24, color = 'currentColor' }) => (
  <svg viewBox="0 0 24 24" fill="none" width={size} height={size}>
    <path d="M21.37 9.61a1.964 1.964 0 00-1.52-1.284l-4.235-.646-1.899-4.087a1.917 1.917 0 00-3.434 0L8.38 7.68l-4.273.646a1.964 1.964 0 00-1.52 1.283 1.91 1.91 0 00.447 1.901l3.124 3.213-.74 4.553a1.91 1.91 0 002.88 2.07l3.788-2.091 3.788 2.09a1.9 1.9 0 002.88-2.033l-.74-4.552 3.123-3.213a1.91 1.91 0 00.333-1.93z" fill={color}/>
  </svg>
);

const IcBrain = ({ size = 24, color = 'currentColor' }) => (
  <svg viewBox="0 0 24 24" fill="none" width={size} height={size}>
    <path d="M9 3c-1.1 0-2 .9-2 2-1.45 0-2.66 1.03-2.94 2.39C4.66 7.14 5.31 7 6 7c.96 0 1.85.27 2.61.74.52.32.6 1.04.17 1.47l-.08.08c-.32.32-.8.34-1.19.11a2.969 2.969 0 00-3.11.06c-.21.13-.4.29-.57.47h-.01a3.359 3.359 0 00-.47.69c-.08.15-.15.32-.2.49l-.06.18c-.06.23-.09.46-.09.71 0 1.07.56 2 1.4 2.53-.25.44-.4.93-.4 1.47 0 1.66 1.34 3 3 3 0 1.1.9 2 2 2s2-.9 2-2V5c0-1.1-.9-2-2-2zm10.6 6.47c.25-.44.4-.93.4-1.47 0-1.66-1.34-3-3-3 0-1.1-.9-2-2-2s-2 .9-2 2v8.5c0 1.1.9 2 2 2 .38 0 .74-.11 1.05-.3.39-.24.9-.19 1.22.14a1 1 0 01-.17 1.55 3.906 3.906 0 01-4.11.05V19c0 1.1.9 2 2 2s2-.9 2-2c1.66 0 3-1.34 3-3 0-.15-.02-.29-.04-.44-.01-.09-.03-.17-.05-.25 0-.04-.02-.08-.03-.12-.07-.23-.16-.45-.28-.66a2.969 2.969 0 00-1.81-1.42c-.46-.13-.8-.5-.8-.98 0-.65.62-1.14 1.25-.97 1.05.27 1.96.88 2.62 1.69.08-.27.13-.55.13-.85 0-1.07-.56-2-1.4-2.53h.02z" fill={color}/>
  </svg>
);

/* Simple icon substitutes using JDS-compatible SVG */
const IcLocation = ({ size = 24, color = 'currentColor' }) => (
  <svg viewBox="0 0 24 24" fill="none" width={size} height={size}>
    <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5a2.5 2.5 0 010-5 2.5 2.5 0 010 5z" fill={color}/>
  </svg>
);

const IcClock = ({ size = 24, color = 'currentColor' }) => (
  <svg viewBox="0 0 24 24" fill="none" width={size} height={size}>
    <path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10 10-4.5 10-10S17.5 2 12 2zm4.2 14.2L11 13V7h1.5v5.2l4.5 2.7-.8 1.3z" fill={color}/>
  </svg>
);

const IcHeart = ({ size = 24, color = 'currentColor' }) => (
  <svg viewBox="0 0 24 24" fill="none" width={size} height={size}>
    <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z" fill={color}/>
  </svg>
);

const IcMoney = ({ size = 24, color = 'currentColor' }) => (
  <svg viewBox="0 0 24 24" fill="none" width={size} height={size}>
    <path d="M11.8 10.9c-2.27-.59-3-1.2-3-2.15 0-1.09 1.01-1.85 2.7-1.85 1.78 0 2.44.85 2.5 2.1h2.21c-.07-1.72-1.12-3.3-3.21-3.81V3h-3v2.16c-1.94.42-3.5 1.68-3.5 3.61 0 2.31 1.91 3.46 4.7 4.13 2.5.6 3 1.48 3 2.41 0 .69-.49 1.79-2.7 1.79-2.06 0-2.87-.92-2.98-2.1h-2.2c.12 2.19 1.76 3.42 3.68 3.83V21h3v-2.15c1.95-.37 3.5-1.5 3.5-3.55 0-2.84-2.43-3.81-4.7-4.4z" fill={color}/>
  </svg>
);

const IcFitness = ({ size = 24, color = 'currentColor' }) => (
  <svg viewBox="0 0 24 24" fill="none" width={size} height={size}>
    <path d="M20.57 14.86L22 13.43 20.57 12 17 15.57 8.43 7 12 3.43 10.57 2 9.14 3.43 7.71 2 5.57 4.14 4.14 2.71 2.71 4.14l1.43 1.43L2 7.71l1.43 1.43L2 10.57 3.43 12 7 8.43 15.57 17 12 20.57 13.43 22l1.43-1.43L16.29 22l2.14-2.14 1.43 1.43 1.43-1.43-1.43-1.43L22 16.29l-1.43-1.43z" fill={color}/>
  </svg>
);

const IcRing = ({ size = 24, color = 'currentColor' }) => (
  <svg viewBox="0 0 24 24" fill="none" width={size} height={size}>
    <path d="M12 2L9 5h6l-3-3zm0 4c-3.87 0-7 3.13-7 7s3.13 7 7 7 7-3.13 7-7-3.13-7-7-7zm0 12c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5z" fill={color}/>
  </svg>
);


/* ═══════════════════════════════════════════
   SCREEN 1: BIRTH DETAILS
   ═══════════════════════════════════════════ */

const BirthDetailsScreen = ({ onSubmit }) => {
  const [dob, setDob] = useState('');
  const [tob, setTob] = useState('');
  const [pob, setPob] = useState('');
  const [approximateTime, setApproximateTime] = useState(false);
  const [dobOpen, setDobOpen] = useState(false);
  const [tobOpen, setTobOpen] = useState(false);
  const [pobFocused, setPobFocused] = useState(false);
  const autoSubmitRef = useRef(false);

  const isValid = dob && (tob || approximateTime) && pob;

  // Auto-advance when all 3 fields are filled
  useEffect(() => {
    if (isValid && !autoSubmitRef.current) {
      autoSubmitRef.current = true;
      setTimeout(() => {
        onSubmit({ dob, tob: approximateTime ? 'sunrise' : tob, pob });
      }, 600);
    }
  }, [isValid]);

  const cities = ['Mumbai', 'Delhi', 'Bangalore', 'Chennai', 'Kolkata', 'Hyderabad', 'Pune', 'Jaipur', 'Lucknow', 'Ahmedabad'];
  const [filteredCities, setFilteredCities] = useState([]);

  const handlePobChange = (val) => {
    setPob(val);
    if (val.length > 0) {
      setFilteredCities(cities.filter(c => c.toLowerCase().startsWith(val.toLowerCase())));
    } else {
      setFilteredCities([]);
    }
  };

  return (
    <div style={{
      padding: '32px 20px 24px',
      minHeight: '100%',
      display: 'flex',
      flexDirection: 'column',
      animation: 'fadeIn 400ms ease-out',
    }}>
      {/* Header */}
      <div style={{ marginBottom: 32, animation: 'fadeInUp 500ms ease-out' }}>
        <div className="overline" style={{ color: 'var(--primary-50)', marginBottom: 8 }}>
          JIO ASTRO
        </div>
        <h1 className="headline-s" style={{ color: 'var(--text-high)', marginBottom: 8 }}>
          Let's read your stars
        </h1>
        <p className="body-s" style={{ color: 'var(--text-low)' }}>
          Your birth details help us map your unique cosmic blueprint.
        </p>
      </div>

      {/* Form Fields */}
      <div style={{ flex: 1, display: 'flex', flexDirection: 'column', gap: 16 }}>

        {/* Date of Birth */}
        <div style={{ animation: 'fadeInUp 500ms ease-out 100ms both' }}>
          <label className="label-l" style={{ color: 'var(--text-high)', display: 'block', marginBottom: 6 }}>
            Date of Birth
          </label>
          <div
            onClick={() => setDobOpen(!dobOpen)}
            style={{
              background: 'var(--surface-ghost)',
              borderRadius: 'var(--radius-pill)',
              padding: '14px 16px',
              display: 'flex',
              alignItems: 'center',
              gap: 12,
              cursor: 'pointer',
              border: dobOpen ? '2px solid var(--primary-50)' : '2px solid transparent',
              transition: 'border-color 200ms',
            }}
          >
            <IcCalendar size={20} color="var(--text-low)" />
            <input
              type="date"
              value={dob}
              onChange={(e) => { setDob(e.target.value); setDobOpen(false); }}
              style={{
                flex: 1,
                background: 'transparent',
                border: 'none',
                outline: 'none',
                fontFamily: "'JioType', 'Outfit', sans-serif",
                fontSize: 14,
                fontWeight: 500,
                color: dob ? 'var(--text-high)' : 'var(--text-disabled)',
                cursor: 'pointer',
              }}
            />
          </div>
        </div>

        {/* Time of Birth */}
        <div style={{ animation: 'fadeInUp 500ms ease-out 200ms both' }}>
          <label className="label-l" style={{ color: 'var(--text-high)', display: 'block', marginBottom: 6 }}>
            Time of Birth
          </label>
          <div
            style={{
              background: 'var(--surface-ghost)',
              borderRadius: 'var(--radius-pill)',
              padding: '14px 16px',
              display: 'flex',
              alignItems: 'center',
              gap: 12,
              border: tobOpen ? '2px solid var(--primary-50)' : '2px solid transparent',
              transition: 'border-color 200ms',
              opacity: approximateTime ? 0.38 : 1,
              pointerEvents: approximateTime ? 'none' : 'auto',
            }}
          >
            <IcClock size={20} color="var(--text-low)" />
            <input
              type="time"
              value={tob}
              onChange={(e) => { setTob(e.target.value); }}
              onFocus={() => setTobOpen(true)}
              onBlur={() => setTobOpen(false)}
              disabled={approximateTime}
              style={{
                flex: 1,
                background: 'transparent',
                border: 'none',
                outline: 'none',
                fontFamily: "'JioType', 'Outfit', sans-serif",
                fontSize: 14,
                fontWeight: 500,
                color: tob ? 'var(--text-high)' : 'var(--text-disabled)',
                cursor: 'pointer',
              }}
            />
          </div>

          {/* Approximate toggle */}
          <div
            onClick={() => setApproximateTime(!approximateTime)}
            style={{
              display: 'flex',
              alignItems: 'center',
              gap: 8,
              marginTop: 8,
              cursor: 'pointer',
              padding: '4px 0',
            }}
          >
            <div style={{
              width: 18,
              height: 18,
              borderRadius: 'var(--radius-xs)',
              border: approximateTime ? 'none' : '2px solid var(--grey-60)',
              background: approximateTime ? 'var(--primary-50)' : 'transparent',
              display: 'flex',
              alignItems: 'center',
              justifyContent: 'center',
              transition: 'all 200ms',
              flexShrink: 0,
            }}>
              {approximateTime && (
                <svg viewBox="0 0 24 24" width="12" height="12" fill="none">
                  <path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41L9 16.17z" fill="var(--white)"/>
                </svg>
              )}
            </div>
            <span className="body-xs" style={{ color: 'var(--text-low)' }}>
              I don't know my exact birth time
            </span>
          </div>
          {approximateTime && (
            <p className="body-2xs" style={{
              color: 'var(--text-low)',
              marginTop: 4,
              marginLeft: 26,
              animation: 'fadeIn 200ms ease-out',
            }}>
              No worries — we'll use sunrise time for your birthplace. Your reading will still be meaningful.
            </p>
          )}
        </div>

        {/* Place of Birth */}
        <div style={{ animation: 'fadeInUp 500ms ease-out 300ms both', position: 'relative' }}>

/* ═══════════════════════════════════════════
   COSMIC CALCULATION LOADING
   ═══════════════════════════════════════════ */

const PLANETS = [
  { name: 'Sun', glyph: '\u2609', color: 'var(--planet-sun)', house: 0 },
  { name: 'Moon', glyph: '\u263D', color: 'var(--planet-moon)', house: 1 },
  { name: 'Mars', glyph: '\u2642', color: 'var(--planet-mars)', house: 3 },
  { name: 'Mercury', glyph: '\u263F', color: 'var(--planet-mercury)', house: 5 },
  { name: 'Jupiter', glyph: '\u2643', color: 'var(--planet-jupiter)', house: 7 },
  { name: 'Venus', glyph: '\u2640', color: 'var(--planet-venus)', house: 9 },
  { name: 'Saturn', glyph: '\u2644', color: 'var(--planet-saturn)', house: 10 },
  { name: 'Rahu', glyph: '\u260A', color: 'var(--planet-rahu)', house: 2 },
  { name: 'Ketu', glyph: '\u260B', color: 'var(--planet-ketu)', house: 8 },
];

const CosmicLoadingScreen = ({ birthData, intents: selectedIntents }) => {
  const [phase, setPhase] = useState('drawing'); // drawing, planets, brighten, shrink, done
  const [housesDrawn, setHousesDrawn] = useState(0);
  const [planetsDropped, setPlanetsDropped] = useState(0);
  const [brightening, setBrightening] = useState(false);
  const [shrinking, setShrinking] = useState(false);
  const [done, setDone] = useState(false);

  useEffect(() => {
    // Phase 1: Draw houses (1s total, staggered)
    let houseTimer;
    const drawHouses = () => {
      let count = 0;
      houseTimer = setInterval(() => {
        count++;
        setHousesDrawn(count);
        if (count >= 12) {
          clearInterval(houseTimer);
          // Phase 2: Drop planets
          setTimeout(() => dropPlanets(), 200);
        }
      }, 80);
    };

    // Phase 2: Drop planets one by one
    const dropPlanets = () => {
      setPhase('planets');
      let count = 0;
      const planetTimer = setInterval(() => {
        count++;
        setPlanetsDropped(count);
        if (count >= PLANETS.length) {
          clearInterval(planetTimer);
          // Phase 3: Brighten
          setTimeout(() => {
            setBrightening(true);
            setPhase('brighten');
            setTimeout(() => {
              setBrightening(false);
              // Phase 4: Shrink
              setShrinking(true);
              setPhase('shrink');
              setTimeout(() => {
                setDone(true);
                setPhase('done');
              }, 1500);
            }, 600);
          }, 400);
        }
      }, 180);
    };

    drawHouses();
    return () => clearInterval(houseTimer);
  }, []);

  // Calculate house positions for South Indian kundli chart
  const chartSize = shrinking ? 120 : 240;
  const cx = chartSize / 2;
  const cy = chartSize / 2;

  // South Indian style: 4x4 grid with diagonal center
  const getHouseCenter = (houseIdx, size) => {
    const s = size;
    const u = s / 4;
    const positions = [
      [u * 1.5, u * 0.5], // House 1 - top-center-left
      [u * 0.5, u * 0.5], // House 2 - top-left
      [u * 0.5, u * 1.5], // House 3 - left-top
      [u * 0.5, u * 2.5], // House 4 - left-bottom
      [u * 0.5, u * 3.5], // House 5 - bottom-left
      [u * 1.5, u * 3.5], // House 6 - bottom-center-left
      [u * 2.5, u * 3.5], // House 7 - bottom-center-right
      [u * 3.5, u * 3.5], // House 8 - bottom-right
      [u * 3.5, u * 2.5], // House 9 - right-bottom
      [u * 3.5, u * 1.5], // House 10 - right-top
      [u * 3.5, u * 0.5], // House 11 - top-right
      [u * 2.5, u * 0.5], // House 12 - top-center-right
    ];
    return positions[houseIdx] || [0, 0];
  };

  // Generate house grid lines for South Indian chart
  const getHouseLines = (size) => {
    const u = size / 4;
    const lines = [];
    // Outer rectangle
    lines.push({ x1: 0, y1: 0, x2: size, y2: 0 });
    lines.push({ x1: size, y1: 0, x2: size, y2: size });
    lines.push({ x1: size, y1: size, x2: 0, y2: size });
    lines.push({ x1: 0, y1: size, x2: 0, y2: 0 });
    // Inner grid
    lines.push({ x1: u, y1: 0, x2: u, y2: size });
    lines.push({ x1: u * 3, y1: 0, x2: u * 3, y2: size });
    lines.push({ x1: 0, y1: u, x2: size, y2: u });
    lines.push({ x1: 0, y1: u * 3, x2: size, y2: u * 3 });
    // Diagonals for center
    lines.push({ x1: u, y1: u, x2: u * 3, y2: u * 3 });
    lines.push({ x1: u * 3, y1: u, x2: u, y2: u * 3 });
    // Corner diagonals
    lines.push({ x1: 0, y1: 0, x2: u, y2: u });
    lines.push({ x1: size, y1: 0, x2: u * 3, y2: u });
    lines.push({ x1: 0, y1: size, x2: u, y2: u * 3 });
    lines.push({ x1: size, y1: size, x2: u * 3, y2: u * 3 });
    return lines;
  };

  const houseLines = getHouseLines(chartSize);

  return (
    <div style={{
      minHeight: '100%',
      display: 'flex',
      flexDirection: 'column',
      alignItems: 'center',
      justifyContent: shrinking ? 'flex-start' : 'center',
      padding: shrinking ? '40px 20px' : '20px',
      background: 'var(--surface-minimal)',
      transition: 'all 800ms ease-out',
    }}>
      {/* Kundli Chart SVG */}
      <div style={{
        transition: 'all 1200ms ease-out',
        transform: shrinking ? 'scale(0.5)' : 'scale(1)',
        opacity: done ? 0 : 1,
      }}>
        <svg
          width={chartSize}
          height={chartSize}
          viewBox={`0 0 ${chartSize} ${chartSize}`}
          style={{
            overflow: 'visible',
            transition: 'all 1200ms ease-out',
          }}
        >
          {/* House lines */}
          {houseLines.map((line, i) => (
            <line
              key={`line-${i}`}
              x1={line.x1} y1={line.y1}
              x2={line.x2} y2={line.y2}
              stroke={brightening ? 'var(--secondary-40)' : 'var(--secondary-50)'}
              strokeWidth={1.5}
              opacity={i < housesDrawn ? 1 : 0}
              style={{
                transition: 'opacity 100ms ease-out, stroke 300ms ease-out',
              }}
            />
          ))}

          {/* Planet orbs */}
          {PLANETS.map((planet, i) => {
            if (i >= planetsDropped) return null;
            const [px, py] = getHouseCenter(planet.house, chartSize);
            return (
              <g key={planet.name}>
                {/* Radial pulse ring */}
                <circle
                  cx={px} cy={py}
                  r={8}
                  fill="none"
                  stroke={planet.color}
                  strokeWidth={1}
                  style={{
                    animation: i === planetsDropped - 1 ? 'fadeIn 400ms ease-out' : 'none',
                    opacity: i === planetsDropped - 1 ? 0.5 : 0,
                  }}
                />
                {/* Orb */}
                <circle
                  cx={px} cy={py}
                  r={shrinking ? 4 : 8}
                  fill={planet.color}
                  style={{
                    animation: 'planetDrop 300ms ease-out both',
                    transition: 'r 800ms ease-out',
                  }}
                />
                {/* Glyph */}
                {!shrinking && (
                  <text
                    x={px} y={py}
                    textAnchor="middle"
                    dominantBaseline="central"
                    fill="var(--white)"
                    fontSize={9}
                    fontWeight="700"
                    fontFamily="'JioType', 'Outfit', sans-serif"
                    style={{ opacity: 0.85, animation: 'fadeIn 200ms ease-out 100ms both' }}
                  >
                    {planet.glyph}
                  </text>
                )}
              </g>
            );
          })}
        </svg>
      </div>

      {/* Loading text */}
      <div style={{
        marginTop: 32,
        textAlign: 'center',
        opacity: done ? 0 : 1,
        transition: 'opacity 400ms',
      }}>
        <p className="body-s" style={{
          color: 'var(--text-low)',
          animation: 'pulse 2s ease-in-out infinite',
        }}>
          {phase === 'drawing' && 'Drawing your birth chart...'}
          {phase === 'planets' && 'Placing the planets...'}
          {phase === 'brighten' && 'Aligning cosmic energies...'}
          {phase === 'shrink' && 'Your chart is ready'}
          {phase === 'done' && 'Your chart is ready'}
        </p>

        {/* Subtle progress dots */}
        <div style={{
          display: 'flex',
          gap: 6,
          justifyContent: 'center',
          marginTop: 12,
        }}>
          {[0, 1, 2].map(i => (
            <div key={i} style={{
              width: 6,
              height: 6,
              borderRadius: 'var(--radius-pill)',
              background: 'var(--primary-30)',
              animation: `pulse 1.5s ease-in-out ${i * 200}ms infinite`,
            }} />
          ))}
        </div>
      </div>

      {/* Done state message */}
      {done && (
        <div style={{
          textAlign: 'center',
          animation: 'fadeInUp 600ms ease-out',
          marginTop: 40,
        }}>
          <div style={{
            width: 64,
            height: 64,
            borderRadius: 'var(--radius-pill)',
            background: 'var(--primary-20)',
            display: 'flex',
            alignItems: 'center',
            justifyContent: 'center',
            margin: '0 auto 20px',
          }}>
            <svg viewBox="0 0 24 24" width="32" height="32" fill="none">
              <path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41L9 16.17z" fill="var(--primary-50)"/>
            </svg>
          </div>
          <h2 className="headline-s" style={{ color: 'var(--text-high)', marginBottom: 8 }}>
            Your cosmic map is ready
          </h2>
          <p className="body-s" style={{ color: 'var(--text-low)', marginBottom: 32 }}>
            The stars have aligned. Let's begin your journey.
          </p>
          <div style={{
            display: 'flex',
            gap: 12,
            justifyContent: 'center',
            animation: 'fadeInUp 400ms ease-out 300ms both',
          }}>
            <div style={{
              display: 'flex',
              alignItems: 'center',
              gap: 6,
              animation: 'pulse 2.5s ease-in-out infinite',
            }}>
              <IcChevronDown size={16} color="var(--primary-50)" />
              <span className="label-m" style={{ color: 'var(--primary-50)' }}>
                Phase 1 begins...
              </span>
            </div>
          </div>
        </div>
      )}
    </div>
  );
};


/* ═══════════════════════════════════════════

const App = () => {
  const [screen, setScreen] = useState('birth'); // 'birth' | 'intent' | 'loading'
  const [birthData, setBirthData] = useState(null);
  const [selectedIntents, setSelectedIntents] = useState([]);

  const handleBirthSubmit = (data) => {
    setBirthData(data);
    setScreen('intent');
  };

  const IS_UNIFIED = new URLSearchParams(window.location.search).has('unified');

  const handleIntentSubmit = (intents) => {
    setSelectedIntents(intents);
    if (IS_UNIFIED) {
      // Skip cosmic loading — Phase 1 has its own chart assembly
      window.parent.postMessage({ type: 'phase0-complete' }, '*');
      return;
    }
    setScreen('loading');
  };

  return (
    <div className="phone-frame">
      {/* Notch */}
      <div className="notch">
        <div className="notch-inner" />
      </div>

      {/* Status Bar */}
      <div className="status-bar">
        <span>9:41</span>
        <span style={{ letterSpacing: '2px' }}>... </span>
      </div>

      {/* Screen Content */}
      <div className="screen">
        {/* Step Indicator */}
        {screen !== 'loading' && (
          <div style={{
            display: 'flex',
            gap: 4,
            padding: '8px 20px',
            background: 'var(--surface-minimal)',
          }}>
            <div style={{
              flex: 1,
              height: 3,
              borderRadius: 'var(--radius-pill)',
              background: 'var(--primary-50)',
              transition: 'all 300ms',
            }} />
            <div style={{
              flex: 1,
              height: 3,
              borderRadius: 'var(--radius-pill)',
              background: screen === 'intent' ? 'var(--primary-50)' : 'var(--grey-40)',
              transition: 'all 300ms',
            }} />
          </div>
        )}

        {screen === 'birth' && (
          <BirthDetailsScreen onSubmit={handleBirthSubmit} />
        )}

        {screen === 'intent' && (
          <IntentSelectionScreen onSubmit={handleIntentSubmit} />
        )}

        {screen === 'loading' && (
          <CosmicLoadingScreen birthData={birthData} intents={selectedIntents} />
        )}
      </div>
    </div>
  );
};

/* ── Mount React ── */
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);

<script>
if (new URLSearchParams(window.location.search).has('unified')) {
  // Strip phone chrome in unified mode
  var s = document.createElement('style');
  s.textContent = 'body{padding:0!important;margin:0!important;background:#0a0a14!important;display:block!important;}.phone-frame{width:100%!important;height:100vh!important;max-width:100%!important;border:none!important;border-radius:0!important;box-shadow:none!important;}.notch,.notch-inner{display:none!important;}.screen{height:calc(100vh - 38px)!important;overflow-y:auto!important;overflow-x:hidden!important;}';
  document.head.appendChild(s);
  // Watch for phase 'done' and notify parent
  var _checkDone = setInterval(function() {
    var el = document.querySelector('[style*="Phase 1 begins"]') ||
             Array.from(document.querySelectorAll('span')).find(function(s) { return s.textContent.includes('Phase 1 begins'); });
    if (el) {
      clearInterval(_checkDone);
      // Auto-transition after 2 seconds
      setTimeout(function() {
        window.parent.postMessage({ type: 'phase0-complete' }, '*');
      }, 2000);
    }
  }, 500);
}
</script>
