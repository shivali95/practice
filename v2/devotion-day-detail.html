<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Parv Saathi · Day Detail</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
<style>
@font-face { font-family:'JioType'; font-weight:400; src:url('https://raw.githubusercontent.com/sunit1986/JioBharatIQ_Server/main/assets/fonts/woff2/JioTypeVarW05-Regular.woff2') format('woff2'); }
@font-face { font-family:'JioType'; font-weight:500; src:url('https://raw.githubusercontent.com/sunit1986/JioBharatIQ_Server/main/assets/fonts/woff2/JioTypeW05-Medium.woff2') format('woff2'); }
@font-face { font-family:'JioType'; font-weight:700; src:url('https://raw.githubusercontent.com/sunit1986/JioBharatIQ_Server/main/assets/fonts/woff2/JioTypeW05-Bold.woff2') format('woff2'); }
@font-face { font-family:'JioType'; font-weight:900; src:url('https://raw.githubusercontent.com/sunit1986/JioBharatIQ_Server/main/assets/fonts/woff2/JioTypeW05-Black.woff2') format('woff2'); }

*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
html, body { font-family:'JioType', -apple-system, system-ui, sans-serif; -webkit-font-smoothing:antialiased; }
body { background:#050000; display:flex; align-items:flex-start; justify-content:center; padding:24px 0; min-height:100vh; }

.phone { width:360px; border-radius:40px; border:8px solid #1a1a1a; box-shadow:0 24px 64px rgba(0,0,0,0.6); overflow:hidden; position:relative; background:#0a0400; }
.notch { background:#1a1a1a; height:32px; display:flex; align-items:center; justify-content:center; }
.notch > div { width:80px; height:20px; background:#1a1a1a; border-radius:0 0 14px 14px; }

.screen { position:relative; background:linear-gradient(180deg, #1a0a00 0%, #0a0400 100%); color:#fff; height:760px; display:flex; flex-direction:column; overflow:hidden; }

/* TOP BAR */
.topbar {
  padding:14px 16px 10px; display:flex; align-items:center; gap:10px;
  border-bottom:1px solid rgba(255,200,140,0.14);
  background:linear-gradient(180deg, rgba(80,30,0,0.65), transparent);
  position:relative; z-index:5;
}
.back {
  width:34px; height:34px; border-radius:50%;
  background:rgba(255,200,140,0.12); color:#ffce99;
  display:flex; align-items:center; justify-content:center; cursor:pointer;
  border:1px solid rgba(255,200,140,0.2);
}
.back:active { transform:scale(0.92); }
.topbar-title { flex:1; min-width:0; }
.topbar-title .t { font-size:15px; font-weight:800; color:#fff; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.topbar-title .s { font-size:11px; color:#ffb874; margin-top:1px; }
.topbar-av {
  width:34px; height:34px; border-radius:50%;
  background:radial-gradient(circle at 30% 30%, #ffdeb0, #d94a1a);
  display:flex; align-items:center; justify-content:center; font-size:16px;
}

/* CHAT AREA */
.chat { flex:1; overflow-y:auto; padding:16px 14px 12px; scroll-behavior:smooth; }
.chat::-webkit-scrollbar { display:none; }

.msg { max-width:92%; margin-bottom:10px; animation:msgIn 450ms ease-out; }
@keyframes msgIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:none; } }

.msg.ai { display:flex; gap:8px; align-items:flex-start; }
.msg.ai .av {
  width:26px; height:26px; border-radius:50%; flex-shrink:0; margin-top:2px;
  background:radial-gradient(circle at 30% 30%, #ffdeb0, #d94a1a);
  color:#3d1a00; font-size:11px; font-weight:900;
  display:flex; align-items:center; justify-content:center;
}
.msg.ai .bubble {
  background:rgba(255,200,140,0.08); border:1px solid rgba(255,200,140,0.18);
  border-radius:4px 16px 16px 16px; padding:11px 13px;
  font-size:13.5px; color:#ffe8cc; line-height:1.55; min-width:0;
}
.msg.ai .bubble b { color:#ffce99; font-weight:800; }
.msg.ai .bubble h4 {
  font-size:12px; font-weight:900; color:#ffb874;
  letter-spacing:1px; text-transform:uppercase; margin-bottom:6px;
}
.msg.ai .bubble ul { margin:4px 0 0 18px; }
.msg.ai .bubble li { margin:3px 0; font-size:13px; }

.msg.user { margin-left:auto; max-width:80%; }
.msg.user .bubble {
  background:linear-gradient(135deg, #ff8a2e, #d94a1a);
  border-radius:16px 16px 4px 16px; padding:9px 13px;
  font-size:13.5px; color:#fff; font-weight:500;
}

/* HERO CARD (event) */
.hero {
  max-width:96%; margin:4px 0 14px 34px;
  background:linear-gradient(160deg, #4a1d00 0%, #2a0d00 60%, #180600 100%);
  border:1px solid rgba(255,200,140,0.3); border-radius:18px;
  overflow:hidden; animation:msgIn 500ms ease-out;
  position:relative;
}
.hero-art {
  height:150px; position:relative; overflow:hidden;
  background: radial-gradient(ellipse at 70% 40%, rgba(255,180,90,0.5), transparent 60%),
              linear-gradient(180deg, #6b2c0e 0%, #2a0d00 100%);
  display:flex; align-items:center; justify-content:center;
}
.hero-emoji {
  font-size:72px; filter: drop-shadow(0 0 22px rgba(255,200,140,0.7));
  animation:float 4s ease-in-out infinite;
}
@keyframes float { 0%,100% { transform:translateY(0); } 50% { transform:translateY(-6px); } }
.hero-type-pill {
  position:absolute; top:12px; left:12px;
  padding:4px 10px; border-radius:6px;
  background:rgba(0,0,0,0.55); color:#ffd669;
  font-size:10px; font-weight:900; letter-spacing:1.2px;
  backdrop-filter:blur(6px);
}
.hero-date-pill {
  position:absolute; top:12px; right:12px;
  padding:4px 10px; border-radius:999px;
  background:rgba(255,214,105,0.18); color:#ffe39b;
  font-size:10px; font-weight:800; letter-spacing:0.5px;
  border:1px solid rgba(255,214,105,0.35);
}
.hero-foot {
  padding:12px 14px 14px;
}
.hero-title { font-size:18px; font-weight:900; color:#fff; letter-spacing:0.2px; }
.hero-sub { font-size:11px; color:#ffce99; margin-top:3px; }
.hero-tithi {
  margin-top:8px; padding-top:8px;
  border-top:1px dashed rgba(255,200,140,0.2);
  font-size:11px; color:#c4a78a; line-height:1.5;
}
.hero-tithi b { color:#ffe39b; font-weight:700; }

/* SUGGESTION CHIPS */
.chips { display:flex; flex-wrap:wrap; gap:6px; margin:6px 0 10px 34px; }
.chip {
  background:rgba(255,200,140,0.10); border:1px solid rgba(255,200,140,0.28);
  color:#ffce99; font-family:inherit; font-size:12px; font-weight:700;
  padding:7px 12px; border-radius:999px; cursor:pointer;
  display:inline-flex; align-items:center; gap:5px;
  animation:msgIn 400ms ease-out;
}
.chip:active { transform:scale(0.96); }
.chip:hover { background:rgba(255,200,140,0.18); }
.chip .icn { font-size:13px; }

/* AUDIO CARD (katha narration) */
.audio-card {
  max-width:94%; margin:4px 0 10px 34px;
  background:rgba(255,200,140,0.08); border:1px solid rgba(255,200,140,0.22);
  border-radius:14px; padding:10px 12px;
  display:flex; align-items:center; gap:10px;
  animation:msgIn 450ms ease-out;
}
.audio-play {
  width:36px; height:36px; border-radius:50%;
  background:linear-gradient(180deg, #ff8a2e, #d94a1a); color:#fff;
  display:flex; align-items:center; justify-content:center;
  flex-shrink:0; cursor:pointer; font-size:14px;
}
.audio-play:active { transform:scale(0.94); }
.audio-meta { flex:1; min-width:0; }
.audio-title { font-size:12px; font-weight:800; color:#fff; }
.audio-sub { font-size:10px; color:#a89078; margin-top:1px; }
.audio-wave {
  display:flex; align-items:center; gap:2px; height:18px; margin-top:4px;
}
.audio-wave span {
  width:2px; background:#ffb874; border-radius:1px;
  animation:wave 1s ease-in-out infinite;
}
.audio-wave span:nth-child(1) { height:40%; animation-delay:0s; }
.audio-wave span:nth-child(2) { height:70%; animation-delay:0.1s; }
.audio-wave span:nth-child(3) { height:90%; animation-delay:0.2s; }
.audio-wave span:nth-child(4) { height:60%; animation-delay:0.3s; }
.audio-wave span:nth-child(5) { height:80%; animation-delay:0.4s; }
.audio-wave span:nth-child(6) { height:45%; animation-delay:0.5s; }
.audio-wave span:nth-child(7) { height:70%; animation-delay:0.6s; }
.audio-wave span:nth-child(8) { height:50%; animation-delay:0.7s; }
@keyframes wave { 0%,100% { opacity:0.45; transform:scaleY(0.6); } 50% { opacity:1; transform:scaleY(1); } }
.audio-card.paused .audio-wave span { animation-play-state:paused; opacity:0.3; }
.audio-card.paused .audio-play { background:linear-gradient(180deg, #a8602e, #6b2810); }
.audio-progress {
  height:3px; background:rgba(255,255,255,0.1); border-radius:2px; margin-top:6px; overflow:hidden;
}
.audio-progress-fill {
  height:100%; width:0%; background:linear-gradient(90deg, #ffb874, #ff6b35);
  border-radius:2px; transition:width 0.2s linear;
}
.audio-time { font-size:9px; color:#a89078; margin-top:3px; font-weight:600; font-variant-numeric:tabular-nums; }

/* TYPING INDICATOR */
.typing {
  display:flex; gap:8px; align-items:center;
  margin-bottom:12px; animation:msgIn 300ms ease-out;
}
.typing .av {
  width:26px; height:26px; border-radius:50%;
  background:radial-gradient(circle at 30% 30%, #ffdeb0, #d94a1a);
  color:#3d1a00; font-size:11px; font-weight:900;
  display:flex; align-items:center; justify-content:center;
}
.typing .dots {
  background:rgba(255,200,140,0.08); border:1px solid rgba(255,200,140,0.18);
  padding:11px 14px; border-radius:4px 16px 16px 16px;
  display:flex; gap:4px;
}
.typing .dots span {
  width:6px; height:6px; border-radius:50%; background:#ffb874;
  animation:bounce 1.2s ease-in-out infinite;
}
.typing .dots span:nth-child(2) { animation-delay:0.2s; }
.typing .dots span:nth-child(3) { animation-delay:0.4s; }
@keyframes bounce { 0%,80%,100% { transform:translateY(0); opacity:0.5; } 40% { transform:translateY(-5px); opacity:1; } }

/* INPUT BAR */
.input-bar {
  padding:10px 14px 14px; background:rgba(10,4,0,0.9);
  border-top:1px solid rgba(255,200,140,0.14);
  display:flex; gap:8px; align-items:center;
}
.input-field {
  flex:1; height:42px; border-radius:999px;
  background:rgba(255,200,140,0.08); border:1px solid rgba(255,200,140,0.22);
  padding:0 16px; font-size:13px; color:#fff; font-family:inherit; outline:none;
}
.input-field::placeholder { color:#a89078; }
.input-send {
  width:42px; height:42px; border-radius:50%; border:none;
  background:linear-gradient(180deg, #ff8a2e, #d94a1a); color:#fff;
  font-size:15px; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
}
.input-send:active { transform:scale(0.92); }

.cta-row-inline {
  display:flex; gap:8px; margin:4px 0 10px 34px;
}
.cta-inline {
  flex:1 1 0; height:40px; border-radius:999px;
  font-family:inherit; font-size:12px; font-weight:800; cursor:pointer;
  display:flex; align-items:center; justify-content:center; gap:6px;
  border:none; white-space:nowrap; padding:0 12px;
}
.cta-inline.primary {
  background:linear-gradient(180deg, #ff8a2e, #d94a1a); color:#fff;
  box-shadow:0 4px 12px rgba(217,74,26,0.35);
}
.cta-inline.ghost {
  background:rgba(255,255,255,0.08); color:#fff;
  border:1px solid rgba(255,200,140,0.25);
}
.cta-inline:active { transform:scale(0.96); }
</style>
</head>

function getEvent() {
  const qs = new URLSearchParams(location.search);
  const name = qs.get('event') || 'Buddha Purnima';
  // Exact match
  if (EVENTS[name]) return { key: name, data: EVENTS[name] };
  // Fuzzy match on first word
  const firstWord = (name.split(/\s+/)[0] || '').toLowerCase();
  const key = Object.keys(EVENTS).find(k => k.toLowerCase().startsWith(firstWord));
  if (key) return { key, data: EVENTS[key] };
  // Fallback: generic
  return { key:name, data:{
    emoji:'🪔', type:(qs.get('type') || 'parv').toUpperCase(), deity:'Parv Saathi', color:'#ffd669',
    tagline: name + ' · mahatva aur vidhi',
    date: (qs.get('day') ? qs.get('day') + ' Vaishakh' : 'Vaishakh'),
    tithi:'—', nakshatra:'—', vaar:'—',
    muhurat:'Sthan ke anusaar muhurat',
    mahatva:'Ye ek shubh din hai. Vidhi aur mahatva ke liye vistaar jald jodenge.',
    vidhi:'<h4>Samanya Vidhi</h4><ul><li>Snaan</li><li>Pooja aur deep</li><li>Daan</li></ul>',
    dos:'', donts:'',
    kathaTitle: name + ' ki katha',
    kathaDur:'5 min',
    chips:['mantra','samagri','reminder']
  }};
}

// -------- VRAT KATHA AUDIO PLAYBACK --------
const VRAT_KATHA_MP3 = 'assets/audio/vrat-katha.mp3';
let kathaAudio = null;

function fmtTime(s) {
  if (!isFinite(s)) return '—';
  const m = Math.floor(s / 60);
  const ss = Math.floor(s % 60).toString().padStart(2,'0');
  return m + ':' + ss;
}

function playKatha() {
  const card = document.getElementById('kathaAudioCard');
  const btn  = document.getElementById('kathaPlayBtn');
  const progress = document.getElementById('kathaProgress');
  const timeEl   = document.getElementById('kathaTime');

  // First tap — create audio and start
  if (!kathaAudio) {
    kathaAudio = new Audio(VRAT_KATHA_MP3);
    kathaAudio.volume = 0.95;
    kathaAudio.addEventListener('timeupdate', () => {
      if (!kathaAudio) return;
      const dur = kathaAudio.duration || 0;
      const cur = kathaAudio.currentTime || 0;
      if (progress) progress.style.width = (dur ? (cur/dur*100) : 0) + '%';
      if (timeEl)   timeEl.textContent   = fmtTime(cur) + ' / ' + fmtTime(dur);
    });
    kathaAudio.addEventListener('ended', () => {
      if (card) card.classList.add('paused');
      if (btn)  btn.textContent = '▶';
      if (progress) progress.style.width = '0%';
    });
    kathaAudio.play().then(() => {
      if (card) card.classList.remove('paused');
      if (btn)  btn.textContent = '❚❚';
    }).catch(e => {
      console.warn('katha play failed', e);
      alert('Audio play nahi ho sakta. Browser ne block kiya ho sakta hai.');
    });
    return;
  }

  // Subsequent taps — toggle
  if (kathaAudio.paused) {
    kathaAudio.play().then(() => {
      if (card) card.classList.remove('paused');
      if (btn)  btn.textContent = '❚❚';
    }).catch(()=>{});
  } else {
    kathaAudio.pause();
    if (card) card.classList.add('paused');
    if (btn)  btn.textContent = '▶';
  }
}

  if (kathaAudio) { try { kathaAudio.pause(); kathaAudio.src=''; } catch(e){} }

let currentEvent = null;

async function boot() {
  currentEvent = getEvent();
  // Top bar
  document.getElementById('tbTitle').textContent = currentEvent.key;
  document.getElementById('tbSub').textContent = currentEvent.data.date;

  // Initial AI greeting
  await addAI('<b>' + pickGreet() + '!</b> ' + currentEvent.key + ' ke baare me sab kuch bata rahi hoon — mahatva, vidhi, katha aur kya karein-kya na karein. 🪔');

  // Hero card
  addHero(currentEvent);
  await new Promise(r=>setTimeout(r,500));

  // Mahatva
  await addAI('<h4>Mahatva</h4>' + currentEvent.data.mahatva);

  // Vidhi
  await addAI(currentEvent.data.vidhi);

  // Dos / Donts (if present)
  if (currentEvent.data.dos) await addAI(currentEvent.data.dos);
  if (currentEvent.data.donts) await addAI(currentEvent.data.donts);

  // Katha audio card
  await addAI('<b>' + currentEvent.data.kathaTitle + '</b> sunna chahenge? 👇');
  addAudio(currentEvent);

  // CTAs
  addCTAs(currentEvent);

  // Suggestion chips
  await new Promise(r=>setTimeout(r,300));
  await addAI('Kuch aur jaanna chahenge?');
  addChips(currentEvent.data.chips);
}

function pickGreet() {
  const hr = new Date().getHours();
  if (hr < 12) return 'Suprabhat';
  if (hr < 17) return 'Namaskar';
  return 'Shubh sandhya';
}

function chipTap(id) {
  const c = CHIP_LIBRARY[id];
  if (!c) return;
  addUser(c.label);
  setTimeout(() => addAI(genericReply(c, currentEvent)), 400);
}

  return templates[chip === 'vidhi-more' ? 'mantra' : (chip === 'satyanarayan' ? 'aarti' : 'mantra')] || ('<p>' + chip.label + ' ke baare me vistaar jald jodenge.</p>');
}

function sendUser() {
  const inp = document.getElementById('chatInput');
  const text = inp.value.trim();
  if (!text) return;
  addUser(text);
  inp.value = '';
  setTimeout(() => addAI('<p>Bahut sundar prashn. Iska uttar vistaar se jald jodenge — abhi aap chips pe tap karke bhi vistrit jaankari paa sakti hain. 🪔</p>'), 500);
}

function shareEvent() { if (navigator.share) navigator.share({ title: currentEvent.key, text: currentEvent.data.tagline, url: location.href }).catch(()=>{}); else alert('Link copy ho gaya'); }
function goSeva() {
  const d = new URLSearchParams(location.search).get('deity') || '';
  window.location.href = 'devotion-seva.html' + (d ? '?deity=' + encodeURIComponent(d) : '');
}

function goBack() {
  // Always go back to home, preserving the deity query param so the user lands
  // on the same personalized home they left instead of deity selection.
  const d = new URLSearchParams(location.search).get('deity') || '';
  location.href = 'devotion-home-focused.html' + (d ? '?deity=' + encodeURIComponent(d) : '');
}

boot();
</script>
</body>
</html>
