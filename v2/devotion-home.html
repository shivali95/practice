<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Bhakti Saathi — Home</title>
<style>
@font-face { font-family:'JioType'; font-weight:400; src:url('https://raw.githubusercontent.com/sunit1986/JioBharatIQ_Server/main/assets/fonts/woff2/JioTypeVarW05-Regular.woff2') format('woff2'); }
@font-face { font-family:'JioType'; font-weight:500; src:url('https://raw.githubusercontent.com/sunit1986/JioBharatIQ_Server/main/assets/fonts/woff2/JioTypeW05-Medium.woff2') format('woff2'); }
@font-face { font-family:'JioType'; font-weight:700; src:url('https://raw.githubusercontent.com/sunit1986/JioBharatIQ_Server/main/assets/fonts/woff2/JioTypeW05-Bold.woff2') format('woff2'); }
@font-face { font-family:'JioType'; font-weight:900; src:url('https://raw.githubusercontent.com/sunit1986/JioBharatIQ_Server/main/assets/fonts/woff2/JioTypeW05-Black.woff2') format('woff2'); }

:root {
  --surface:#ffffff; --surface-ghost:#eeeeef; --surface-ghost-icon:#e7e9ff;
  --surface-bold:#3900ad; --surface-minimal:#f5f5f6;
  --text-high:#0c0d10; --text-medium:#191b1e; --text-low:rgba(25,27,30,0.65);
  --text-on-bold:#ffffff;
  --primary-20:#e8e8fc; --primary-50:#3535f3; --primary-60:#000093; --primary-70:#00004c;
  --secondary-20:#fef7e9; --secondary-30:#ffe3ae; --secondary-50:#f7ab20; --secondary-60:#ac660c;
  --sparkle-50:#1eccb0; --sparkle-60:#1e7b74;
  --success:#25ab21; --error:#fa2f40;
  --stroke-subtle:rgba(36,38,43,0.12); --stroke-minimal:rgba(36,38,43,0.13);
  --grey-40:#e0e0e0; --grey-20:#f5f5f5;
  --shape-pill:999px; --shape-4xl:23px; --shape-large:16px; --shape-medium:12px; --shape-small:8px; --shape-xsmall:4px;
  --spring:350ms linear(0,0.3667,0.8271,1.0379,1.0652,1.0332,1.006,0.9961,0.996,0.9984,0.9999,1);
  --ease-standard:cubic-bezier(0.4,0.0,0.2,1); --ease-decelerate:cubic-bezier(0.0,0.0,0.2,1);
  /* Faith dynamic tokens — set by JS */
  --faith-color:#ff6b35; --faith-bg:#fff3ed; --faith-gradient:linear-gradient(135deg,#ff6b35,#ff9a5c);
}

*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{overscroll-behavior:none;touch-action:manipulation;}
body{font-family:'JioType',-apple-system,sans-serif;background:#faf9f6;min-height:100vh;display:flex;justify-content:center;padding:0;}

.phone-frame{width:390px;max-width:100vw;height:100vh;background:var(--surface);position:relative;overflow:hidden;display:flex;flex-direction:column;}
@media(max-width:480px){.phone-frame{width:100%!important;height:100vh!important;height:100dvh!important;border-radius:0!important;}}

/* ── Scroll Feed ── */
.scroll-feed{flex:1;overflow-y:auto;overflow-x:hidden;scrollbar-width:none;}
.scroll-feed::-webkit-scrollbar{display:none;}

/* ── Hero ── */
.hero{padding:48px 20px 22px;position:relative;overflow:hidden;}
.hero-deco{position:absolute;top:12px;right:16px;font-size:48px;opacity:0.12;}
.hero-greeting{font-size:13px;color:rgba(255,255,255,0.75);font-weight:500;}
.hero-title{font-size:24px;font-weight:900;color:#fff;margin-top:4px;line-height:1.2;letter-spacing:-0.02em;}
.hero-tithi{font-size:12px;color:rgba(255,255,255,0.6);margin-top:8px;font-weight:500;}

/* ── Section Header ── */
.section{padding:0 16px;margin-top:20px;opacity:0;transform:translateY(16px);transition:opacity 500ms ease-out, transform 500ms ease-out;}
.section.visible{opacity:1;transform:translateY(0);}
.section-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
.section-title{font-size:16px;font-weight:800;color:var(--text-high);letter-spacing:-0.01em;}
.section-link{font-size:12px;font-weight:700;color:var(--faith-color);cursor:pointer;}

/* ── Horizontal Scroll Row ── */
.h-scroll{display:flex;gap:12px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;padding:0 0 4px;}
.h-scroll::-webkit-scrollbar{display:none;}

/* ── Darshan Cards ── */
.darshan-card{flex-shrink:0;width:200px;border-radius:var(--shape-large);overflow:hidden;cursor:pointer;border:1px solid var(--stroke-subtle);transition:transform 150ms;}
.darshan-card:active{transform:scale(0.97);}
.darshan-img{height:120px;display:flex;align-items:center;justify-content:center;position:relative;}
.darshan-img svg{width:40px;height:40px;fill:rgba(255,255,255,0.5);z-index:1;position:relative;}
.darshan-live-badge{position:absolute;top:8px;left:8px;background:var(--error);border-radius:var(--shape-xsmall);padding:3px 7px;display:flex;align-items:center;gap:4px;}
.darshan-live-dot{width:5px;height:5px;border-radius:50%;background:#fff;animation:livePulse 1.2s infinite;}
.darshan-live-text{font-size:9px;font-weight:800;color:#fff;letter-spacing:0.04em;}
.darshan-viewers{position:absolute;bottom:8px;right:8px;font-size:10px;font-weight:600;color:rgba(255,255,255,0.85);background:rgba(0,0,0,0.4);padding:2px 7px;border-radius:3px;}
.darshan-body{padding:10px 12px;}
.darshan-name{font-size:14px;font-weight:700;color:var(--text-high);}
.darshan-timing{font-size:11px;color:var(--text-low);margin-top:2px;}

/* ── Panchang Strip ── */
.panchang-strip{background:var(--surface-ghost);border-radius:var(--shape-medium);padding:12px 14px;display:flex;gap:20px;overflow-x:auto;scrollbar-width:none;}
.panchang-strip::-webkit-scrollbar{display:none;}
.panchang-item{flex-shrink:0;}
.panchang-key{font-size:9px;font-weight:700;color:var(--text-low);text-transform:uppercase;letter-spacing:0.05em;}
.panchang-val{font-size:12px;font-weight:700;color:var(--text-high);margin-top:2px;}
.panchang-val.highlight{color:var(--success);}

/* ── Namaaz Card (Muslim) ── */
.namaaz-card{border:1px solid var(--stroke-subtle);border-radius:var(--shape-large);overflow:hidden;}
.namaaz-header{padding:10px 14px;background:#2d8a4e;display:flex;align-items:center;gap:8px;}
.namaaz-header-title{font-size:13px;font-weight:700;color:#fff;}
.namaaz-row{display:flex;justify-content:space-between;align-items:center;padding:9px 14px;border-bottom:1px solid var(--grey-40);}
.namaaz-row:last-child{border-bottom:none;}
.namaaz-row.current{background:#e8f5ec;}
.namaaz-name{font-size:13px;font-weight:600;color:var(--text-high);}
.namaaz-time{font-size:13px;font-weight:700;color:var(--primary-60);}

/* ── Forward Cards ── */
.fwd-stack{display:flex;flex-direction:column;gap:10px;}
.fwd-card{border-radius:var(--shape-large);overflow:hidden;cursor:pointer;position:relative;height:100px;display:flex;align-items:flex-end;transition:transform 150ms;}
.fwd-card:active{transform:scale(0.97);}
.fwd-card-text{padding:12px 14px;z-index:2;position:relative;flex:1;}
.fwd-card-title{font-size:15px;font-weight:800;color:#fff;text-shadow:0 1px 4px rgba(0,0,0,0.5);}
.fwd-card-sub{font-size:11px;color:rgba(255,255,255,0.75);margin-top:2px;font-weight:500;}
.fwd-share-btn{position:absolute;top:10px;right:10px;width:28px;height:28px;border-radius:50%;background:rgba(255,255,255,0.2);display:flex;align-items:center;justify-content:center;z-index:3;cursor:pointer;border:none;backdrop-filter:blur(4px);}
.fwd-share-btn svg{width:14px;height:14px;fill:#fff;}

/* ── Festival Cards ── */
.festival-card{flex-shrink:0;width:150px;border-radius:var(--shape-large);overflow:hidden;cursor:pointer;border:1px solid var(--stroke-subtle);transition:transform 150ms;}
.festival-card:active{transform:scale(0.97);}
.festival-card-img{height:90px;display:flex;align-items:center;justify-content:center;position:relative;}
.festival-card-img span{font-size:36px;z-index:1;position:relative;}
.festival-countdown{position:absolute;top:6px;right:6px;background:rgba(0,0,0,0.45);border-radius:var(--shape-xsmall);padding:2px 7px;font-size:9px;font-weight:700;color:#fff;}
.festival-body{padding:8px 10px 10px;background:var(--surface);}
.festival-name{font-size:12px;font-weight:700;color:var(--text-high);}
.festival-date{font-size:10px;color:var(--text-low);margin-top:2px;}

/* ── Ritual Card ── */
.ritual-card{background:var(--primary-70);border-radius:var(--shape-large);padding:18px 18px;position:relative;overflow:hidden;}
.ritual-card::before{content:'';position:absolute;right:-30px;top:-30px;width:120px;height:120px;border-radius:50%;background:rgba(255,255,255,0.05);}
.ritual-label{font-size:9px;font-weight:800;color:rgba(255,255,255,0.5);letter-spacing:0.08em;text-transform:uppercase;}
.ritual-title{font-size:20px;font-weight:900;color:#fff;margin-top:4px;letter-spacing:-0.02em;line-height:1.15;}
.ritual-meta{font-size:11px;color:rgba(255,255,255,0.45);margin-top:4px;}
.ritual-tracks{margin-top:12px;display:flex;flex-direction:column;gap:5px;}
.ritual-track{display:flex;align-items:center;gap:10px;padding:8px 10px;background:rgba(255,255,255,0.08);border-radius:var(--shape-small);}
.ritual-track-num{font-size:10px;font-weight:700;color:rgba(255,255,255,0.35);width:14px;}
.ritual-track-info{flex:1;}
.ritual-track-name{font-size:12px;font-weight:600;color:#fff;}
.ritual-track-artist{font-size:10px;color:rgba(255,255,255,0.4);}
.ritual-track-dur{font-size:10px;color:rgba(255,255,255,0.35);}
.ritual-begin-btn{width:100%;margin-top:12px;padding:12px;background:rgba(255,255,255,0.12);border:1.5px solid rgba(255,255,255,0.25);border-radius:var(--shape-medium);font-family:'JioType',sans-serif;font-size:13px;font-weight:700;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:background 150ms;}
.ritual-begin-btn:active{background:rgba(255,255,255,0.2);}

/* ── Vrat Card ── */
.vrat-card{background:var(--surface);border:1px solid var(--stroke-subtle);border-left:4px solid var(--faith-color);border-radius:var(--shape-large);padding:16px;cursor:pointer;transition:transform 150ms;}
.vrat-card:active{transform:scale(0.98);}
.vrat-badge{display:inline-flex;align-items:center;gap:4px;font-size:9px;font-weight:800;color:var(--faith-color);background:var(--faith-bg);padding:3px 8px;border-radius:var(--shape-pill);text-transform:uppercase;letter-spacing:0.04em;}
.vrat-name{font-size:16px;font-weight:800;color:var(--text-high);margin-top:8px;}
.vrat-date{font-size:12px;color:var(--text-low);margin-top:3px;}
.vrat-desc{font-size:12px;color:var(--text-medium);margin-top:6px;line-height:1.5;}
.vrat-cta{display:inline-flex;align-items:center;gap:4px;font-size:12px;font-weight:700;color:var(--faith-color);margin-top:10px;cursor:pointer;}

/* ── Overlay ── */
.overlay{position:absolute;inset:0;z-index:100;background:rgba(0,0,0,0.6);display:none;align-items:flex-end;}
.overlay.active{display:flex;}
.overlay-sheet{background:var(--surface);border-radius:20px 20px 0 0;width:100%;max-height:88vh;overflow-y:auto;padding:20px;animation:slideUp 320ms var(--ease-decelerate);}
@keyframes slideUp{from{transform:translateY(100%);}to{transform:translateY(0);}}
.overlay-close{display:flex;justify-content:center;margin-bottom:12px;}
.overlay-handle{width:36px;height:4px;border-radius:2px;background:var(--grey-40);}
.overlay-title{font-size:18px;font-weight:800;color:var(--text-high);margin-bottom:4px;}
.overlay-subtitle{font-size:12px;color:var(--text-low);margin-bottom:16px;}

/* ── Darshan Action Grid ── */
.darshan-actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:16px;}
.darshan-action{display:flex;flex-direction:column;align-items:center;gap:8px;padding:16px 10px;border:1px solid var(--stroke-subtle);border-radius:var(--shape-large);background:var(--surface);cursor:pointer;transition:all 150ms;}
.darshan-action:active{transform:scale(0.96);background:var(--faith-bg);}
.darshan-action-icon{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;}
.darshan-action-label{font-size:12px;font-weight:700;color:var(--text-high);text-align:center;}
.darshan-action-sub{font-size:10px;color:var(--text-low);text-align:center;margin-top:-4px;}

/* ── Keyframes ── */
@keyframes livePulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes breathe{0%,100%{transform:scale(1);opacity:.6}50%{transform:scale(1.08);opacity:1}}
@keyframes breatheRing{0%,100%{transform:translate(-50%,-50%) scale(1);opacity:.4}50%{transform:translate(-50%,-50%) scale(1.08);opacity:.7}}
@keyframes floatDiya{0%,100%{transform:translateY(0);opacity:.7}50%{transform:translateY(-6px);opacity:1}}
</style>
</head>

function buildFeed() {
  var feed = document.getElementById('feed');
  feed.innerHTML = [
    renderHero(),
    renderDarshan(),
    renderPanchang(),
    renderForwards(),
    renderFestivals(),
    renderRitual(),
    renderVrat(),
    '<div style="height:40px"></div>'
  ].join('');

  // Intersection Observer for scroll animations
  var observer = new IntersectionObserver(function(entries) {
    entries.forEach(function(entry) {
      if (entry.isIntersecting) {
        entry.target.classList.add('visible');
        observer.unobserve(entry.target);
      }
    });
  }, { threshold: 0.1 });

  document.querySelectorAll('.section').forEach(function(s) { observer.observe(s); });
}

    + '<div class="darshan-action" onclick="showDarshanAction(\'aarti\')"><div class="darshan-action-icon" style="background:' + (USER_FAITH === 'muslim' ? '#e8f5ec' : '#fef7e9') + ';">🪔</div><div class="darshan-action-label">' + (USER_FAITH === 'muslim' ? 'Dua Request' : 'Virtual Aarti') + '</div></div>'
    + '<div class="darshan-action" onclick="showDarshanAction(\'prasad\')"><div class="darshan-action-icon" style="background:' + (USER_FAITH === 'muslim' ? '#e8f5ec' : '#e8f5ec') + ';">🍲</div><div class="darshan-action-label">' + (USER_FAITH === 'muslim' ? 'Langar Donation' : 'Online Prasad') + '</div></div>'
    + '<div class="darshan-action" onclick="showDarshanAction(\'gift\')"><div class="darshan-action-icon" style="background:' + (USER_FAITH === 'muslim' ? '#e8f5ec' : '#e8e8fc') + ';">🎁</div><div class="darshan-action-label">' + (USER_FAITH === 'muslim' ? 'Zakat' : 'Aashirwaad Box') + '</div></div>'
    + '</div>'
    // ── CTA ──
    + '<button style="width:100%;margin-top:16px;padding:14px;background:' + faithColor + ';border:none;border-radius:12px;font-family:JioType,sans-serif;font-size:14px;font-weight:700;color:#fff;cursor:pointer;">' + (t.live ? (USER_FAITH === 'muslim' ? 'Watch Live' : 'Watch Live Darshan') : 'Set Reminder') + '</button>'
  );
}

function showDarshanAction(action) {
  var deityInfo = DEITY_DATA[USER_DEITY] || DEITY_DATA.ganesh;
  var msgs = {
    flowers: { emoji:'🌸🌺🌼', text: deityInfo.name + ' ko phool arpan kiye gaye', sub:'Aapki puja sweekar hui' },
    aarti: { emoji:'🪔🪔🪔', text: deityInfo.name + ' ki aarti shuru ho rahi hai', sub:'Om Jai Jagdish Hare...' },
    prasad: { emoji:'🍲🙏', text: 'Prasad ka order diya gaya', sub:'Delivery: 2-3 din mein' },
    gift: { emoji:'🎁✨', text: 'Aashirwaad Box bheja gaya', sub: deityInfo.blessing },
  };
  var m = msgs[action] || msgs.flowers;

  // Show a brief confirmation toast over the overlay
  var toast = document.createElement('div');
  toast.style.cssText = 'position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0.8);z-index:200;background:rgba(0,0,0,0.88);border-radius:20px;padding:28px 32px;text-align:center;opacity:0;transition:all 400ms cubic-bezier(0.2,0,0,1);pointer-events:none;';
  toast.innerHTML = '<div style="font-size:40px;margin-bottom:10px;animation:breathe 1.5s ease infinite;">' + m.emoji + '</div>'
    + '<div style="font-size:15px;font-weight:700;color:#fff;margin-bottom:4px;">' + m.text + '</div>'
    + '<div style="font-size:12px;color:rgba(255,255,255,0.65);">' + m.sub + '</div>';
  document.body.appendChild(toast);

  requestAnimationFrame(function() {
    toast.style.opacity = '1';
    toast.style.transform = 'translate(-50%,-50%) scale(1)';
  });

  setTimeout(function() {
    toast.style.opacity = '0';
    toast.style.transform = 'translate(-50%,-50%) scale(0.8)';
    setTimeout(function() { toast.remove(); }, 400);
  }, 2200);
}

function openFestival(idx) {
  var fests = USER_FAITH === 'muslim' ? FESTIVALS_MUSLIM : FESTIVALS_HINDU;
  var f = fests[idx];
  if (!f) return;

  openOverlay(
    '<div style="text-align:center;margin-bottom:16px;"><span style="font-size:48px;">' + f.emoji + '</span></div>'
    + '<div class="overlay-title" style="text-align:center;">' + f.name + '</div>'
    + '<div class="overlay-subtitle" style="text-align:center;">' + f.date + ' . ' + f.daysTo + ' days to go</div>'
    + '<div style="background:var(--surface-ghost);border-radius:12px;padding:14px;margin-bottom:12px;">'
    + '<div style="font-size:13px;font-weight:700;color:var(--text-high);margin-bottom:6px;">About</div>'
    + '<div style="font-size:12px;color:var(--text-medium);line-height:1.6;">This is one of the most significant occasions in the calendar. Devotees celebrate with prayers, rituals, and community gatherings.</div>'
    + '</div>'
    + '<div style="background:var(--surface-ghost);border-radius:12px;padding:14px;margin-bottom:16px;">'
    + '<div style="font-size:13px;font-weight:700;color:var(--text-high);margin-bottom:6px;">Key Rituals</div>'
    + '<div style="font-size:12px;color:var(--text-medium);line-height:1.8;">1. Early morning bath & prayers<br>2. Visit temple / masjid<br>3. Special offerings<br>4. Community celebration<br>5. Evening aarti / prayers</div>'
    + '</div>'
    + '<button style="width:100%;padding:14px;background:var(--faith-color);border:none;border-radius:12px;font-family:JioType,sans-serif;font-size:14px;font-weight:700;color:#fff;cursor:pointer;">🔔 Set Reminder</button>'
  );
}

function openVrat(idx) {
  var vrats = USER_FAITH === 'muslim' ? VRATS.muslim : VRATS.hindu;
  var v = vrats[idx];
  if (!v) return;

  var dosHtml = '';
  v.dos.forEach(function(d) { dosHtml += '<div style="display:flex;align-items:flex-start;gap:8px;margin-bottom:6px;"><span style="color:var(--success);font-weight:800;">✓</span><span style="font-size:12px;color:var(--text-medium);line-height:1.5;">' + d + '</span></div>'; });
  var dontsHtml = '';
  v.donts.forEach(function(d) { dontsHtml += '<div style="display:flex;align-items:flex-start;gap:8px;margin-bottom:6px;"><span style="color:var(--error);font-weight:800;">✗</span><span style="font-size:12px;color:var(--text-medium);line-height:1.5;">' + d + '</span></div>'; });
  var foodsHtml = '<div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:6px;">';
  v.foods.forEach(function(f) { foodsHtml += '<span style="padding:4px 10px;background:var(--surface-ghost);border-radius:var(--shape-pill);font-size:11px;font-weight:600;color:var(--text-high);">' + f + '</span>'; });
  foodsHtml += '</div>';

  openOverlay(
    '<div class="overlay-title">' + v.name + '</div>'
    + '<div class="overlay-subtitle">' + v.date + ' . ' + v.daysTo + ' days to go</div>'
    + '<div style="background:var(--faith-bg);border-radius:12px;padding:14px;margin-bottom:12px;">'
    + '<div style="font-size:13px;font-weight:700;color:var(--text-high);margin-bottom:6px;">📖 Katha</div>'
    + '<div style="font-size:12px;color:var(--text-medium);line-height:1.6;">' + v.katha + '</div>'
    + '</div>'
    + '<div style="background:var(--surface-ghost);border-radius:12px;padding:14px;margin-bottom:12px;">'
    + '<div style="font-size:13px;font-weight:700;color:var(--text-high);margin-bottom:8px;">✅ What to Do</div>'
    + dosHtml
    + '</div>'
    + '<div style="background:var(--surface-ghost);border-radius:12px;padding:14px;margin-bottom:12px;">'
    + '<div style="font-size:13px;font-weight:700;color:var(--text-high);margin-bottom:8px;">❌ What to Avoid</div>'
    + dontsHtml
    + '</div>'
    + '<div style="background:var(--surface-ghost);border-radius:12px;padding:14px;margin-bottom:16px;">'
    + '<div style="font-size:13px;font-weight:700;color:var(--text-high);margin-bottom:4px;">🍽 Allowed Foods</div>'
    + foodsHtml
    + '</div>'
    + '<button style="width:100%;padding:14px;background:var(--faith-color);border:none;border-radius:12px;font-family:JioType,sans-serif;font-size:14px;font-weight:700;color:#fff;cursor:pointer;">🔔 Set Vrat Reminder</button>'
  );
}

// ── Build on load ──
buildFeed();
</script>
</body>
</html>
