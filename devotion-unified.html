<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Bhakti Saathi — Devotion Experience</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
<style>
@font-face { font-family:'JioType'; font-weight:400; src:url('https://raw.githubusercontent.com/sunit1986/JioBharatIQ_Server/main/assets/fonts/woff2/JioTypeVarW05-Regular.woff2') format('woff2'); }
@font-face { font-family:'JioType'; font-weight:500; src:url('https://raw.githubusercontent.com/sunit1986/JioBharatIQ_Server/main/assets/fonts/woff2/JioTypeW05-Medium.woff2') format('woff2'); }
@font-face { font-family:'JioType'; font-weight:700; src:url('https://raw.githubusercontent.com/sunit1986/JioBharatIQ_Server/main/assets/fonts/woff2/JioTypeW05-Bold.woff2') format('woff2'); }
@font-face { font-family:'JioType'; font-weight:900; src:url('https://raw.githubusercontent.com/sunit1986/JioBharatIQ_Server/main/assets/fonts/woff2/JioTypeW05-Black.woff2') format('woff2'); }

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body {
  font-family:'JioType','Outfit',sans-serif;
  background:#1a0a00;
  min-height:100vh;
  overflow:hidden;
  display:flex; justify-content:center;
}

.phone-frame {
  width:390px; max-width:100vw; height:100vh;
  position:relative; overflow:hidden;
}

@media (max-width: 480px) {
  .phone-frame { width:100%; max-width:100%; }
}

/* ── Phases ── */
.phase {
  position:absolute; top:0; left:0; width:100%; height:100%;
  opacity:0; pointer-events:none;
  transition: opacity 700ms cubic-bezier(0.4,0,0.2,1), transform 700ms cubic-bezier(0.4,0,0.2,1);
  z-index:1;
  transform: scale(0.97);
}
.phase.active {
  opacity:1; pointer-events:all; z-index:2;
  transform: scale(1);
}
.phase.exiting {
  opacity:0; pointer-events:none; z-index:1;
  transform: scale(1.03);
}
.phase iframe {
  width:100%; height:100%; border:none; background:#faf9f6;
}

/* ── Transition Overlay ── */
.transition-overlay {
  position:absolute; inset:0;
  background:radial-gradient(ellipse at center, #4a1a00, #1a0a00);
  z-index:10; opacity:0; pointer-events:none;
  transition: opacity 500ms cubic-bezier(0.4,0,0.2,1);
}
.transition-overlay.active { opacity:1; pointer-events:all; }

/* ── Keyframes ── */
@keyframes fadeInUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
@keyframes fadeInScale { from { opacity:0; transform:scale(0.85); } to { opacity:1; transform:scale(1); } }
@keyframes breathe { 0%,100% { transform:scale(1); opacity:0.6; } 50% { transform:scale(1.1); opacity:1; } }
</style>
</head>
<body>
<div class="phone-frame" id="app">

  <!-- ═══ PHASE 1: Onboarding — Faith + Deity Selection ═══ -->
  <div class="phase active" id="phase-onboarding">
    <iframe src="devotion-onboarding.html?unified=1" id="iframe-onboarding" allow="autoplay"></iframe>
  </div>

  <!-- ═══ PHASE 2: Personalized Devotion Homepage ═══ -->
  <div class="phase" id="phase-home">
    <iframe id="iframe-home" allow="autoplay"></iframe>
  </div>

  <!-- Transition overlay for smooth phase switches -->
  <div class="transition-overlay" id="transition"></div>
</div>

<script>
/* ═══════════════════════════════════════
   ORCHESTRATOR — 2-Phase Devotion Flow
   ═══════════════════════════════════════

   Onboarding (devotion-onboarding.html)
     → Faith → Deity → Blessing animation → auto-advance
   Home (devotion-home.html)
     → Personalized devotion feed with all features
*/

let currentPhase = 'onboarding';
let transitioning = false;

function transitionTo(phaseId, iframeSrc) {
  if (transitioning || currentPhase === phaseId) return;
  transitioning = true;

  var overlay = document.getElementById('transition');
  var currentEl = document.getElementById('phase-' + currentPhase);
  var nextEl = document.getElementById('phase-' + phaseId);

  // Fade in overlay
  overlay.classList.add('active');

  setTimeout(function() {
    // Load iframe src NOW (just before becoming visible) so animations play correctly
    if (iframeSrc) {
      var iframe = nextEl.querySelector('iframe');
      if (iframe && (!iframe.src || iframe.src === 'about:blank' || iframe.src === '')) {
        iframe.src = iframeSrc;
      }
    }

    // Swap visibility
    currentEl.classList.remove('active');
    currentEl.classList.add('exiting');
    nextEl.classList.add('active');

    // Fade out overlay
    setTimeout(function() {
      overlay.classList.remove('active');
      currentEl.classList.remove('exiting');
      currentPhase = phaseId;
      transitioning = false;
    }, 500);
  }, 500);
}

// ── Navigation Functions ──
function goToHome(data) {
  var params = '?unified=1';
  if (data) {
    params += '&faith=' + encodeURIComponent(data.faith || 'hindu');
    params += '&deity=' + encodeURIComponent(data.deity || 'ganesh');
    params += '&name=' + encodeURIComponent(data.name || 'Shivali');
  }
  transitionTo('home', 'devotion-home.html' + params);
}

function goToOnboarding() {
  transitionTo('onboarding');
}

// ── Listen for messages from child iframes ──
window.addEventListener('message', function(e) {
  if (!e.data || !e.data.type) return;

  switch (e.data.type) {
    case 'onboarding-complete':
      // Onboarding done → Personalized Homepage
      goToHome(e.data);
      break;
  }
});

// ── Debug: keyboard shortcuts (1-2) ──
document.addEventListener('keydown', function(e) {
  if (e.key === '1') goToOnboarding();
  if (e.key === '2') goToHome({ faith: 'hindu', deity: 'ganesh', name: 'Shivali' });
});
</script>
</body>
</html>
